{type:'mammals',icon:'🐿️',commonName:'Red Squirrel',taxonomicName:'Sciurus vulgaris',habitat:'Conifer Woodland & Mixed Forest',taxonomy:[{rank:'Order',name:'Rodentia'},{rank:'Family',name:'Sciuridae'},{rank:'Genus',name:'Sciurus'},{rank:'Species',name:'S. vulgaris'}],id:{colour:'Rich chestnut-red above (can be darker in winter); white below. <strong>Prominent ear tufts in winter — diagnostic.</strong>',sizeShape:'Body 18–24 cm; tail nearly as long. Slim; lighter than Grey Squirrel.',keyFeatures:'Ear tufts (winter) and slimmer, less bulky build. Confusion: Grey Squirrel is larger, greyer, lacks ear tufts.',habitat:'Conifer and mixed woodland. Red-Squirrel strongholds: Scottish Highlands, Northumberland, Isle of Wight, Brownsea Island.'},facts:['Red Squirrel is native; Grey Squirrel (introduced 1876) carries squirrelpox virus, lethal to reds, to which it is immune.','Fewer than 140,000 Red Squirrels remain in Britain — mostly in Scotland. The Grey Squirrel has displaced them from England.','Pine Marten predation of Grey Squirrels in areas where both coexist is now offering Red Squirrels a natural reprieve.','Brownsea Island (Dorset) and Holy Island (Northumberland) are famous accessible Red Squirrel sites.']},

{type:'mammals',icon:'🐭',commonName:'Water Vole',taxonomicName:'Arvicola amphibius',habitat:'Rivers, Streams, Ditches & Wetland',taxonomy:[{rank:'Order',name:'Rodentia'},{rank:'Family',name:'Cricetidae'},{rank:'Genus',name:'Arvicola'},{rank:'Species',name:'A. amphibius'}],id:{colour:'Dark brown above; grey-buff below. <strong>Blunt, rounded muzzle; small, almost hidden ears.</strong>',sizeShape:'Body 14–22 cm — much larger than other UK voles. Stocky, almost rabbit-like when seen from above.',keyFeatures:'Large size, blunt muzzle, hairy tail. Confusion: Brown Rat is larger, has naked scaly tail and pointed muzzle.',habitat:'Slow rivers, streams, ditches, fenland. Burrows in steep banks; "plop" when disturbed.'},facts:['Ratty from Wind in the Willows was a Water Vole — a beloved literary identity for this imperilled species.','Water Vole is the UK\'s fastest-declining wild mammal — estimated 90%+ population loss since the 1970s due to American Mink predation and habitat loss.','Conservation success stories include the Great Fen project and various mink-removal schemes where Water Voles have recolonised.','The distinctive "plop" into water when disturbed is the most reliable indication of Water Vole presence.']},

{type:'mammals',icon:'🦇',commonName:'Common Pipistrelle',taxonomicName:'Pipistrellus pipistrellus',habitat:'Woodland Edge, Garden & Waterside',taxonomy:[{rank:'Order',name:'Chiroptera'},{rank:'Family',name:'Vespertilionidae'},{rank:'Genus',name:'Pipistrellus'},{rank:'Species',name:'P. pipistrellus'}],id:{colour:'Pale to dark brown; dark brown face, ear, and wing membrane.',sizeShape:'Body 3.5–5.1 cm; wingspan 19–25 cm — <strong>Britain\'s smallest bat.</strong> Very fast, jerky flight.',keyFeatures:'Tiny size and fast jerky flight. Echolocates at 45 kHz (Common) — bat detector needed to distinguish from Soprano Pipistrelle (55 kHz).',habitat:'Woodland edges, gardens, waterside, buildings. The most common and widespread UK bat.'},facts:['Britain\'s most common bat — found in virtually every county and almost every village.','A single Pipistrelle can eat up to 3,000 midges in one night.','Common and Soprano Pipistrelle (Pipistrellus pygmaeus) were only separated as two species in 1999 by their different echolocation frequencies.','Maternity roosts of thousands of females in roof spaces are found throughout Britain — important cultural heritage sites.']},

{type:'reptiles',icon:'🦎',commonName:'Sand Lizard',taxonomicName:'Lacerta agilis',habitat:'Lowland Heathland & Sand Dunes',taxonomy:[{rank:'Order',name:'Squamata'},{rank:'Family',name:'Lacertidae'},{rank:'Genus',name:'Lacerta'},{rank:'Species',name:'L. agilis'}],id:{colour:'Female and juvenile: brown with rows of dark spots with pale centres. <strong>Breeding male: brilliant vivid green flanks — unmistakeable.</strong>',sizeShape:'Body 15–20 cm. More heavily built than Common Lizard.',keyFeatures:'Male\'s green flanks diagnostic in breeding season. Female: heavily spotted pattern different from Common Lizard. Egg-layer.',habitat:'Lowland heathland with bare sandy ground for egg-laying; also coastal sand dunes.'},facts:['One of Britain\'s rarest reptiles — confined to Surrey, Dorset, Hampshire heaths, and a few sand dune sites in Lancashire and Wales.','A Schedule 5 protected species — it is an offence to disturb, handle, or harm Sand Lizards.','The brilliant green flanks of breeding males are among the most vivid colours of any British wildlife.','Requires bare south-facing sandy ground for egg-laying — habitat loss through vegetation succession is the primary threat.']},

{type:'reptiles',icon:'🐍',commonName:'Smooth Snake',taxonomicName:'Coronella austriaca',habitat:'Lowland Heathland',taxonomy:[{rank:'Order',name:'Squamata'},{rank:'Family',name:'Colubridae'},{rank:'Genus',name:'Coronella'},{rank:'Species',name:'C. austriaca'}],id:{colour:'Grey-brown or reddish-brown above; <strong>dark spot or bar on top of head; two rows of small dark spots running the body length.</strong>',sizeShape:'Body 50–70 cm. Slender; narrow head; smooth, glossy scales.',keyFeatures:'Narrow head continuous with body; no zigzag; <strong>round pupil</strong> (unlike Adder\'s vertical pupil). Dark head crown mark.',habitat:'Lowland heathland with Adder and Sand Lizard. Dorset, Hampshire, and Surrey heaths.'},facts:['Britain\'s rarest reptile — fewer than 50 heathland sites, almost all in Dorset, Hampshire, and Surrey.','Kills prey by constriction — wrapping coils around lizards and small mammals before swallowing. Harmless to humans.','Fully protected under the Wildlife & Countryside Act 1981 — one of the most legally protected UK species.','Lost from most of its former range due to heathland destruction — heathland restoration is the key conservation priority.']},

{type:'reptiles',icon:'🐸',commonName:'Common Toad',taxonomicName:'Bufo bufo',habitat:'Garden, Woodland & Wetland',taxonomy:[{rank:'Order',name:'Anura'},{rank:'Family',name:'Bufonidae'},{rank:'Genus',name:'Bufo'},{rank:'Species',name:'B. bufo'}],id:{colour:'Variable brown, olive, or grey. <strong>Covered in dry, warty skin</strong> — diagnostic vs. Common Frog.',sizeShape:'Body 8–13 cm. Stocky; walks rather than hops. Large parotoid glands behind eyes.',keyFeatures:'Warty skin and walking gait. Confusion: Common Frog has smooth moist skin, long hind legs for jumping.',habitat:'Wide range of terrestrial habitats; returns to same pond to breed. Travels long distances to breeding sites.'},facts:['Common Toad populations have declined 68% in the UK since 1985 — road mortality during spring migration is a major cause.','Toad Patrol volunteers carry tens of thousands of toads across roads in March every year in bucket brigades — one of the largest wildlife volunteering activities in Britain.','Toads release a toxic milky secretion (bufadienolide) from parotoid glands when attacked — lethal to many small predators.','The toad returns to its birth pond every year to breed — with remarkable navigational precision over distances of several kilometres.']},

{type:'reptiles',icon:'🐸',commonName:'Great Crested Newt',taxonomicName:'Triturus cristatus',habitat:'Ponds, Woodland & Rough Grassland',taxonomy:[{rank:'Order',name:'Caudata'},{rank:'Family',name:'Salamandridae'},{rank:'Genus',name:'Triturus'},{rank:'Species',name:'T. cristatus'}],id:{colour:'Dark brown-black above with small white spots on flanks. <strong>Bright orange belly with bold black spots — diagnostic.</strong> Breeding male has spectacular jagged crest.',sizeShape:'Body 14–16 cm — Britain\'s largest newt.',keyFeatures:'Orange spotted belly unmistakeable. Breeding male\'s jagged crest unique. Female lacks crest but has orange belly.',habitat:'Ponds surrounded by rough grassland and woodland. Requires good water quality.'},facts:['Great Crested Newt is one of the most legally protected animals in Britain — all development near ponds requires ecological surveys and mitigation.','The breeding male is one of Britain\'s most spectacular small animals — the jagged crest and orange belly are extraordinary.','Britain holds approximately 20% of the European Great Crested Newt population — an international responsibility.','Habitat ponds must be fish-free — fish predation is the primary reason for newt decline.']},

{type:'reptiles',icon:'🐸',commonName:'Smooth Newt',taxonomicName:'Lissotriton vulgaris',habitat:'Ponds, Gardens & Damp Woodland',taxonomy:[{rank:'Order',name:'Caudata'},{rank:'Family',name:'Salamandridae'},{rank:'Genus',name:'Lissotriton'},{rank:'Species',name:'L. vulgaris'}],id:{colour:'Brown above; orange-yellow below with round black spots. <strong>Breeding male: wavy continuous crest from head to tail and spotted throat.</strong>',sizeShape:'Body 8–11 cm. Britain\'s commonest newt.',keyFeatures:'Breeding male\'s smooth (not jagged) continuous crest. Female: spotted belly. Confusion: Palmate Newt — male has webbed hind feet and filamentous tail tip.',habitat:'Garden ponds, woodland pools, ditches. More tolerant of poor water quality than Great Crested.'},facts:['The most common newt in Britain — found in most garden ponds with suitable conditions.','Breeding males perform an elaborate courtship dance — vibrating the tail to waft pheromones towards the female.','Newts spend the majority of their lives on land — returning to water only in spring to breed.','Garden ponds are now the most important habitat for Smooth Newt conservation as countryside ponds have declined.']},

{type:'fish',icon:'🐟',commonName:'Pike',taxonomicName:'Esox lucius',habitat:'Lakes, Rivers & Canals',taxonomy:[{rank:'Order',name:'Esociformes'},{rank:'Family',name:'Esocidae'},{rank:'Genus',name:'Esox'},{rank:'Species',name:'E. lucius'}],id:{colour:'<strong>Dark green-brown with pale yellowish blotches and spots on flanks</strong> — superb camouflage in aquatic vegetation.',sizeShape:'Typically 60–100 cm; females grow much larger (record 32 kg). Long, torpedo-shaped; large head.',keyFeatures:'Duck-billed snout with massive jaws. Fins set far back. Unmistakeable among UK freshwater fish.',habitat:'Still or slow-moving water with aquatic vegetation. Lakes, rivers, canals, gravel pits.'},facts:['The apex freshwater predator in most UK waters — Pike will take frogs, ducks, and even young otters.','Despite an aggressive reputation, Pike can be carefully handled and returned alive — catch-and-release Pike fishing is widely practised.','Pike teeth point inward to prevent prey escaping — a captured fish cannot back out of the jaws.','Female Pike grow much larger than males — the biggest UK rod-caught specimen weighed over 46 lb (21 kg).']},

{type:'fish',icon:'🐟',commonName:'Perch',taxonomicName:'Perca fluviatilis',habitat:'Lakes, Rivers & Ponds',taxonomy:[{rank:'Order',name:'Perciformes'},{rank:'Family',name:'Percidae'},{rank:'Genus',name:'Perca'},{rank:'Species',name:'P. fluviatilis'}],id:{colour:'<strong>Greenish with 5–9 dark vertical bars on flanks; bright red-orange pelvic and anal fins.</strong>',sizeShape:'Typically 15–35 cm. Robust, hump-backed body; two dorsal fins.',keyFeatures:'Dark vertical bars and red fins unmistakeable. Confusion: none among UK fish.',habitat:'Lakes, slow rivers, ponds, canals. Common throughout Britain.'},facts:['One of the most recognisable freshwater fish in Britain — the dark bars and red fins are unlike anything else.','Perch hunt in packs — shoals of juveniles herd small fish into shallows before attacking.','Perch disease (Aeromonas bacteria) killed most UK Perch in the 1970s — populations have since recovered.','The spiny first dorsal fin can draw blood — handle with care.']},

{type:'fish',icon:'🐟',commonName:'Common Carp',taxonomicName:'Cyprinus carpio',habitat:'Lakes, Ponds & Slow Rivers',taxonomy:[{rank:'Order',name:'Cypriniformes'},{rank:'Family',name:'Cyprinidae'},{rank:'Genus',name:'Cyprinus'},{rank:'Species',name:'C. carpio'}],id:{colour:'Typically bronze-golden; darker above; scales large and obvious. <strong>Two pairs of barbels at the corner of the mouth.</strong>',sizeShape:'Typically 40–80 cm. Heavily built; deep body; large scales.',keyFeatures:'Large scales, barbels, bronze colour. Mirror Carp has irregular large scales. Confusion: Tench is darker with no barbels.',habitat:'Lakes, ponds, gravel pits, slow rivers. Widely stocked for angling.'},facts:['Carp are not native — introduced to Britain in medieval times as a food fish for monastery ponds.','Common Carp live for 20–50 years — individual fish in UK waters have been caught by anglers hundreds of times over decades and given names.','The UK carp angling industry is estimated at over £1 billion annually.','Carp feeding disturbs sediment and uproots aquatic vegetation — large populations can devastate pond ecology.']},

{type:'fish',icon:'🐟',commonName:'Roach',taxonomicName:'Rutilus rutilus',habitat:'Rivers, Lakes & Canals',taxonomy:[{rank:'Order',name:'Cypriniformes'},{rank:'Family',name:'Cyprinidae'},{rank:'Genus',name:'Rutilus'},{rank:'Species',name:'R. rutilus'}],id:{colour:'Silver-grey above; silver flanks; white belly. <strong>Red-orange iris; red-orange pelvic and anal fins.</strong>',sizeShape:'Typically 15–30 cm. Slim, oval-bodied.',keyFeatures:'Red eye and red fins. Confusion: Rudd has more upturned mouth and brighter red fins.',habitat:'Rivers, lakes, canals, ponds. One of the most common coarse fish in the UK.'},facts:['One of the most abundant and widespread freshwater fish in Britain.','The red eye is the most reliable field identification character — no other common UK cyprinid has such a vivid red iris.','Heavily preyed upon by cormorants — the expansion of cormorant inland populations since the 1980s has impacted roach stocks.','An important forage fish for pike and perch in many still-water fisheries.']},

{type:'fish',icon:'🐟',commonName:'European Eel',taxonomicName:'Anguilla anguilla',habitat:'Rivers, Ditches, Ponds & Estuaries',taxonomy:[{rank:'Order',name:'Anguilliformes'},{rank:'Family',name:'Anguillidae'},{rank:'Genus',name:'Anguilla'},{rank:'Species',name:'A. anguilla'}],id:{colour:'Yellow-brown above; yellow below (yellow eel). At sea (silver eel): silver belly, dark back, enlarged eyes.',sizeShape:'Typically 40–100 cm. Snake-like; no pelvic fins; continuous dorsal-anal fin.',keyFeatures:'Snake-like body with no pelvic fins. Unmistakeable in UK fresh water.',habitat:'Rivers, ditches, ponds, lakes, estuaries. Migrates to Sargasso Sea to breed.'},facts:['No European Eel has ever been observed spawning — they travel 5,000+ km to the Sargasso Sea to breed, but the spawning grounds have never been directly witnessed.','European Eel is Critically Endangered — populations have declined over 90% since the 1970s.','Eels can cross overland through wet grass at night, colonising ponds with no river connections.','The eel\'s life cycle was completely mysterious until the early 20th century — Aristotle believed they arose spontaneously from mud.']},

{type:'fish',icon:'🐟',commonName:'Tench',taxonomicName:'Tinca tinca',habitat:'Ponds, Lakes & Slow Rivers',taxonomy:[{rank:'Order',name:'Cypriniformes'},{rank:'Family',name:'Cyprinidae'},{rank:'Genus',name:'Tinca'},{rank:'Species',name:'T. tinca'}],id:{colour:'<strong>Dark olive-green above and flanks; olive-yellow below. Very small, fine scales embedded in thick mucus.</strong>',sizeShape:'Typically 25–50 cm. Stout, rounded body; small rounded fins.',keyFeatures:'Distinctive dark greenish colour, thick slimy mucus, tiny rounded fins, small red eye. Confusion: none.',habitat:'Weedy ponds, gravel pits, slow rivers. Tolerates low oxygen levels.'},facts:['The Tench was historically called "the physician fish" — the thick mucus was believed to heal other fish that rubbed against it.','Tench can tolerate very low oxygen levels and muddy conditions that would kill most other fish.','The vibrant orange-red eye and thick, slippery mucus make Tench unmistakeable in the hand.','Tench feed at dawn and dusk, rolling in the lily pads — a classic summer sight on stillwater fisheries.']},

{type:'fish',icon:'🐟',commonName:'Common Bream',taxonomicName:'Abramis brama',habitat:'Lakes, Slow Rivers & Canals',taxonomy:[{rank:'Order',name:'Cypriniformes'},{rank:'Family',name:'Cyprinidae'},{rank:'Genus',name:'Abramis'},{rank:'Species',name:'A. brama'}],id:{colour:'Deep bronze-grey above; silver-bronze flanks with a slimy surface. <strong>Very deep, laterally compressed body — almost slab-sided.</strong>',sizeShape:'Typically 30–55 cm. Deep, flat body like a flattened disc.',keyFeatures:'Extremely deep, flat, slab-sided body unique among UK fish. Underslung protrusible mouth.',habitat:'Lakes, gravel pits, slow rivers, canals. Shoals in open water.'},facts:['Common Bream feed by extending the mouth in a tube-like structure to vacuum up invertebrates from the bottom.','Large shoals feeding in summer produce visible "cloudy" areas of disturbed sediment.','Bream are highly social and predictable — they follow the same patrol routes in stillwaters.','The deepest-bodied freshwater fish in Britain — the shape makes them immediately recognisable.']},

{type:'fish',icon:'🐟',commonName:'Thornback Ray',taxonomicName:'Raja clavata',habitat:'Sandy & Muddy Seabed, Bays & Estuaries',taxonomy:[{rank:'Order',name:'Rajiformes'},{rank:'Family',name:'Rajidae'},{rank:'Genus',name:'Raja'},{rank:'Species',name:'R. clavata'}],id:{colour:'Brown-grey above with <strong>scattered pale spots and dense thorns (bucklers) on the upper surface.</strong> White below.',sizeShape:'Up to 130 cm wingspan. Diamond-shaped, flat body.',keyFeatures:'Flat diamond shape and thorny back. Confusion: other rays — Thornback has distinctive thorns over most of body.',habitat:'Sandy and muddy seabed to 300 m; common in shallow bays and estuaries.'},facts:['The most commonly caught ray around UK coasts — a popular sea angling target.','The mermaid\'s purse (egg case) found on beaches is most commonly from Thornback Ray or Dogfish.','Thornback Rays have declined significantly due to trawling pressure — once extremely abundant.','They hunt by lying on the seabed, ambushing flatfish, crabs, and invertebrates.']},

{type:'fish',icon:'🐟',commonName:'Atlantic Cod',taxonomicName:'Gadus morhua',habitat:'Continental Shelf & Inshore Waters',taxonomy:[{rank:'Order',name:'Gadiformes'},{rank:'Family',name:'Gadidae'},{rank:'Genus',name:'Gadus'},{rank:'Species',name:'G. morhua'}],id:{colour:'Variable grey-green to brown with <strong>pale lateral line; three dorsal fins; prominent chin barbel.</strong>',sizeShape:'Typically 50–100 cm (historic giants to 180 cm). Robust; large head.',keyFeatures:'Three dorsal fins + chin barbel. Confusion: Haddock has black lateral line and thumb-print mark.',habitat:'Cool inshore and offshore waters, continental shelf. Historically the most commercially important UK fish.'},facts:['Atlantic Cod built the British fishing industry — "The Big Fish" shaped the economies of fishing communities for centuries.','UK cod stocks collapsed in the late 20th century due to overfishing — North Sea cod was declared at risk of commercial extinction in the early 2000s.','Some recovery has occurred under quota management but stocks remain heavily depleted compared to historical levels.','The cod\'s chin barbel is a sense organ for detecting prey on the seabed.']},

{type:'fish',icon:'🐟',commonName:'Plaice',taxonomicName:'Pleuronectes platessa',habitat:'Sandy Seabed & Inshore Coastal Waters',taxonomy:[{rank:'Order',name:'Pleuronectiformes'},{rank:'Family',name:'Pleuronectidae'},{rank:'Genus',name:'Pleuronectes'},{rank:'Species',name:'P. platessa'}],id:{colour:'<strong>Brown above with vivid orange-red spots</strong> — unmistakeable. White below. Both eyes on right side of head.',sizeShape:'Typically 25–50 cm. Flat, oval disc shape.',keyFeatures:'Orange spots on brown background — unique among UK flatfish.',habitat:'Sandy seabed to 200 m; inshore in summer. Common around UK coasts.'},facts:['The most familiar flatfish in Britain — the vivid orange spots make it instantly recognisable.','Plaice start life as normal fish larvae, then one eye migrates to join the other as the fish becomes flatfish.','Migrates inshore in spring to feed on sand eel and invertebrates; returns offshore in winter.','A prized angling fish and the second most commercially valuable UK flatfish after Sole.']},

{type:'invertebrates',icon:'🦋',commonName:'Small Tortoiseshell',taxonomicName:'Aglais urticae',habitat:'Garden, Meadow & Woodland Edge',taxonomy:[{rank:'Order',name:'Lepidoptera'},{rank:'Family',name:'Nymphalidae'},{rank:'Genus',name:'Aglais'},{rank:'Species',name:'A. urticae'}],id:{colour:'<strong>Orange-red with bold black and yellow patterning on forewings; row of blue lunules on wing margins.</strong>',sizeShape:'Wingspan 45–62 mm.',keyFeatures:'Orange-red with blue border. Confusion: Comma has ragged wing outline; Large Tortoiseshell is larger and rarer.',habitat:'Gardens, meadows, scrub. Hibernates as adult in houses, sheds, and hollow trees.'},facts:['Once the commonest UK garden butterfly — Small Tortoiseshell numbers have declined significantly in England since the early 2000s.','The parasitoid fly Sturmia bella, introduced accidentally from Europe, lays eggs on nettles consumed by the caterpillars — larvae eat the caterpillar alive.','Caterpillars feed communally on Common Nettle in a silk tent.','One of very few UK butterflies that regularly hibernates inside houses — often disturbed by central heating in autumn.']},

{type:'invertebrates',icon:'🦋',commonName:'Orange-tip',taxonomicName:'Anthocharis cardamines',habitat:'Woodland Edge, Hedgerow & Meadow',taxonomy:[{rank:'Order',name:'Lepidoptera'},{rank:'Family',name:'Pieridae'},{rank:'Genus',name:'Anthocharis'},{rank:'Species',name:'A. cardamines'}],id:{colour:'Male: white with <strong>vivid orange tip to forewing — unmistakeable.</strong> Female: white with black forewing tip (confusion species). Both: mottled green underwing.',sizeShape:'Wingspan 40–52 mm. Delicate, fluttering flight.',keyFeatures:'Male unmistakeable. Female: green mottled hindwing underside distinguishes from other white butterflies.',habitat:'Woodland edge, hedgerows, damp meadows, roadside verges with Lady\'s Smock.'},facts:['Orange-tip is the quintessential spring butterfly — males appear in April and are one of the first butterfly sights of the year.','Larval foodplant is Lady\'s Smock (Cardamine pratensis) and Garlic Mustard — both spring-flowering plants.','Single-brooded — there is only one generation per year; adults fly for just 4–6 weeks.','The mottled green-white underwing provides perfect camouflage on flower heads.']},

{type:'invertebrates',icon:'🦋',commonName:'Brimstone',taxonomicName:'Gonepteryx rhamni',habitat:'Woodland Edge, Scrub & Garden',taxonomy:[{rank:'Order',name:'Lepidoptera'},{rank:'Family',name:'Pieridae'},{rank:'Genus',name:'Gonepteryx'},{rank:'Species',name:'G. rhamni'}],id:{colour:'Male: <strong>vivid sulphur-yellow wings with small orange spot.</strong> Female: greenish-white. Both: distinctive leaf-shaped wing outline.',sizeShape:'Wingspan 60–74 mm. Strong, direct flight.',keyFeatures:'Leaf-shaped wings unique among UK butterflies. Male\'s yellow unmistakeable. Female resembles Large White but has leaf-vein wing venation.',habitat:'Woodland edge, scrub, hedgerows with Buckthorn and Alder Buckthorn.'},facts:['Brimstone is believed to be the original "butter-coloured fly" that gave butterflies their English name.','The adults have the longest lifespan of any UK butterfly — up to 13 months including hibernation.','One of the first butterflies of spring — hibernating adults emerge on warm February days.','Larval foodplant is exclusively Buckthorn and Alder Buckthorn — distribution closely tied to these shrubs.']},

{type:'invertebrates',icon:'🐝',commonName:'Honeybee',taxonomicName:'Apis mellifera',habitat:'Garden, Farmland & Woodland Edge',taxonomy:[{rank:'Order',name:'Hymenoptera'},{rank:'Family',name:'Apidae'},{rank:'Genus',name:'Apis'},{rank:'Species',name:'A. mellifera'}],id:{colour:'Brown-amber with paler bands on abdomen. Less hairy than bumblebees.',sizeShape:'Body 12–16 mm. Slender compared to bumblebees. Often seen with pollen loads on hind legs.',keyFeatures:'Slender waisted body, hairy eyes, pollen baskets on hind legs. Confusion: various hoverflies mimic bees but have large eyes and single wing pair.',habitat:'Almost any flower-rich habitat. Nests in hollow trees and managed hives.'},facts:['A single honey bee colony can contain 50,000 workers; they collectively fly the equivalent of three times around the Earth to make one jar of honey.','Honey Bee colonies have declined significantly in the UK due to Varroa mite infestation — virtually all wild colonies are affected.','The waggle dance communicates the direction and distance of food sources with remarkable precision.','Pollinates approximately a third of the human food supply — their ecosystem service is estimated at over £600 million annually in the UK.']},

{type:'invertebrates',icon:'🐝',commonName:'Common Carder Bee',taxonomicName:'Bombus pascuorum',habitat:'Garden, Meadow & Hedgerow',taxonomy:[{rank:'Order',name:'Hymenoptera'},{rank:'Family',name:'Apidae'},{rank:'Genus',name:'Bombus'},{rank:'Species',name:'B. pascuorum'}],id:{colour:'<strong>Uniformly ginger-brown and fluffy throughout</strong> — no yellow or white bands.',sizeShape:'Queen 15–18 mm; worker 9–15 mm. Medium-sized bumblebee.',keyFeatures:'All-ginger colouration unique among UK bumblebees. Confusion: none — only uniformly ginger bumblebee.',habitat:'Gardens, meadows, hedgerows, woodland edge. One of the most widespread and late-flying bumblebees.'},facts:['The only entirely ginger-brown bumblebee in Britain — the lack of yellow bands makes it instantly identifiable.','One of the latest-flying bumblebees — colonies persist into October and November in mild years.','Carder bees comb (card) moss and plant fibres to build surface or underground nests — hence the name.','One of the bumblebees most amenable to garden habitats — tubular flowers like foxglove and red clover are preferred.']},

{type:'invertebrates',icon:'🦋',commonName:'Six-spot Burnet Moth',taxonomicName:'Zygaena filipendulae',habitat:'Chalk Grassland, Dunes & Meadow',taxonomy:[{rank:'Order',name:'Lepidoptera'},{rank:'Family',name:'Zygaenidae'},{rank:'Genus',name:'Zygaena'},{rank:'Species',name:'Z. filipendulae'}],id:{colour:'<strong>Metallic blue-black forewings with six vivid red spots; red hindwings</strong> — unmistakeable.',sizeShape:'Wingspan 30–40 mm. Day-flying moth.',keyFeatures:'Six red spots on metallic black = only UK moth with this combination. Red hindwings visible in flight.',habitat:'Chalk and limestone grassland, coastal dunes, unimproved meadows. Birdsfoot Trefoil essential.'},facts:['A day-flying moth that mimics the warning colours of wasps — its vivid red spots advertise that it contains hydrogen cyanide.','Genuinely poisonous — the cyanide comes from the larval foodplant (Birdsfoot Trefoil) and is retained by the adult.','The papery cocoon is attached to grass stems and is visible through winter.','Six-spot Burnet is the commonest Zygaena in the UK — abundant on chalk grassland in July.']},

{type:'invertebrates',icon:'🐛',commonName:'Stag Beetle',taxonomicName:'Lucanus cervus',habitat:'Ancient Woodland & Suburban Garden',taxonomy:[{rank:'Order',name:'Coleoptera'},{rank:'Family',name:'Lucanidae'},{rank:'Genus',name:'Lucanus'},{rank:'Species',name:'L. cervus'}],id:{colour:'Black thorax and abdomen; <strong>reddish-brown elytra (wing cases).</strong> Male has enormous antler-like mandibles.',sizeShape:'Male 35–75 mm — Britain\'s largest beetle. Female 30–50 mm, smaller mandibles.',keyFeatures:'Male\'s antler mandibles unmistakeable. Female: smaller mandibles but same large size and brown elytra.',habitat:'Ancient woodland, suburban gardens with old stumps. Larvae develop in dead oak roots.'},facts:['The UK\'s largest beetle — the male\'s antler-like mandibles are used in wrestling contests for females.','Larvae spend 3–7 years developing inside dead oak roots before a single summer as an adult.','Adults do not eat solid food — they drink tree sap and rotting fruit juice.','A priority Species of Principal Importance — largely restricted to south-east England, centred on London and Surrey.']},

{type:'invertebrates',icon:'🐛',commonName:'Garden Tiger Moth',taxonomicName:'Arctia caja',habitat:'Garden, Hedgerow & Rough Grassland',taxonomy:[{rank:'Order',name:'Lepidoptera'},{rank:'Family',name:'Erebidae'},{rank:'Genus',name:'Arctia'},{rank:'Species',name:'A. caja'}],id:{colour:'Forewings: <strong>white with bold dark chocolate-brown irregular blotches.</strong> Hindwings: vivid orange with bold black spots.',sizeShape:'Wingspan 45–65 mm. Striking, unmistakeable in UK fauna.',keyFeatures:'Chocolate-white forewing and vivid orange-spotted hindwing unique. Confusion: none.',habitat:'Gardens, hedgerows, rough grassland, moorland.'},facts:['The Garden Tiger Moth has declined approximately 89% in the UK since the 1970s — one of the steepest declines of any invertebrate.','The caterpillar is the "woolly bear" — densely covered in long brown-black hairs, one of the most recognisable British caterpillars.','When threatened, the moth exposes the vivid hindwings and produces foul-smelling froth — effective against most predators.','Warmer, wetter winters caused by climate change are believed to be the primary cause of its dramatic decline.']},

{type:'invertebrates',icon:'🦗',commonName:'Great Green Bush-cricket',taxonomicName:'Tettigonia viridissima',habitat:'Scrub, Tall Grassland & Hedgerow',taxonomy:[{rank:'Order',name:'Orthoptera'},{rank:'Family',name:'Tettigoniidae'},{rank:'Genus',name:'Tettigonia'},{rank:'Species',name:'T. viridissima'}],id:{colour:'<strong>Vivid green throughout</strong> — perfectly camouflaged in vegetation. Brown dorsal stripe.',sizeShape:'Body 28–36 mm — Britain\'s largest cricket or grasshopper.',keyFeatures:'Huge size and vivid green. Long antennae (longer than body). Female has long curved ovipositor.',habitat:'Tall grassland, scrub, bramble thickets, tall hedges. Mainly coastal and southern England.'},facts:['Britain\'s largest orthopteran insect — a full-grown female can be nearly 4 cm long, not counting the ovipositor.','The stridulation — produced by wing-rubbing — is one of the loudest insect calls in Britain, audible 50 metres away.','Active from July to October, singing loudest in warm afternoons and evenings.','Expanding northward in Britain as summers warm — a documented climate change response.']},

{type:'invertebrates',icon:'🕷️',commonName:'Garden Spider',taxonomicName:'Araneus diadematus',habitat:'Garden, Hedgerow & Meadow',taxonomy:[{rank:'Order',name:'Araneae'},{rank:'Family',name:'Araneidae'},{rank:'Genus',name:'Araneus'},{rank:'Species',name:'A. diadematus'}],id:{colour:'Variable orange-brown to grey. <strong>Distinctive white cross of spots on abdomen — the "diadem."</strong>',sizeShape:'Female body 10–13 mm; male 4–8 mm. Large, round abdomen.',keyFeatures:'White cross on abdomen diagnostic. Confusion: Four-spot Orb-weaver lacks white cross.',habitat:'Gardens, hedgerows, meadows, bramble thickets. Builds large orb web.'},facts:['The most familiar spider in British gardens — the white cross on the abdomen gives rise to the "cross spider" name.','Females build a new orb web every day — consuming the old web at dawn and recycling the silk protein.','Males are one-third the size of females and risk being eaten during mating — they approach extremely cautiously.','Populations peak in August and September when adult females are at their largest — the classic "harvest spider" of late summer.']},

{type:'trees',icon:'🌿',commonName:'White Willow',taxonomicName:'Salix alba',habitat:'Riverbank, Floodplain & Wet Meadow',taxonomy:[{rank:'Order',name:'Malpighiales'},{rank:'Family',name:'Salicaceae'},{rank:'Genus',name:'Salix'},{rank:'Species',name:'S. alba'}],id:{bark:'Grey, deeply fissured in old trees. Twigs slender, flexible, yellowish or olive.',leaves:'Narrow lance-shaped, 5–10 cm; <strong>silvery-silky white on both surfaces when young</strong> — diagnostic. Alternate.',branchLeaf:'Alternate. Broad domed crown. Catkins appear with leaves in April. Tiny cottony seeds June.',habitat:'Riverbanks, floodplains, wet meadows. Almost always beside water.'},facts:['The silver-white undersides of the leaves flickering in the wind are one of the most beautiful sights of a riverside summer.','Cricket bat willow (var. caerulea) is cultivated specifically for cricket bat blades — requiring specific floodplain soils and management.','Aspirin (salicylic acid) was originally derived from willow bark — used medicinally for millennia.','White Willow can live to several hundred years and old pollards are important habitats for hole-nesting birds and bats.']},

{type:'trees',icon:'🌿',commonName:'Crack Willow',taxonomicName:'Salix fragilis',habitat:'Riverbank, Lake Margin & Wet Woodland',taxonomy:[{rank:'Order',name:'Malpighiales'},{rank:'Family',name:'Salicaceae'},{rank:'Genus',name:'Salix'},{rank:'Species',name:'S. fragilis'}],id:{bark:'Grey-brown; deeply fissured in older trees.',leaves:'Lance-shaped, 6–15 cm; green on both surfaces (not silvery). Finely toothed. Shiny above.',branchLeaf:'Alternate. Spreading crown. <strong>Twigs snap off cleanly at the joint with a sharp crack</strong> — diagnostic.',habitat:'Riverbanks, lake margins, wet woodland. Frequently found with White Willow.'},facts:['The name comes from the audible crack when a twig is snapped at the joint — unique among UK trees.','Broken twigs float downstream and root where they lodge — the tree\'s primary dispersal mechanism.','Ancient crack willow pollards along chalk rivers are important invertebrate habitats.','Hybridises readily with White Willow — pure Crack Willows are less common than hybrids.']},

{type:'trees',icon:'🌿',commonName:'Goat Willow',taxonomicName:'Salix caprea',habitat:'Woodland Edge, Scrub & Hedgerow',taxonomy:[{rank:'Order',name:'Malpighiales'},{rank:'Family',name:'Salicaceae'},{rank:'Genus',name:'Salix'},{rank:'Species',name:'S. caprea'}],id:{bark:'Grey-brown, fissured. Twigs stout, grey-hairy when young.',leaves:'Broad oval to almost round, 5–12 cm; <strong>wrinkled, greyish-green above; grey-woolly below.</strong> Much broader than other UK willows.',branchLeaf:'Alternate. <strong>Catkins (pussy willows) appear February–April before leaves</strong> — one of the first spring flowers.',habitat:'Woodland edge, scrub, hedgerows, disturbed ground. The most drought-tolerant UK willow.'},facts:['Pussy willow catkins are among the most important early-spring nectar and pollen sources — visited by queen bumblebees and early bees before most other flowers open.','The broad oval leaves are unlike any other UK willow — easily identified by leaf shape alone.','Pioneer species on disturbed ground and after coppicing — one of the first trees to colonise cleared areas.','Male catkins produce the familiar silky grey buds before opening to yellow pollen-laden flowers.']},

{type:'trees',icon:'🌿',commonName:'Common Whitebeam',taxonomicName:'Sorbus aria',habitat:'Chalk & Limestone Woodland Edge and Scrub',taxonomy:[{rank:'Order',name:'Rosales'},{rank:'Family',name:'Rosaceae'},{rank:'Genus',name:'Sorbus'},{rank:'Species',name:'S. aria'}],id:{bark:'Grey, smooth when young; developing shallow fissures. Twigs grey-downy.',leaves:'Oval, 5–12 cm; <strong>upper surface green, undersurface brilliant white-felty</strong> — spectacular when wind shows undersides.',branchLeaf:'Alternate. Dense white flower clusters May. <strong>Clusters of scarlet berries September–October.</strong>',habitat:'Chalk and limestone scrub, woodland edge, cliff faces. Specialist of calcareous soils.'},facts:['The undersides of the leaves are so white that a whitebeam in a breeze looks like it is covered in snow.','Whitebeam berries are eaten by thrushes, especially mistle thrush, which defend berry-laden trees as winter territories.','Several rare endemic whitebeam microspecies grow on the Avon Gorge and Brecon Beacons — found nowhere else in the world.','The hard, dense wood was used for cog wheels and gear teeth in mills.']},

{type:'trees',icon:'🌿',commonName:'Black Poplar',taxonomicName:'Populus nigra subsp. betulifolia',habitat:'Floodplain, Riverbank & Wet Meadow',taxonomy:[{rank:'Order',name:'Malpighiales'},{rank:'Family',name:'Salicaceae'},{rank:'Genus',name:'Populus'},{rank:'Species',name:'P. nigra'}],id:{bark:'Very dark grey-brown; deeply furrowed with large bosses and burrs. Massive trunk.',leaves:'Triangular to diamond-shaped; bright green; flattened petiole causes leaves to tremble in breeze.',branchLeaf:'Alternate. <strong>Distinctive arching branches with downswept tips; massive bossy trunk.</strong> Crimson male catkins March.',habitat:'Floodplain meadows, riverbanks, traditional farmland. Almost entirely in central England.'},facts:['One of the rarest native trees in Britain — fewer than 7,000 remain, mostly in the English Midlands.','Almost all surviving Black Poplars are male — the female is extremely rare.','The massive bossy trunk and downswept arching branch-tips are unmistakeable once learned.','Constable\'s paintings of the Stour Valley often feature Black Poplars — a tree of the traditional English pastoral landscape.']},

{type:'trees',icon:'🌲',commonName:'Yew',taxonomicName:'Taxus baccata',habitat:'Chalk Woodland, Churchyard & Limestone Scrub',taxonomy:[{rank:'Order',name:'Taxales'},{rank:'Family',name:'Taxaceae'},{rank:'Genus',name:'Taxus'},{rank:'Species',name:'T. baccata'}],id:{bark:'<strong>Distinctive reddish-purple, flaking and peeling in thin strips.</strong> Often multiple fused trunks.',leaves:'Dark green, flat needles in two rows; <strong>pale below.</strong> Evergreen. Entire plant toxic except red aril.',branchLeaf:'Alternate/spiral. Female trees produce bright red berries (arils) enclosing a toxic seed.',habitat:'Chalk and limestone woodland, ancient churchyards, limestone pavement. Deep shade tolerant.'},facts:['The oldest living organisms in Britain are Yews — the Fortingall Yew in Perthshire is estimated at 2,000–5,000 years old.','Almost all parts are poisonous — the taxine alkaloids are lethal to horses, cattle, and humans. Only the red aril (not the seed inside) is non-toxic.','Yew wood is the finest bowwood — English longbows were made from yew imported from Spain and Portugal.','Taxol, derived from Yew bark, is one of the most important anti-cancer drugs in use today.']},

{type:'trees',icon:'🌿',commonName:'Small-leaved Lime',taxonomicName:'Tilia cordata',habitat:'Ancient Woodland on Limestone & Clay',taxonomy:[{rank:'Order',name:'Malvales'},{rank:'Family',name:'Malvaceae'},{rank:'Genus',name:'Tilia'},{rank:'Species',name:'T. cordata'}],id:{bark:'Grey, smooth when young; developing interlacing ridges with age.',leaves:'Heart-shaped, 3–9 cm; <strong>abruptly pointed tip; tufts of reddish hairs in vein axils below</strong> — diagnostic vs. Large-leaved Lime.',branchLeaf:'Alternate. Drooping clusters of fragrant cream flowers July. Winged fruits (nutlets).',habitat:'Ancient woodland, especially limestone. Rare except locally — relict woodland indicator.'},facts:['Small-leaved Lime is the most reliable ancient woodland indicator tree in England — its presence almost always signals woodland of great antiquity.','The fragrant flowers in July are extraordinarily rich in nectar — lime honey is highly prized.','Lime wood is the finest carving wood in Europe — Grinling Gibbons used it for the carvings at St Paul\'s Cathedral.','The reddish hair tufts in leaf vein axils are the single most reliable character distinguishing it from other limes.']},

{type:'trees',icon:'🌿',commonName:'Wych Elm',taxonomicName:'Ulmus glabra',habitat:'Upland Woodland, Rocky Gorge & Hedgerow',taxonomy:[{rank:'Order',name:'Rosales'},{rank:'Family',name:'Ulmaceae'},{rank:'Genus',name:'Ulmus'},{rank:'Species',name:'U. glabra'}],id:{bark:'Grey, smooth when young; developing interlacing ridges. No suckers (unlike English Elm).',leaves:'Oval, 7–16 cm; <strong>very rough sandpaper surface above; unequal leaf base — one side longer</strong> — diagnostic.',branchLeaf:'Alternate. Flowers appear before leaves February–March. Winged seeds (samaras) May–June.',habitat:'Upland ravines, rocky woodland, hedgerows. More resistant to Dutch elm disease than English Elm.'},facts:['The only elm native to Scotland and northern Britain — English Elm is largely a planted southern species.','The highly asymmetric leaf base (one side much larger than the other) is the most reliable identification character.','Wych Elm is more resistant to Dutch elm disease than English Elm — some trees survive, though none reach full maturity.','Elm bark beetle galleries under dead bark are the primary habitat for the White Letter Hairstreak butterfly larva.']},

{type:'trees',icon:'🌸',commonName:'Wild Service Tree',taxonomicName:'Sorbus torminalis',habitat:'Ancient Woodland on Heavy Clay & Limestone',taxonomy:[{rank:'Order',name:'Rosales'},{rank:'Family',name:'Rosaceae'},{rank:'Genus',name:'Sorbus'},{rank:'Species',name:'S. torminalis'}],id:{bark:'Dark brown-grey; breaking into small square plates — resembling a reptile skin.',leaves:'Maple-like, with 3–5 pairs of pointed lobes. <strong>Dark glossy green; spectacular deep red in autumn.</strong>',branchLeaf:'Alternate. White flowers in flat clusters May–June. Small brown russet berries (chequers) October.',habitat:'Ancient woodland, especially on heavy clay and limestone. Reliable ancient woodland indicator.'},facts:['Wild Service Tree is one of the most reliable ancient woodland indicator species in England.','The brown berries (chequers) were traditionally gathered after the first frost — they become sweet and edible when bletted. Chequer Inns are named after it.','The maple-like leaves turning brilliant red make it one of the finest autumn trees in Britain.','Reproduces mainly by suckers in the UK — rarely sets viable seed — so it spreads very slowly, reinforcing its value as an ancient woodland indicator.']},

{type:'trees',icon:'🌿',commonName:'Common Lime',taxonomicName:'Tilia x europaea',habitat:'Parkland, Avenue & Urban Street',taxonomy:[{rank:'Order',name:'Malvales'},{rank:'Family',name:'Malvaceae'},{rank:'Genus',name:'Tilia'},{rank:'Species',name:'T. x europaea'}],id:{bark:'Grey, developing ridges and bosses. Often with epicormic shoots and large burrs at base.',leaves:'Heart-shaped, 6–10 cm; asymmetric base; <strong>white hair tufts in vein axils below</strong> — intermediate between parents.',branchLeaf:'Alternate. Fragrant cream flowers July on winged bracts. Produces copious sticky honeydew from aphids.',habitat:'Parks, avenues, streets, estates. Widely planted — the most common lime in the UK.'},facts:['A natural hybrid between Small-leaved and Large-leaved Lime — not native but widely naturalised.','Produces vast quantities of sticky honeydew from aphid colonies — parked cars beneath limes are famously coated in it.','The fragrant July flowers attract enormous numbers of bees — a humming lime avenue in full flower is one of summer\'s great sounds.','Epicormic shoots sprouting from the base and trunk are a characteristic feature of old Common Limes.']},

{type:'shrubs',icon:'🌿',commonName:'Buckthorn',taxonomicName:'Rhamnus cathartica',habitat:'Chalk & Limestone Scrub and Hedgerow',taxonomy:[{rank:'Order',name:'Rosales'},{rank:'Family',name:'Rhamnaceae'},{rank:'Genus',name:'Rhamnus'},{rank:'Species',name:'R. cathartica'}],id:{bark:'Dark grey-brown; scaly. Twigs often end in a stout spine.',leaves:'Oval, 3–6 cm; opposite or sub-opposite; <strong>3–4 pairs of veins curving toward tip</strong>. Finely toothed.',branchLeaf:'Opposite/sub-opposite. Small greenish-white flowers May–June. <strong>Clusters of shiny black berries</strong> August–October.',habitat:'Chalk and limestone scrub, fen carr, ancient hedgerows on calcareous soils.'},facts:['Buckthorn berries are strongly purgative — the specific epithet cathartica means "purging." Even small quantities cause violent diarrhoea.','The larval foodplant of the Brimstone butterfly — Brimstone distribution closely mirrors Buckthorn distribution.','The bark produces a yellow-green dye historically used in manuscript illumination.','Indicator of ancient chalk hedgerow and calcareous scrub.']},

{type:'shrubs',icon:'🌿',commonName:'Wild Privet',taxonomicName:'Ligustrum vulgare',habitat:'Chalk & Limestone Hedgerow and Scrub',taxonomy:[{rank:'Order',name:'Lamiales'},{rank:'Family',name:'Oleaceae'},{rank:'Genus',name:'Ligustrum'},{rank:'Species',name:'L. vulgare'}],id:{bark:'Grey-brown, smooth. Opposite-branching.',leaves:'Narrow oval, 3–6 cm; <strong>semi-evergreen — retaining leaves into winter in mild years.</strong> Opposite, glossy dark green.',branchLeaf:'Opposite. Dense terminal panicles of white flowers June–July — <strong>strongly and unpleasantly fragrant.</strong> Glossy black berries autumn–winter.',habitat:'Chalk and limestone hedgerows, scrub, woodland edge. Mainly southern Britain.'},facts:['Native Privet is distinct from the ubiquitous garden hedging privet (Ligustrum ovalifolium, a Japanese species).','The black berries are toxic to humans but eaten by blackbirds, thrushes, and other birds in late autumn.','The flowers have an intensely sweet, slightly fetid smell that is distinctive and divisive — loved by insects.','The fruit provides an important winter food source when other berries are exhausted.']},

{type:'shrubs',icon:'🌿',commonName:'Honeysuckle',taxonomicName:'Lonicera periclymenum',habitat:'Woodland, Hedgerow & Scrub',taxonomy:[{rank:'Order',name:'Dipsacales'},{rank:'Family',name:'Caprifoliaceae'},{rank:'Genus',name:'Lonicera'},{rank:'Species',name:'L. periclymenum'}],id:{bark:'Twining, woody climber. Bark peeling in strips on older stems.',leaves:'Oval, 4–7 cm; opposite; upper pair fused around stem. Blue-green below.',branchLeaf:'Opposite. <strong>Cream-yellow tubular flowers June–September; intensely fragrant at dusk.</strong> Clusters of red berries autumn.',habitat:'Woodland, hedgerows, scrub. Climbs clockwise through other vegetation.'},facts:['Honeysuckle flowers produce their strongest scent at dusk to attract hawkmoths — the primary pollinators.','The long corolla tube (up to 5 cm) can only be reached by long-tongued moths and bumblebees.','Dormouse nests are often made from strips of honeysuckle bark — finding shredded bark is a sign of dormouse presence.','Where honeysuckle twines tightly around a young tree it can create a permanent spiral groove in the trunk — "walking stick ash."']},

{type:'shrubs',icon:'🌿',commonName:'Dogwood',taxonomicName:'Cornus sanguinea',habitat:'Chalk & Limestone Scrub and Hedgerow',taxonomy:[{rank:'Order',name:'Cornales'},{rank:'Family',name:'Cornaceae'},{rank:'Genus',name:'Cornus'},{rank:'Species',name:'C. sanguinea'}],id:{bark:'<strong>Vivid dark red stems in winter — one of the most striking winter shrubs in the British countryside.</strong>',leaves:'Oval, 4–8 cm; opposite; with 3–4 pairs of veins curving toward tip. Deep red in autumn.',branchLeaf:'Opposite. Flat-topped clusters of white flowers June–July. Dull black berries September.',habitat:'Chalk and limestone scrub, ancient hedgerows, woodland edge. Indicator of calcareous soils.'},facts:['The vivid crimson winter stems are unmistakeable — a planted dogwood hedge is one of the most dramatic winter garden features.','Dogwood is one of the most reliable indicators of ancient chalk and limestone hedgerow.','The berries contain bitter oil historically used to make soap and lamp oil.','The hard, close-grained wood was used for skewers (hence "dog" from "dag," meaning skewer).']},

{type:'shrubs',icon:'🟠',commonName:'Traveller\'s Joy',taxonomicName:'Clematis vitalba',habitat:'Chalk & Limestone Hedgerow and Scrub',taxonomy:[{rank:'Order',name:'Ranunculales'},{rank:'Family',name:'Ranunculaceae'},{rank:'Genus',name:'Clematis'},{rank:'Species',name:'C. vitalba'}],id:{bark:'Twining, woody climber; grey-brown, fibrous, peeling bark.',leaves:'Pinnate; 3–5 leaflets, oval, entire or toothed. Leaf stalks used as tendrils.',branchLeaf:'Opposite. Creamy-white, slightly fragrant flowers July–August. <strong>Fluffy silver seed heads persist all winter — "old man\'s beard."</strong>',habitat:'Chalk and limestone hedgerows, scrub, woodland edge. Mainly southern Britain.'},facts:['"Old man\'s beard" seed heads in winter are one of the most recognisable features of chalk downland hedgerows.','The only native clematis in Britain — all other climbers in gardens are introductions.','Traveller\'s Joy can scramble 20+ metres through trees, occasionally smothering smaller shrubs under its weight.','Children historically used the hollow stems as "tobacco pipes" — inhaling the smoke was mildly intoxicating (and toxic).']},

{type:'forbs',icon:'🟡',commonName:'Meadowsweet',taxonomicName:'Filipendula ulmaria',habitat:'Wet Meadow, Marsh, Fen & Streamside',taxonomy:[{rank:'Order',name:'Rosales'},{rank:'Family',name:'Rosaceae'},{rank:'Genus',name:'Filipendula'},{rank:'Species',name:'F. ulmaria'}],id:{bark:'N/A — tall perennial herb 60–120 cm.',leaves:'Pinnate; large terminal leaflet; alternate small and large leaflets. Dark green above; white-felty below.',branchLeaf:'Alternate. <strong>Dense frothy clusters of tiny cream flowers June–August; intensely sweet almond-honey fragrance.</strong>',habitat:'Wet meadows, marshes, fen, streamsides, ditch banks. The most characteristic tall herb of wet grassland.'},facts:['Meadowsweet was historically strewn on floors as a room freshener — including in Westminster Hall.','Salicylic acid (aspirin\'s precursor) was first synthesised from Meadowsweet flowers in 1839 — the name aspirin comes from Spiraea (old genus name for Meadowsweet).','The fragrance intensifies after rain and in the evening — one of the most evocative summer smells.','Queen Elizabeth I is said to have preferred Meadowsweet above all other strewing herbs.']},

{type:'forbs',icon:'🟣',commonName:'Devil\'s-bit Scabious',taxonomicName:'Succisa pratensis',habitat:'Damp Meadow, Marsh & Woodland Ride',taxonomy:[{rank:'Order',name:'Dipsacales'},{rank:'Family',name:'Caprifoliaceae'},{rank:'Genus',name:'Succisa'},{rank:'Species',name:'S. pratensis'}],id:{bark:'N/A — perennial herb 15–100 cm.',leaves:'Basal leaves oval to lance-shaped; stem leaves narrower, often slightly toothed. Opposite.',branchLeaf:'Opposite. <strong>Deep blue-purple rounded flower heads August–October</strong> on long stalks. Four petals per floret.',habitat:'Damp meadows, marshes, woodland rides, upland grassland. Tolerates waterlogged ground.'},facts:['One of the most important late-season wildflowers for pollinators — bumblebees, butterflies, and hoverflies feed on it into October.','The sole larval foodplant of the Marsh Fritillary butterfly — one of the UK\'s most endangered insects.','The abruptly truncated (bitten-off) rootstock gives the plant its name — legend says the devil bit it off out of spite.','Flowers late into autumn — still blooming when most other wildflowers have finished.']},

{type:'forbs',icon:'💛',commonName:'Agrimony',taxonomicName:'Agrimonia eupatoria',habitat:'Hedgebank, Meadow Edge & Chalk Grassland',taxonomy:[{rank:'Order',name:'Rosales'},{rank:'Family',name:'Rosaceae'},{rank:'Genus',name:'Agrimonia'},{rank:'Species',name:'A. eupatoria'}],id:{bark:'N/A — perennial herb 30–60 cm. Slightly aromatic.',leaves:'Pinnate with alternating large and small leaflets; hairy. Greyish-green.',branchLeaf:'Alternate. <strong>Long, slender spike of small yellow 5-petalled flowers June–August.</strong> Hooked burrs in autumn.',habitat:'Hedgebanks, meadow edges, chalk grassland, roadside verges. Warm, well-drained soils.'},facts:['The hooked burrs are a classic example of animal dispersal — attaching to fur and clothing to travel long distances.','Agrimony tea was a traditional herbal remedy for sore throats and liver complaints — still sold in health food shops.','The apricot fragrance from the dried plant was used in pot-pourri.','One of the most distinctive tall herbs of chalk hedgebanks in late summer.']},

{type:'forbs',icon:'🟠',commonName:'Foxglove',taxonomicName:'Digitalis purpurea',habitat:'Woodland Clearing, Hillside & Heathland',taxonomy:[{rank:'Order',name:'Lamiales'},{rank:'Family',name:'Plantaginaceae'},{rank:'Genus',name:'Digitalis'},{rank:'Species',name:'D. purpurea'}],id:{bark:'N/A — biennial (occasionally perennial) herb 50–150 cm. Rosette in year one; tall spike in year two.',leaves:'Large, oval, 15–30 cm; grey-green; <strong>softly woolly beneath.</strong> Strong veins.',branchLeaf:'Alternate. <strong>Tall one-sided spike of tubular purple (occasionally white) flowers June–August</strong> with dark-spotted interior.',habitat:'Woodland clearings after felling, hillside, heathland, rocky slopes on acid soils.'},facts:['Digitalis (from Foxglove) is the source of digoxin — the heart medicine still used for heart failure and arrhythmia today.','A biennial — spectacular second-year spikes arise from unremarkable first-year rosettes.','The interior spots guide bumblebees to nectar — the long tubes are almost exclusive to long-tongued bumblebees.','After woodland clearance, Foxgloves can carpet entire clearings — light stimulates germination of long-dormant seeds.']},

{type:'forbs',icon:'💛',commonName:'Kidney Vetch',taxonomicName:'Anthyllis vulneraria',habitat:'Chalk & Limestone Grassland and Coastal Cliff',taxonomy:[{rank:'Order',name:'Fabales'},{rank:'Family',name:'Fabaceae'},{rank:'Genus',name:'Anthyllis'},{rank:'Species',name:'A. vulneraria'}],id:{bark:'N/A — perennial herb 15–60 cm. Silky-hairy throughout.',leaves:'Pinnate; 1–7 pairs of leaflets plus terminal; grey-silky.',branchLeaf:'Alternate. <strong>Dense rounded flower heads yellow (most common) to orange or red — highly variable.</strong> Distinctive inflated calyx.',habitat:'Chalk and limestone grassland, coastal cliffs and dunes, calcareous roadside banks.'},facts:['The sole larval foodplant of the Small Blue butterfly — Britain\'s smallest butterfly, entirely dependent on Kidney Vetch.','The inflated, woolly calyx is unmistakeable — resembling a small cream pillow enclosing the flower.','Colour varies from pale yellow to deep orange and red — occasionally different-coloured flower heads on the same plant.','One of the best wildflowers for chalk grassland creation and restoration.']},

{type:'grasses',icon:'🌾',commonName:'Pendulous Sedge',taxonomicName:'Carex pendula',habitat:'Damp Woodland, Streamside & Wet Ride',taxonomy:[{rank:'Family',name:'Cyperaceae'},{rank:'Genus',name:'Carex'},{rank:'Species',name:'C. pendula'}],id:{bark:'N/A — large, robust, tussock-forming sedge 60–180 cm.',leaves:'Broad, flat, keeled; 1.5–2 cm wide; bright green above, grey-green below. Long, arching.',branchLeaf:'Alternate. Tall, arching stems. <strong>Long, drooping (pendulous) female spikes 7–16 cm</strong> hanging from arching stem tips. Distinctive.',habitat:'Damp woodland, streamsides, wet rides, fen carr. The largest native sedge in Britain.'},facts:['The long, pendulous spikelets drooping from arching stems are completely unmistakeable — the most architecturally distinctive sedge in the UK.','A classic indicator of ancient damp woodland — often forming large colonies in undisturbed wet woodland rides.','The seeds are eaten by tits and finches in winter.','Widely grown in gardens for its bold architectural foliage — but can spread aggressively from self-seeded plants.']},

{type:'grasses',icon:'🌾',commonName:'Meadow Barley',taxonomicName:'Hordeum secalinum',habitat:'Traditional Hay Meadow & Damp Grassland',taxonomy:[{rank:'Family',name:'Poaceae'},{rank:'Genus',name:'Hordeum'},{rank:'Species',name:'H. secalinum'}],id:{bark:'N/A — slender perennial 30–70 cm.',leaves:'Flat, 2–5 mm; with auricles clasping stem. Rolled in bud.',branchLeaf:'Erect. <strong>Dense, cylindrical spike with distinctive long awns giving a bristly appearance</strong> — like a miniature barley head.',habitat:'Traditional unimproved hay meadows and damp grassland on neutral to calcareous soils.'},facts:['Meadow Barley is a reliable indicator of old, unimproved, traditionally managed grassland.','Declined significantly with agricultural intensification and drainage of hay meadows.','The miniature barley-like spikelets are unmistakeable in the field from June onwards.','One of the suite of indicator species used by Natural England to assess ancient meadow quality.']},

{type:'grasses',icon:'🌾',commonName:'Common Spike-rush',taxonomicName:'Eleocharis palustris',habitat:'Pond Margins, Marsh & Ditch',taxonomy:[{rank:'Family',name:'Cyperaceae'},{rank:'Genus',name:'Eleocharis'},{rank:'Species',name:'E. palustris'}],id:{bark:'N/A — creeping, colony-forming perennial 10–60 cm.',leaves:'<strong>Leaves entirely reduced to sheaths — no blade at all.</strong> Stems round, bright green, photosynthetic.',branchLeaf:'Stems arise from rhizome. <strong>Single oval brown spikelet at stem tip.</strong> No leaves.',habitat:'Pond margins, shallow marsh, ditches, lake edges. Forms dense green mats in shallow water.'},facts:['The complete absence of leaves — replaced entirely by photosynthetic stems — is unique and diagnostic.','One of the most important aquatic plants for pond invertebrates — dragonfly and damselfly nymphs shelter among the stems.','Dense colonies stabilise pond margins and provide critical habitat for water rail and reed bunting.','One of the first plants to colonise new ponds — a good indicator of water quality.']},

{type:'grasses',icon:'🌾',commonName:'Greater Tussock Sedge',taxonomicName:'Carex paniculata',habitat:'Fen Carr, Wet Woodland & Bog Edge',taxonomy:[{rank:'Family',name:'Cyperaceae'},{rank:'Genus',name:'Carex'},{rank:'Species',name:'C. paniculata'}],id:{bark:'N/A — forms enormous tussocks up to 1 m tall and wide. Very robust.',leaves:'Long, narrow, keeled; rough-edged. Arching from tussock top.',branchLeaf:'Alternate. <strong>Massive, distinctive tussocks are the most reliable identification feature.</strong> Branched panicle of brown spikelets.',habitat:'Fen carr, wet alder woodland, bog edges, wet flushes. Often in standing water.'},facts:['The massive tussocks — sometimes exceeding a metre in height and diameter — are completely unmistakeable.','Tussock tops are important nesting sites for grasshopper warbler and sedge warbler.','Old tussocks may be decades old — slow-growing, long-lived structures that accumulate dead material.','A reliable indicator of ancient, undisturbed fen carr and wet woodland.']},

{type:'ferns',icon:'🌿',commonName:'Sea Spleenwort',taxonomicName:'Asplenium marinum',habitat:'Coastal Sea Caves, Cliffs & Rocky Shore',taxonomy:[{rank:'Division',name:'Polypodiophyta'},{rank:'Family',name:'Aspleniaceae'},{rank:'Genus',name:'Asplenium'},{rank:'Species',name:'A. marinum'}],id:{bark:'Tufted. Short, dark stipe with brown scales.',leaves:'Fronds 8–30 cm; once-pinnate; <strong>pinnae broadly oblong with rounded tip and toothed margin; thick, leathery, glossy.</strong>',branchLeaf:'Fronds spreading to pendulous from cliff crevices. Sori elongated on pinnae underside.',habitat:'Sea caves, maritime cliffs, rock crevices above the spray zone. Strictly coastal.'},facts:['Sea Spleenwort is the only British fern confined to coastal habitats — it requires salt spray and will not survive inland.','The leathery, glossy fronds are an adaptation to withstand salt spray and desiccation.','Restricted to western and southern coasts — most abundant in south-west England, Wales, and western Scotland.','Found growing in caves and cliff crevices where spray reaches but waves do not.']},

{type:'ferns',icon:'🌿',commonName:'Rusty-back Fern',taxonomicName:'Asplenium ceterach',habitat:'Drystone Walls, Limestone Rock & Old Mortar',taxonomy:[{rank:'Division',name:'Polypodiophyta'},{rank:'Family',name:'Aspleniaceae'},{rank:'Genus',name:'Asplenium'},{rank:'Species',name:'A. ceterach'}],id:{bark:'Tufted. Very short stipe.',leaves:'Fronds 4–20 cm; once-pinnate with rounded lobes. <strong>Underside completely covered in rusty-brown scales</strong> — the most distinctive feature.',branchLeaf:'Fronds spreading from wall crevices. Upper surface grey-green; underside solid rusty-brown.',habitat:'Limestone walls, mortared buildings, limestone rock faces. Requires alkaline substrates.'},facts:['The rusty-brown scale-covered undersides are completely unmistakeable — no other British fern has this character.','Remarkably drought-tolerant — the scales trap moisture and the fronds curl up and go dormant in dry weather, reviving fully after rain.','A classic feature of old limestone walls throughout Britain.','The scales are modified hairs (paraphyses) that protect the sori from desiccation.']},

{type:'ferns',icon:'🌿',commonName:'Moonwort',taxonomicName:'Botrychium lunaria',habitat:'Upland Grassland, Dunes & Limestone',taxonomy:[{rank:'Division',name:'Polypodiophyta'},{rank:'Family',name:'Ophioglossaceae'},{rank:'Genus',name:'Botrychium'},{rank:'Species',name:'B. lunaria'}],id:{bark:'N/A — tiny, unusual fern 5–15 cm. Single frond with two distinct parts.',leaves:'<strong>Sterile part: one pinnate frond with crescent-shaped (lunate) pinnae — unmistakeable.</strong> Fertile part: erect, branched spike bearing sporangia.',branchLeaf:'Single frond divided into sterile (leaf-like) and fertile (spore-bearing) sections.',habitat:'Short upland grassland, dunes, limestone pavement, old churchyard turf.'},facts:['Moonwort is unlike any other British fern — the crescent-shaped pinnae are unique.','Lives partly underground in symbiosis with mycorrhizal fungi — it can survive for years without producing any fronds.','In folklore, Moonwort was believed to unshoe horses and pick locks — it was a plant of extraordinary magical reputation.','Very easily overlooked — the tiny fronds blend perfectly into short grassland turf.']},

{type:'ferns',icon:'🌿',commonName:'Adder\'s-tongue Fern',taxonomicName:'Ophioglossum vulgatum',habitat:'Old Grassland, Meadow & Dune Slack',taxonomy:[{rank:'Division',name:'Polypodiophyta'},{rank:'Family',name:'Ophioglossaceae'},{rank:'Genus',name:'Ophioglossum'},{rank:'Species',name:'O. vulgatum'}],id:{bark:'N/A — tiny, unusual fern 5–25 cm. Single frond.',leaves:'<strong>Sterile part: single oval, tongue-shaped, unlobed frond — unlike any other British fern.</strong> Fertile part: simple spike bearing two rows of sporangia.',branchLeaf:'Single undivided frond + fertile spike arising from the same base.',habitat:'Old unimproved grassland, meadow, dune slacks, churchyard turf. Indicator of old grassland.'},facts:['Ophioglossum has more chromosomes than almost any other plant on Earth — up to 1440 chromosomes per cell.','Easily overlooked — the single oval frond resembles a plantain leaf and can be invisible in dense grassland.','One of the most ancient fern families on Earth — the ophioglossoid ferns have barely changed in 350 million years.','A reliable indicator of old, unimproved grassland — populations may indicate ancient meadows or even old ridge-and-furrow.']},

{type:'ferns',icon:'🌿',commonName:'Parsley Fern',taxonomicName:'Cryptogramma crispa',habitat:'Upland Scree, Rocky Hillside & Mountain',taxonomy:[{rank:'Division',name:'Polypodiophyta'},{rank:'Family',name:'Cryptogrammaceae'},{rank:'Genus',name:'Cryptogramma'},{rank:'Species',name:'C. crispa'}],id:{bark:'Tufted. Short, slender stipe.',leaves:'<strong>Two distinct frond types: sterile fronds bright green, finely divided, resembling parsley; fertile fronds narrower with reflexed margins concealing sori.</strong>',branchLeaf:'Fronds arising in tufts from scree and rock crevices.',habitat:'Upland scree, rocky hillsides, mountain ridges on acid rocks. Mainly northern and western Britain.'},facts:['The bright green, finely divided sterile fronds genuinely resemble fresh parsley — the most striking fern in upland scree.','Like Hard Fern, the two distinct frond types (sterile and fertile) are immediately recognisable once learned.','Restricted to upland Britain — almost absent from lowland England.','One of the most attractive colonisers of upland scree and mountain rocks.']},

{type:'ferns',icon:'🌿',commonName:'Mountain Fern',taxonomicName:'Oreopteris limbosperma',habitat:'Upland Woodland, Streamside & Acid Flush',taxonomy:[{rank:'Division',name:'Polypodiophyta'},{rank:'Family',name:'Thelypteridaceae'},{rank:'Genus',name:'Oreopteris'},{rank:'Species',name:'O. limbosperma'}],id:{bark:'Tufted. Stipe short, pale green-brown.',leaves:'Fronds 20–100 cm; lance-shaped, <strong>narrowing abruptly at base (lower pinnae much shorter)</strong>. Strong lemon scent when crushed.',branchLeaf:'Erect to arching. Pale yellow glands visible on pinnae undersides with hand lens.',habitat:'Upland woodland, streamside, acidic flushes, damp moorland. Northern and western Britain.'},facts:['The lemon scent when fronds are crushed is completely unmistakeable — the only British fern reliably identified by smell.','The abrupt narrowing of the frond base with much-reduced lower pinnae is the best visual character.','Almost exclusively upland and western in distribution.','The yellow glands on pinnae undersides produce the lemon-scented volatile oil.']},

{type:'fungi',icon:'🍄',commonName:'Oak Mazegill',taxonomicName:'Daedalea quercina',habitat:'Dead Oak Wood & Stumps',taxonomy:[{rank:'Division',name:'Basidiomycota'},{rank:'Family',name:'Fomitopsidaceae'},{rank:'Genus',name:'Daedalea'},{rank:'Species',name:'D. quercina'}],id:{bark:'N/A',leaves:'Bracket-shaped, 8–30 cm; tough, corky; grey-brown above with concentric zones.',branchLeaf:'<strong>Pore surface below with elongated, labyrinthine, maze-like pores</strong> — completely unmistakeable. Cream to buff.',habitat:'Dead oak stumps and logs. Almost exclusively on oak. Causing brown rot.'},facts:['The maze-like (daedaleoid) pore surface is unique among UK bracket fungi — unmistakeable once seen.','One of the toughest of all UK fungi — the bracket is almost wood-hard and may persist for several years.','Causes brown rot in dead oak — important in the decomposition of ancient oak wood.','Named after Daedalus, the architect of the Labyrinth in Greek mythology.']},

{type:'fungi',icon:'🍄',commonName:'Waxcap',taxonomicName:'Hygrocybe pratensis',habitat:'Ancient Unimproved Grassland',taxonomy:[{rank:'Division',name:'Basidiomycota'},{rank:'Family',name:'Hygrophoraceae'},{rank:'Genus',name:'Hygrocybe'},{rank:'Species',name:'H. pratensis'}],id:{bark:'N/A',leaves:'Cap 3–10 cm; <strong>buff-orange to salmon-pink; dry to slightly greasy; convex then expanded</strong>. Gills decurrent (running down stem).',branchLeaf:'Stipe pale, similar colour to cap. Gills thick, widely spaced, waxy-looking.',habitat:'Ancient unimproved grassland — waxcap meadows are a priority UK habitat.'},facts:['Waxcap grasslands are internationally important — the UK holds the largest area in Europe.','The presence of multiple waxcap species indicates grassland that has been undisturbed for centuries.','Waxcaps cannot colonise reseeded or fertilised grassland — their presence is evidence of continuity.','The Meadow Waxcap is one of over 40 waxcap species recorded from UK grasslands.']},

{type:'fungi',icon:'🍄',commonName:'Cladonia',taxonomicName:'Cladonia portentosa',habitat:'Heathland, Moorland & Bog',taxonomy:[{rank:'Division',name:'Ascomycota'},{rank:'Family',name:'Cladoniaceae'},{rank:'Genus',name:'Cladonia'},{rank:'Species',name:'C. portentosa'}],id:{bark:'N/A',leaves:'<strong>Intricately branched, pale grey-green, antler-like thallus</strong> forming loose cushions or mats 5–15 cm tall.',branchLeaf:'Three-dimensional branching; surface powdery. No distinct upper or lower surface. No stem.',habitat:'Acid heathland, blanket bog, upland moorland on well-drained acid peat and sand.'},facts:['Cladonia lichens are among the most characteristic organisms of British heathland and moorland.','Reindeer in Scandinavia and northern Canada are largely sustained through winter by Cladonia lichen ("reindeer moss") — not a true moss but a lichen.','Extremely slow-growing — a 10 cm cushion may be decades old.','Highly sensitive to atmospheric pollution — largely absent from areas with elevated nitrogen deposition.']},

{type:'fungi',icon:'🍄',commonName:'Lobaria pulmonaria',taxonomicName:'Lobaria pulmonaria',habitat:'Old Trees in Humid Atlantic Woodland',taxonomy:[{rank:'Division',name:'Ascomycota'},{rank:'Family',name:'Lobariaceae'},{rank:'Genus',name:'Lobaria'},{rank:'Species',name:'L. pulmonaria'}],id:{bark:'N/A',leaves:'<strong>Large, lobed thallus 5–30 cm; bright green when wet; grey-brown when dry; surface with deep lung-like ridges</strong> — resembling lung tissue.',branchLeaf:'Attached to tree bark. Upper surface ridged; lower surface with pale pits.',habitat:'Epiphytic on veteran trees (oak, ash, hazel) in ancient humid Atlantic woodland. Western Britain.'},facts:['Lobaria pulmonaria is a flagship species for Atlantic woodland quality — its presence indicates ancient, undisturbed woodland with high air quality.','Used in traditional medicine as a lung remedy because the ridged surface resembles lung tissue (doctrine of signatures).','Grows extraordinarily slowly — a large thallus may be over 100 years old.','Found mainly in ancient Atlantic oakwoods of western Scotland, Wales, and south-west England.']},

{type:'birds',icon:'🐦',commonName:'Barn Owl',taxonomicName:'Tyto alba',habitat:'Farmland, Grassland & Woodland Edge',taxonomy:[{rank:'Order',name:'Strigiformes'},{rank:'Family',name:'Tytonidae'},{rank:'Genus',name:'Tyto'},{rank:'Species',name:'T. alba'}],id:{colour:'<strong>Golden-buff above with grey vermiculations; pure white below and on distinctive heart-shaped facial disc.</strong>',sizeShape:'Body 33–35 cm; wingspan 80–95 cm. Slim; long-legged; buoyant flight.',keyFeatures:'White heart-shaped face unmistakeable. Confusion: Tawny Owl is brown and round-faced. Silent ghostly flight at dusk.',habitat:'Open farmland, rough grassland, marsh edges, old barns. Hunts by hearing alone in total darkness.'},facts:['A Barn Owl\'s hearing is the most precise of any animal tested — asymmetrically placed ears detect the exact 3D position of a mouse rustle in total darkness.','UK Barn Owl population fell from over 12,000 pairs to approximately 4,000 between 1930 and 1980 due to agricultural intensification and rodenticide use.','Barn Owls are entirely silent in flight — comb-like fringes on flight feathers break up turbulence.','A Barn Owl family (pair + 4 young) will consume approximately 1,000 field voles in a single summer.']},

{type:'birds',icon:'🦉',commonName:'Tawny Owl',taxonomicName:'Strix aluco',habitat:'Woodland, Park & Garden',taxonomy:[{rank:'Order',name:'Strigiformes'},{rank:'Family',name:'Strigidae'},{rank:'Genus',name:'Strix'},{rank:'Species',name:'S. aluco'}],id:{colour:'Rich brown (sometimes grey) with complex dark streaking. <strong>Large round facial disc; all-dark eyes.</strong>',sizeShape:'Body 37–39 cm; wingspan 94–104 cm. Stocky; large round head.',keyFeatures:'Round dark face and all-dark eyes. Confusion: Barn Owl has heart-shaped white face; Long-eared Owl has ear tufts. The "tu-whit tu-whoo" is a duet — female calls "ke-wick," male replies "hoooo."',habitat:'Deciduous woodland, parks, large gardens, churchyards. The most widespread UK owl.'},facts:['The classic "tu-whit tu-whoo" is not one bird — it\'s a duet between a calling female and a responding male.','Tawny Owls are highly territorial and sedentary — young birds that fail to find a territory often starve.','The eyes are fixed in the skull — the owl must rotate its entire head (up to 270°) to look sideways.','The most commonly heard UK owl — most people have never seen one despite hearing them regularly.']},

{type:'birds',icon:'🐦',commonName:'Kingfisher',taxonomicName:'Alcedo atthis',habitat:'River, Lake & Estuary',taxonomy:[{rank:'Order',name:'Coraciiformes'},{rank:'Family',name:'Alcedinidae'},{rank:'Genus',name:'Alcedo'},{rank:'Species',name:'A. atthis'}],id:{colour:'<strong>Electric blue-turquoise above; vivid orange-chestnut below; white throat and neck patch.</strong> Bill long, dagger-like.',sizeShape:'Body 16–17 cm. Compact; huge head; very short tail. Fast, straight, low flight over water.',keyFeatures:'Blue-orange colours unmistakeable. High-pitched "peeeep" call often heard before bird is seen. Confusion: none in UK.',habitat:'Clear, slow-flowing rivers and streams; lakes, canals, estuaries in winter.'},facts:['Kingfisher colours are structural — the blue is iridescence from feather structure, not pigment.','Vulnerable to hard winters — a prolonged freeze can kill 85% of a local population by preventing fishing.','Nests in a tunnel excavated in a riverbank — the tunnel is typically 60–90 cm long.','A Kingfisher plunges from a perch to catch fish with its eyes open underwater, adjusting for refraction.']},

{type:'birds',icon:'🐦',commonName:'Pied Wagtail',taxonomicName:'Motacilla alba yarrellii',habitat:'Town, Garden, Waterside & Farmland',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Motacillidae'},{rank:'Genus',name:'Motacilla'},{rank:'Species',name:'M. alba'}],id:{colour:'<strong>Black and white; male has black crown, back, breast; white face and flanks. Female has grey back.</strong>',sizeShape:'Body 18 cm. Slim; constantly wagging long tail.',keyFeatures:'Black and white and constantly wagging tail unmistakeable. Confusion: White Wagtail (Continental race) has grey back like female.',habitat:'Almost anywhere near water or open ground — towns, car parks, farmyards, riversides.'},facts:['Pied Wagtails roost communally in winter — thousands gather in city centre trees, supermarket car parks, and power stations where heat is available.','The tail-wagging behaviour may flush invertebrates from the ground or signal fitness to rivals and mates — the function is debated.','One of the most familiar and approachable UK birds — a classic feature of any car park, sports field, or farmyard.','Nests in crevices in walls, bridges, machinery, and pipes — highly opportunistic.']},

{type:'birds',icon:'🐦',commonName:'Swallow',taxonomicName:'Hirundo rustica',habitat:'Farmland, Village & Waterside',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Hirundinidae'},{rank:'Genus',name:'Hirundo'},{rank:'Species',name:'H. rustica'}],id:{colour:'Metallic steel-blue above; cream-buff below; <strong>deep rusty-red forehead and throat; long forked tail streamers.</strong>',sizeShape:'Body 17–19 cm (including tail streamers). Slender; very long forked tail.',keyFeatures:'Long tail streamers diagnostic. Confusion: House Martin has white rump; Swift is all-dark with scythe-shaped wings.',habitat:'Open farmland, villages, near water. Nests in barns, stables, and outbuildings.'},facts:['Swallows migrate from sub-Saharan Africa — arriving in April and departing in October after a round trip of up to 10,000 km.','The length of tail streamers signals genetic quality to females — males with longer streamers have higher reproductive success.','Barn swallow numbers have declined 50% in the UK since 1970 — loss of insect-rich rough grassland and wet pasture is the primary cause.','A single swallow catches approximately 850 insects per day during the breeding season.']},

{type:'birds',icon:'🐦',commonName:'House Martin',taxonomicName:'Delichon urbicum',habitat:'Town, Village & Open Country',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Hirundinidae'},{rank:'Genus',name:'Delichon'},{rank:'Species',name:'D. urbicum'}],id:{colour:'Metallic blue-black above; <strong>brilliant white rump patch and white underparts.</strong>',sizeShape:'Body 13–15 cm. Compact; shorter tail than Swallow; forked but without streamers.',keyFeatures:'White rump diagnostic. Confusion: Swallow has rusty face and streamers; Swift is all-dark.',habitat:'Towns, villages, open country. Nests under eaves on buildings.'},facts:['House Martins build mud cup nests under eaves — each nest requires thousands of individual pellets of wet mud.','Declining in the UK — loss of open water for mud, reduction in flying insects, and renovation of buildings removing nest sites.','Winters in tropical Africa but the wintering grounds are poorly known — rarely recorded south of the Sahara.','Erecting artificial nest cups under eaves has been shown to successfully attract House Martins where natural sites are scarce.']},

{type:'birds',icon:'🐦',commonName:'Common Swift',taxonomicName:'Apus apus',habitat:'Open Sky, Town & Village',taxonomy:[{rank:'Order',name:'Apodiformes'},{rank:'Family',name:'Apodidae'},{rank:'Genus',name:'Apus'},{rank:'Species',name:'A. apus'}],id:{colour:'Sooty brown-black throughout; pale chin patch. <strong>Scythe-shaped wings; short forked tail.</strong>',sizeShape:'Body 16–17 cm; wingspan 42–48 cm. All-dark; very long swept-back wings.',keyFeatures:'All-dark with scythe wings — unlike any swallow or martin. Screaming parties over rooftops in summer.',habitat:'Open sky everywhere; nests in old buildings. Present in UK only May–August.'},facts:['Swifts spend more time airborne than any other bird — non-breeding individuals may fly continuously for up to three years without landing.','They sleep, mate, and collect nest material all on the wing.','Common Swift populations have declined 60% in the UK since 1995 — loss of nest sites in old buildings is the primary cause.','Present in the UK for only 3–4 months — arriving in early May and departing by mid-August.']},

{type:'birds',icon:'🐦',commonName:'Cuckoo',taxonomicName:'Cuculus canorus',habitat:'Woodland Edge, Reedbed, Farmland & Moorland',taxonomy:[{rank:'Order',name:'Cuculiformes'},{rank:'Family',name:'Cuculidae'},{rank:'Genus',name:'Cuculus'},{rank:'Species',name:'C. canorus'}],id:{colour:'Male: grey above; white below with fine grey barring. <strong>Barred pattern and slim shape recall Sparrowhawk in flight.</strong> Female: occasionally rufous-brown.',sizeShape:'Body 32–34 cm. Long-tailed; slim; drooped wings in flight.',keyFeatures:'Slim silhouette and drooped wings recall Sparrowhawk. The "cuck-oo" call unmistakeable. Female bubbling call.',habitat:'Wide variety — woodland, reedbed, moorland, farmland. Wherever host species breed.'},facts:['Each female Cuckoo specialises in parasitising one host species — reed warbler, meadow pipit, or dunnock — laying perfectly matched eggs.','A Cuckoo chick ejects all other eggs and chicks from the nest within hours of hatching.','UK Cuckoo numbers have declined approximately 65% since 1980 — thought to be related to insect declines on African migration routes.','Satellite-tagged Cuckoos from the BTO follow the same individual routes to the Congo Basin each year.']},
