<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UK Flora & Fauna — Field Study Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root{
  --parchment:#f4ede0;--parchment-dark:#e0d0b8;--ink:#251e12;--ink-light:#5a4e3a;
  --moss:#3d5230;--moss-mid:#5a7044;--moss-light:#7a8f60;
  --rust:#7a3410;--rust-light:#b05820;--bark:#6b5a42;
  --sky:#4a6e7a;--gold:#c4983c;--cream:#faf5eb;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:inherit;}
body{font-family:'EB Garamond',serif;background:var(--parchment);
  background-image:radial-gradient(ellipse at 15% 40%,rgba(61,82,48,.07) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 15%,rgba(122,52,16,.05) 0%,transparent 50%);
  min-height:100vh;color:var(--ink);overflow-x:hidden;}

header{text-align:center;padding:1.8rem 1rem .8rem;}
.header-sub{font-family:'Cormorant Garamond',serif;font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;color:var(--moss-light);margin-bottom:.3rem;}
h1{font-family:'Playfair Display',serif;font-size:2rem;font-weight:400;line-height:1.1;}
h1 em{font-style:italic;color:var(--moss);}
.header-rule{display:flex;align-items:center;gap:.8rem;justify-content:center;margin-top:.7rem;color:var(--gold);font-size:.55rem;letter-spacing:.4em;}
.header-rule::before,.header-rule::after{content:'';width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold));}
.header-rule::after{background:linear-gradient(90deg,var(--gold),transparent);}

/* ── FILTER BAR ── */
.filter-bar{width:100%;padding:.8rem 1.5rem .7rem;border-bottom:1px solid var(--parchment-dark);display:flex;flex-direction:column;align-items:center;gap:.6rem;}
.filter-group{display:flex;flex-direction:column;align-items:center;gap:.28rem;width:100%;}
.fg-head{font-family:'Playfair Display',serif;font-size:.88rem;font-weight:600;letter-spacing:.04em;color:var(--ink);text-align:center;}
.fg-head.fauna-head{color:var(--sky);}
.fg-head.fungi-head{color:var(--rust);}
.fg-sub{font-family:'Cormorant Garamond',serif;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-light);opacity:.5;text-align:center;}
.filter-subrow{display:flex;gap:.32rem;flex-wrap:wrap;justify-content:center;}
.filter-divider{width:min(380px,70%);height:1px;background:var(--parchment-dark);margin:.05rem 0;}
.fbtn{font-family:'Cormorant Garamond',serif;font-size:.73rem;letter-spacing:.07em;text-transform:uppercase;padding:.22rem .75rem;border:1px solid var(--parchment-dark);background:rgba(255,255,255,.45);color:var(--ink-light);cursor:pointer;border-radius:1px;transition:all .18s;white-space:nowrap;}
.fbtn:hover{border-color:var(--bark);color:var(--bark);}
.fbtn.active{background:var(--moss);border-color:var(--moss);color:var(--cream);}
.fbtn.active-fauna{background:var(--sky);border-color:var(--sky);color:var(--cream);}
.fbtn.active-fungi{background:var(--rust);border-color:var(--rust);color:var(--cream);}
.fbtn.all-btn{border-color:var(--gold);color:var(--bark);}
.fbtn.all-btn.active{background:var(--gold);border-color:var(--gold);color:var(--ink);}

/* ── QUICK-NAV ── */
.quicknav{width:min(720px,94vw);margin:.5rem auto 0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1),opacity .25s;max-height:0;opacity:0;}
.quicknav.open{max-height:220px;opacity:1;}
.qn-inner{background:rgba(255,255,255,.55);border:1px solid var(--parchment-dark);border-radius:2px;padding:.55rem .85rem .65rem;overflow-y:auto;max-height:200px;}
.qn-title{font-family:'Cormorant Garamond',serif;font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-light);opacity:.6;margin-bottom:.45rem;}
.qn-grid{display:flex;flex-wrap:wrap;gap:.3rem;}
.qn-chip{display:inline-flex;align-items:center;gap:.28rem;font-family:'EB Garamond',serif;font-size:.78rem;line-height:1.2;padding:.18rem .55rem;border:1px solid var(--parchment-dark);background:var(--cream);color:var(--ink-light);cursor:pointer;border-radius:1px;transition:all .14s;}
.qn-chip:hover{border-color:var(--moss-mid);color:var(--moss);}
.qn-chip.current{border-color:var(--gold);color:var(--ink);background:rgba(196,152,60,.12);}
.qn-icon{font-size:.9rem;line-height:1;}
.qn-name{font-size:.78rem;}
.qn-latin{font-style:italic;font-size:.65rem;opacity:.5;}

/* ── META ── */
.meta-bar{display:flex;align-items:center;justify-content:space-between;width:min(720px,94vw);margin:.5rem auto .2rem;padding:0 .2rem;}
.counter{font-family:'Cormorant Garamond',serif;font-size:.82rem;color:var(--ink-light);letter-spacing:.06em;}
.nbtn{font-family:'EB Garamond',serif;font-size:.9rem;padding:.3rem .9rem;border:1px solid var(--bark);background:transparent;color:var(--bark);cursor:pointer;border-radius:1px;transition:all .18s;}
.nbtn:hover{background:var(--bark);color:var(--cream);}
.nbtn.shuffle{border-color:var(--moss-mid);color:var(--moss-mid);}
.nbtn.shuffle:hover{background:var(--moss-mid);color:var(--cream);}
.sort-capsule{display:flex;background:var(--parchment-dark);border-radius:20px;padding:2px;gap:0;}
.scap{font-family:'Cormorant Garamond',serif;font-size:.68rem;letter-spacing:.07em;text-transform:uppercase;padding:.22rem .75rem;border:none;background:transparent;color:var(--ink-light);cursor:pointer;border-radius:18px;transition:all .2s;white-space:nowrap;}
.scap.active{background:var(--cream);color:var(--ink);box-shadow:0 1px 3px rgba(37,30,18,.15);}
.progress-track{width:min(720px,94vw);margin:0 auto .55rem;height:2px;background:var(--parchment-dark);}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--moss),var(--gold));transition:width .4s ease;}

/* ── CARD ── */
.card-scene{perspective:1400px;width:min(720px,94vw);margin:0 auto;padding-bottom:.5rem;}
.card-wrapper{position:relative;width:100%;min-height:460px;}
.card{width:100%;min-height:460px;transform-style:preserve-3d;transition:transform .72s cubic-bezier(.4,0,.2,1);cursor:pointer;}
.card.flipped{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;min-height:460px;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:2px;border:1px solid #cec0a5;background:var(--cream);box-shadow:0 6px 28px rgba(37,30,18,.13),0 1px 4px rgba(37,30,18,.07);}
.card-front{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;position:relative;}
.card-front::before{content:'';position:absolute;inset:10px;border:1px solid rgba(196,152,60,.2);border-radius:1px;pointer-events:none;}
.front-cat{font-family:'Cormorant Garamond',serif;font-size:.68rem;letter-spacing:.28em;text-transform:uppercase;color:var(--moss-light);margin-bottom:.9rem;display:flex;align-items:center;gap:.5rem;}
.front-cat::before,.front-cat::after{content:'—';opacity:.4;}
.front-icon{font-size:3.5rem;line-height:1;margin-bottom:.8rem;}
.front-name{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:600;color:var(--ink);line-height:1.15;margin-bottom:.4rem;}
.front-latin{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:var(--rust-light);margin-bottom:1.2rem;}
.habitat-pill{font-family:'Cormorant Garamond',serif;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;padding:.22rem .75rem;border:1px solid var(--sky);color:var(--sky);border-radius:1px;}
.front-hint{margin-top:1.5rem;font-family:'Cormorant Garamond',serif;font-size:.75rem;color:var(--ink-light);opacity:.4;letter-spacing:.08em;}

.card-back{transform:rotateY(180deg);display:flex;flex-direction:column;overflow:hidden;}
.back-header{background:var(--moss);padding:.7rem 1.2rem;display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:.4rem;flex-shrink:0;}
.back-header.fauna-hdr{background:var(--sky);}
.back-header.fungi-hdr{background:var(--rust);}
.back-common{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--cream);font-weight:600;}
.back-latin{font-family:'Playfair Display',serif;font-style:italic;font-size:.82rem;color:rgba(250,245,235,.7);}
.taxon-row{background:rgba(196,152,60,.06);border-bottom:1px solid var(--parchment-dark);padding:.5rem 1.1rem;display:flex;flex-wrap:wrap;gap:.12rem;align-items:center;flex-shrink:0;}
.tx{font-family:'Cormorant Garamond',serif;font-size:.75rem;color:var(--ink-light);}
.tx-rank{font-size:.58rem;text-transform:uppercase;letter-spacing:.06em;opacity:.5;}
.tx-name{font-style:italic;}
.tx-sep{opacity:.3;font-size:.7rem;margin:0 .12rem;}
.back-body{display:grid;grid-template-columns:1fr 1fr;flex:1;overflow:auto;}
.sec{padding:.7rem .95rem;border-bottom:1px solid var(--parchment-dark);border-right:1px solid var(--parchment-dark);}
.sec:nth-child(even){border-right:none;}
.sec.full{grid-column:1/-1;border-right:none;}
.sec.facts-sec{background:rgba(61,82,48,.03);border-bottom:none;}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--rust-light);margin-bottom:.38rem;display:flex;align-items:center;gap:.4rem;}
.sec-title.sky{color:var(--sky);}
.sec-title::after{content:'';flex:1;height:1px;background:var(--parchment-dark);}
.sec-body{font-size:.79rem;line-height:1.58;color:var(--ink-light);}
.sec-body strong{color:var(--ink);font-weight:600;font-family:inherit;font-size:inherit;font-style:inherit;}
.fact strong{color:var(--ink);font-weight:600;font-family:inherit;font-size:inherit;font-style:inherit;}
strong{font-family:inherit;}
.fact{font-size:.78rem;line-height:1.55;color:var(--ink-light);padding-left:1rem;position:relative;margin-bottom:.28rem;}
.fact::before{content:'◆';position:absolute;left:0;font-size:.4rem;color:var(--gold);top:.38em;}
.photos-sec{grid-column:1/-1;border-right:none;border-bottom:1px solid var(--parchment-dark);padding:.65rem .95rem;background:rgba(240,232,216,.28);}
.photos-grid{display:flex;gap:.55rem;flex-wrap:wrap;margin-top:.45rem;}
.photo-slot{flex:1;min-width:95px;max-width:155px;display:flex;flex-direction:column;align-items:center;gap:.28rem;}
.photo-drop{width:100%;aspect-ratio:4/3;border:1.5px dashed var(--parchment-dark);border-radius:2px;background:rgba(255,255,255,.5);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.photo-drop:hover{border-color:var(--moss-mid);background:rgba(90,112,68,.05);}
.photo-drop img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:1px;}
.drop-icon{font-size:1.2rem;opacity:.32;}
.drop-hint{font-family:'Cormorant Garamond',serif;font-size:.56rem;letter-spacing:.07em;color:var(--ink-light);opacity:.4;margin-top:.18rem;text-align:center;}
.photo-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.photo-uploading{position:absolute;inset:0;background:rgba(61,82,48,.7);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.65rem;letter-spacing:.08em;font-family:'Cormorant Garamond',serif;}
.photo-actions{position:absolute;top:3px;right:3px;display:flex;gap:3px;z-index:10;}
.photo-btn{width:20px;height:20px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.6rem;line-height:1;opacity:.85;transition:opacity .15s;}
.photo-btn:hover{opacity:1;}
.photo-btn.replace{background:rgba(61,82,48,.85);color:#fff;}
.photo-btn.delete{background:rgba(122,52,16,.85);color:#fff;}
.photo-btn input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.photo-label-wrap{display:flex;align-items:center;justify-content:center;gap:4px;width:100%;}
.photo-label{font-family:'Cormorant Garamond',serif;font-size:.58rem;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-light);opacity:.6;text-align:center;cursor:pointer;border-bottom:1px dashed transparent;transition:border-color .15s;}
.photo-label:hover{border-color:var(--ink-light);opacity:.9;}
.photo-label[contenteditable=true]{outline:none;border-bottom:1px dashed var(--moss-mid);opacity:1;color:var(--moss);}
.photo-label-edit{font-size:.55rem;opacity:.35;cursor:pointer;color:var(--ink-light);}
.photo-label-edit:hover{opacity:.8;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:.8rem;color:var(--ink-light);opacity:.5;text-align:center;padding:2rem;}
.flip-hint{text-align:center;font-family:'Cormorant Garamond',serif;font-size:.74rem;color:var(--ink-light);opacity:.4;letter-spacing:.08em;padding:.3rem 0 .7rem;}
.bottom-nav{display:flex;align-items:center;justify-content:center;gap:1.2rem;padding:.2rem 1rem 2.5rem;}

@media(max-width:540px){
  h1{font-size:1.5rem;}
  .filter-bar{padding:.6rem .8rem .5rem;}
  .back-body{grid-template-columns:1fr;}
  .sec{border-right:none;}
  .sec.full,.photos-sec{grid-column:1;}
  .card-wrapper,.card,.card-face{min-height:700px;}
}
</style>

<body>

<header>
  <p class="header-sub">British Isles Natural History</p>
  <h1>Flora & Fauna <em>Field Cards</em></h1>
  <div class="header-rule">✦</div>
</header>

<div class="filter-bar">
  <div class="filter-group">
    <div class="fg-head">Flora</div>
    <div class="filter-subrow">
      <button class="fbtn" data-filter="trees">Trees</button>
      <button class="fbtn" data-filter="shrubs">Shrubs &amp; Climbers</button>
      <button class="fbtn" data-filter="forbs">Forbs &amp; Wildflowers</button>
      <button class="fbtn" data-filter="grasses">Grasses &amp; Sedges</button>
      <button class="fbtn" data-filter="ferns">Ferns &amp; Mosses</button>
    </div>
  </div>
  <div class="filter-divider"></div>
  <div class="filter-group">
    <div class="fg-head fungi-head">Fungi</div>
    <div class="filter-subrow">
      <button class="fbtn" data-filter="fungi">Fungi &amp; Lichens</button>
    </div>
  </div>
  <div class="filter-divider"></div>
  <div class="filter-group">
    <div class="fg-head fauna-head">Fauna</div>
    <div class="filter-subrow">
      <button class="fbtn" data-filter="birds">Birds</button>
      <button class="fbtn" data-filter="mammals">Mammals</button>
      <button class="fbtn" data-filter="fish">Fish</button>
      <button class="fbtn" data-filter="reptiles">Reptiles &amp; Amphibians</button>
      <button class="fbtn" data-filter="invertebrates">Invertebrates</button>
    </div>
  </div>
  <div class="filter-divider"></div>
  <div class="filter-subrow">
    <button class="fbtn all-btn active" data-filter="all">All Cards</button>
  </div>
</div>

<div class="quicknav" id="quicknav">
  <div class="qn-inner">
    <div class="qn-title" id="qnTitle"></div>
    <div class="qn-grid" id="qnGrid"></div>
  </div>
</div>

<div class="meta-bar">
  <span class="counter" id="counter"></span>
  <div style="display:flex;align-items:center;gap:.6rem;">
    <div class="sort-capsule">
      <button class="scap active" id="sortCommon" onclick="setSort('common')">Most Common</button>
      <button class="scap" id="sortAlpha" onclick="setSort('alpha')">A – Z</button>
    </div>
    <button class="nbtn shuffle" onclick="shuffle()">⇄ Shuffle</button>
  </div>
</div>
<div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

<div class="card-scene">
  <div class="card-wrapper">
    <div class="card" id="card" onclick="flipCard()">
      <div class="card-face card-front" id="cardFront"></div>
      <div class="card-face card-back"  id="cardBack"></div>
    </div>
  </div>
</div>

<p class="flip-hint">Click card to reveal · ← → arrow keys · Space to flip</p>
<div class="bottom-nav">
  <button class="nbtn" onclick="navigate(-1)">← Previous</button>
  <button class="nbtn" onclick="navigate(1)">Next →</button>
</div>

<script>
const photoStore={};
const CLOUD_NAME='ddqj2uael';
const UPLOAD_PRESET='wildlife_cards';
const LABEL_STORE_KEY='wfc_labels';
// Load persisted labels
let customLabels={};
try{customLabels=JSON.parse(localStorage.getItem(LABEL_STORE_KEY)||'{}');}catch(e){}
function getSlotLabel(speciesName,slotId,defaultLabel){
  const k=speciesName+'::label::'+slotId;
  return customLabels[k]||defaultLabel;
}
function saveSlotLabel(speciesName,slotId,val){
  const k=speciesName+'::label::'+slotId;
  customLabels[k]=val;
  try{localStorage.setItem(LABEL_STORE_KEY,JSON.stringify(customLabels));}catch(e){}
}
async function uploadToCloudinary(file,key){
  const fd=new FormData();
  fd.append('file',file);
  fd.append('upload_preset',UPLOAD_PRESET);
  fd.append('public_id','wfc_'+btoa(key).replace(/[^a-zA-Z0-9]/g,'').slice(0,60));
  fd.append('context','wildlife_key='+encodeURIComponent(key));
  const r=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{method:'POST',body:fd});
  if(!r.ok)throw new Error('Upload failed');
  const d=await r.json();
  return d.secure_url;
}
async function handlePhoto(e,name,slotId){
  const file=e.target.files[0];if(!file)return;
  const key=name+'::'+slotId;
  // Show local preview immediately
  const reader=new FileReader();
  reader.onload=ev=>{photoStore[key]={url:ev.target.result,uploading:true};renderCard();};
  reader.readAsDataURL(file);
  try{
    const url=await uploadToCloudinary(file,key);
    photoStore[key]={url,uploading:false};
    renderCard();
  }catch(err){
    console.error(err);
    if(photoStore[key])photoStore[key].uploading=false;
    renderCard();
    alert('Upload failed — photo shown locally only this session.');
  }
}
function deletePhoto(name,slotId){
  const key=name+'::'+slotId;
  delete photoStore[key];
  renderCard();
}
// On load, fetch existing Cloudinary photos for current card
async function loadCloudinaryPhotos(speciesName){
  // We encode the species into public_id prefix — list via search API not available on free
  // Instead we try to fetch known keys for the current species
  const slots=['bark','leaf','overall','seasonal','adult','juvenile','detail'];
  await Promise.all(slots.map(async slotId=>{
    const key=speciesName+'::'+slotId;
    if(photoStore[key])return; // already loaded
    const pid='wfc_'+btoa(key).replace(/[^a-zA-Z0-9]/g,'').slice(0,60);
    const url=`https://res.cloudinary.com/${CLOUD_NAME}/image/upload/${pid}.jpg`;
    // Try a HEAD request to see if it exists
    try{
      const r=await fetch(url,{method:'HEAD'});
      if(r.ok)photoStore[key]={url,uploading:false};
    }catch(e){}
  }));
}
const FL=['Bark & Stem','Leaves','Branch & Leaf Form','Habitat'];
const FA=['Colour & Pattern','Size & Shape','Key Features & Confusion Species','Habitat'];
const FK=['bark','leaves','branchLeaf','habitat'];
const AK=['colour','sizeShape','keyFeatures','habitat'];
const FSLOTS=[{id:'bark',label:'Bark / Stem'},{id:'leaf',label:'Leaf Detail'},{id:'overall',label:'Overall Form'},{id:'seasonal',label:'Flower / Fruit'}];
const ASLOTS=[{id:'overall',label:'Overall View'},{id:'adult',label:'Adult Features'},{id:'juvenile',label:'Juvenile'},{id:'detail',label:'Defining Detail'}];
const tg={trees:'flora',shrubs:'flora',forbs:'flora',grasses:'flora',ferns:'flora',fungi:'fungi',birds:'fauna',mammals:'fauna',fish:'fauna',reptiles:'fauna',invertebrates:'fauna'};

const species=[
{type:'trees',icon:'🌳',commonName:'English Oak',taxonomicName:'Quercus robur',habitat:'Ancient Woodland & Hedgerow',taxonomy:[{rank:'Order',name:'Fagales'},{rank:'Family',name:'Fagaceae'},{rank:'Genus',name:'Quercus'},{rank:'Species',name:'Q. robur'}],id:{bark:'Deeply furrowed grey-brown with broad scaly ridges; orange-brown heartwood when cut.',leaves:'Lobed 7–14 cm; rounded lobes, almost no petiole, <strong>auricles at base</strong>. Dark shiny green above.',branchLeaf:'Alternate. Leaves clustered at twig tips. Massive spreading crown in open; narrower in woodland.',habitat:'Ancient woodland, hedgerows, parkland. Tolerates most soils except waterlogged; favours heavy clay.'},facts:['Supports over 2,300 species — more than any other native UK tree; 320+ invertebrate species are wholly dependent on it.','Jays cache up to 3,000 acorns each autumn, planting new trees wherever caches are forgotten.','Nelson\'s HMS Victory required approximately 6,000 mature oaks to build.','The Major Oak in Sherwood Forest is estimated at 800–1,000 years old.']},

{type:'trees',icon:'🌲',commonName:'Scots Pine',taxonomicName:'Pinus sylvestris',habitat:'Highland Pinewood & Lowland Heath',taxonomy:[{rank:'Division',name:'Pinophyta'},{rank:'Family',name:'Pinaceae'},{rank:'Genus',name:'Pinus'},{rank:'Species',name:'P. sylvestris'}],id:{bark:'<strong>Upper trunk: distinctive orange-red plated bark</strong>. Lower trunk grey-brown, deeply fissured.',leaves:'Blue-green needles in pairs, 3–7 cm, slightly twisted. Female cones grey-brown, ripening over 2 years.',branchLeaf:'Irregular open crown becoming flat-topped with age. Branches in whorls.',habitat:"Britain's only truly native pine. Acidic, nutrient-poor sandy or rocky soils. Caledonian pinewoods are globally important."},facts:['Caledonian Pinewood hosts red squirrel, Scottish crossbill, crested tit and capercaillie.','Only ~1% of original Caledonian Forest survives (~18,000 ha); rewilding efforts are ongoing.','Resin has waterproofed ships and barrels for centuries; turpentine is a pine-resin distillate.','Mycorrhizal fungi linking pine roots are essential to forest nutrient cycling.']},

{type:'trees',icon:'🍂',commonName:'Silver Birch',taxonomicName:'Betula pendula',habitat:'Heathland, Woodland Edge & Upland',taxonomy:[{rank:'Order',name:'Fagales'},{rank:'Family',name:'Betulaceae'},{rank:'Genus',name:'Betula'},{rank:'Species',name:'B. pendula'}],id:{bark:'<strong>Brilliant white peeling bark</strong> with distinctive black diamond-shaped fissures at base.',leaves:'Triangular, doubly serrated; long pointed tip. Bright green, turning gold in autumn.',branchLeaf:'Alternate. <strong>Pendulous ("weeping") branchlets</strong> distinctly drooping — diagnostic. Open, airy crown.',habitat:'Pioneer on well-drained, sandy or acid soils. Heathland, moorland edge, open woodland.'},facts:['A keystone pioneer species supporting over 300 insect species.','The bark contains betulin, used in traditional medicine; birch sap was tapped in spring as a tonic.','Witches\' brooms on birch are caused by the fungus Taphrina betulina.','Can outcompete heathland if not managed — one of the biggest threats to lowland heath.']},

{type:'trees',icon:'🌿',commonName:'Ash',taxonomicName:'Fraxinus excelsior',habitat:'Mixed Woodland, Limestone & Riverbank',taxonomy:[{rank:'Order',name:'Lamiales'},{rank:'Family',name:'Oleaceae'},{rank:'Genus',name:'Fraxinus'},{rank:'Species',name:'F. excelsior'}],id:{bark:'Pale grey, smooth in youth; developing cross-hatched interlacing fissures with age.',leaves:'Pinnate compound, 20–35 cm; 9–13 leaflets. <strong>Buds jet black</strong> — diagnostic.',branchLeaf:'Opposite. Flowers appear before leaves. Winged fruits (keys) persistent into winter.',habitat:'Moist, base-rich soils. Floodplains, limestone pavements, hedgerows.'},facts:['Ash dieback (Hymenoscyphus fraxineus) threatens an estimated 80%+ of 80 million UK ash trees.','Ash wood is uniquely flexible and shock-resistant — used for tool handles, oars, and sports equipment.','In Norse mythology the world tree Yggdrasil is an ash.','Second-commonest woodland tree in UK after oak.']},

{type:'trees',icon:'🌸',commonName:'Wild Cherry',taxonomicName:'Prunus avium',habitat:'Mixed Deciduous Woodland & Hedgerow',taxonomy:[{rank:'Order',name:'Rosales'},{rank:'Family',name:'Rosaceae'},{rank:'Genus',name:'Prunus'},{rank:'Species',name:'P. avium'}],id:{bark:'Distinctive reddish-brown, <strong>peeling horizontally in papery strips</strong> with prominent lenticels. Aromatic when cut.',leaves:'Oval, 7–15 cm; doubly toothed. Two reddish glands at base of blade.',branchLeaf:'Alternate. Spectacular white blossom in April. Clusters of small dark-red cherries in summer.',habitat:'Woodland on most soils except very acid or waterlogged. Parent species of cultivated sweet cherry.'},facts:['Wild Cherry is the parent of all cultivated sweet cherries.','The timber is prized by cabinet makers for its warm reddish colour and fine grain.','Provides critical early-spring nectar for queen bumblebees.','Cherries are eaten by blackcap, blackbird, and mistle thrush.']},

{type:'shrubs',icon:'🌿',commonName:'Blackthorn',taxonomicName:'Prunus spinosa',habitat:'Hedgerow, Scrub & Woodland Edge',taxonomy:[{rank:'Order',name:'Rosales'},{rank:'Family',name:'Rosaceae'},{rank:'Genus',name:'Prunus'},{rank:'Species',name:'P. spinosa'}],id:{bark:'Very dark, almost black, rough and fissured. Twigs end in sharp spines. Suckers freely.',leaves:'Small, oval to obovate, 2–4 cm; finely toothed. Appear after the flowers.',branchLeaf:'Alternate. <strong>White flowers appear before leaves in March–April on bare black twigs.</strong> Sloe berries blue-black.',habitat:'Hedgerows, scrubland, woodland edge. Forms impenetrable thickets protecting ground-nesting birds.'},facts:['Sloe berries are inedible raw but essential for sloe gin.','Blackthorn timber is one of the hardest of any British shrub — Irish shillelaghs are traditionally made from it.','Blackthorn thickets are critical nesting habitat for yellowhammer, linnet, and turtle dove.','Blackthorn winter: the sharp cold snap that often accompanies its flowering in March.']},

{type:'shrubs',icon:'🍒',commonName:'Elder',taxonomicName:'Sambucus nigra',habitat:'Hedgerow, Woodland Edge & Disturbed Ground',taxonomy:[{rank:'Order',name:'Dipsacales'},{rank:'Family',name:'Adoxaceae'},{rank:'Genus',name:'Sambucus'},{rank:'Species',name:'S. nigra'}],id:{bark:'Pale grey-brown; deeply furrowed with a corky, spongy texture. Twigs with prominent white pith.',leaves:'Pinnate, 5–7 leaflets; oval to elliptic, 4–9 cm; unpleasant smell when crushed.',branchLeaf:'Opposite. Flat-topped creamy-white flower clusters (June–July). Black berries in drooping clusters (September).',habitat:'Thrives on nitrogen-rich soils — disturbed ground, hedge banks. Indicator of old habitation or rabbit activity.'},facts:['Elderflower cordial and elderberry wine are among Britain\'s most popular traditional hedgerow drinks.','Elderflower has antiviral properties confirmed by modern research.','Elder was considered magical protection against witchcraft — deeply unlucky to burn it.','Hollow elder stems were used as bellows and pipes for toys.']},

{type:'shrubs',icon:'🔴',commonName:'Guelder Rose',taxonomicName:'Viburnum opulus',habitat:'Woodland Edge, Fen Carr & Wet Hedgerow',taxonomy:[{rank:'Order',name:'Dipsacales'},{rank:'Family',name:'Adoxaceae'},{rank:'Genus',name:'Viburnum'},{rank:'Species',name:'V. opulus'}],id:{bark:'Grey-brown, finely fissured. Twigs angular, hairless.',leaves:'Maple-like, 3–5 lobed; two glands on petiole. Brilliant red in autumn.',branchLeaf:'Opposite. Flat-topped flower heads with large sterile outer florets (May–June). <strong>Translucent scarlet berries</strong>.',habitat:'Damp woodland edges, scrub, fen carr, wet hedgerows.'},facts:['The spectacular scarlet, translucent berries are mildly toxic raw but eaten by redwing and fieldfare.','The cultivated "snowball tree" is a sterile garden form with all flowers enlarged.','The Kalyna (Guelder Rose) is the national flower of Ukraine — deeply embedded in folk tradition.','Guelder Rose wood was historically used to make charcoal for gunpowder.']},

{type:'shrubs',icon:'🟡',commonName:'Common Gorse',taxonomicName:'Ulex europaeus',habitat:'Heathland, Clifftop & Rough Grassland',taxonomy:[{rank:'Order',name:'Fabales'},{rank:'Family',name:'Fabaceae'},{rank:'Genus',name:'Ulex'},{rank:'Species',name:'U. europaeus'}],id:{bark:'Stems covered in tough branched spines (modified leaves). Old stems grey-brown, woody.',leaves:'True leaves only on seedlings — adult "leaves" are modified into fierce spines.',branchLeaf:'Bright yellow pea-flowers almost year-round (peak February–May). Explosive black seed pods audibly split on hot days.',habitat:'Heathland, cliff tops, rough grassland, moorland, roadsides on poor acid soils.'},facts:['"When gorse is out of bloom, kissing is out of fashion" — some gorse flowers in every month of the year.','The coconut-vanilla scent in warm sunshine is one of the most distinctive smells of British heathland.','Gorse scrub is critical nesting habitat for Dartford warbler, stonechat, and linnet.','Gorse fixes atmospheric nitrogen through root bacteria, improving poor heathland soils.']},

{type:'shrubs',icon:'🌿',commonName:'Dog Rose',taxonomicName:'Rosa canina',habitat:'Hedgerow, Scrub & Woodland Edge',taxonomy:[{rank:'Order',name:'Rosales'},{rank:'Family',name:'Rosaceae'},{rank:'Genus',name:'Rosa'},{rank:'Species',name:'R. canina'}],id:{bark:'Arching stems, green to red-brown, with <strong>strongly hooked thorns</strong> for scrambling.',leaves:'Pinnate, 5–7 oval leaflets; toothed. Variable hairiness.',branchLeaf:'Alternate. Pale pink to white 5-petalled flowers, June–July. Bright red oval hips persisting through winter.',habitat:'Hedgerows, scrub, woodland edge. Extremely common throughout UK.'},facts:['Rose hips contain 20 times more vitamin C than oranges — rosehip syrup was mass-produced in WWII for children.','The most common wild rose in Britain.','Robin\'s pincushion gall on dog rose is caused by the gall wasp Diplolepis rosae.','The name "dog rose" may derive from the belief that the root could cure rabies.']},

{type:'forbs',icon:'💜',commonName:'Common Bluebell',taxonomicName:'Hyacinthoides non-scripta',habitat:'Ancient Woodland Floor',taxonomy:[{rank:'Order',name:'Asparagales'},{rank:'Family',name:'Asparagaceae'},{rank:'Genus',name:'Hyacinthoides'},{rank:'Species',name:'H. non-scripta'}],id:{bark:'N/A — bulbous perennial. Bulbs white, papery, mildly toxic.',leaves:'Long, narrow, strap-like (7–16 mm wide). Glossy, channelled. <strong>Confusion:</strong> Spanish Bluebell has wider leaves, upright bells on all sides of stem, and little scent.',branchLeaf:'Stem arches over at tip. Bells droop on one side only. Stamens cream (not blue). <strong>Strongly honey-scented.</strong>',habitat:'Ancient semi-natural woodland — a reliable old-growth indicator.'},facts:['The UK holds ~50% of the world\'s entire bluebell population — internationally significant.','Legally protected under the Wildlife & Countryside Act 1981 — uprooting or trading wild bulbs is criminal.','Hybridisation with escaped Spanish Bluebell threatens genetic integrity of native populations.','Historically used to make glue for binding books and attaching arrow feathers.']},

{type:'forbs',icon:'🌼',commonName:'Oxeye Daisy',taxonomicName:'Leucanthemum vulgare',habitat:'Meadows, Roadsides & Chalk Grassland',taxonomy:[{rank:'Order',name:'Asterales'},{rank:'Family',name:'Asteraceae'},{rank:'Genus',name:'Leucanthemum'},{rank:'Species',name:'L. vulgare'}],id:{bark:'N/A — perennial herb 20–70 cm.',leaves:'Basal leaves spoon-shaped, long-stalked; stem leaves deeply lobed and clasping.',branchLeaf:'Alternate. Large solitary flower heads 3–5 cm; white ray florets around yellow disc. June–August.',habitat:'Meadows, roadsides, chalk and limestone grassland, embankments.'},facts:['Supports over 50 insect species — one of the most important wildflowers for pollinators in meadows.','Used in traditional medicine — leaves were eaten in salads as a tonic.','Used in the "he loves me, he loves me not" petal-plucking game.','A key component of native wildflower seed mixes used in meadow creation.']},

{type:'forbs',icon:'💛',commonName:'Common Cowslip',taxonomicName:'Primula veris',habitat:'Chalk Grassland, Meadows & Open Woodland',taxonomy:[{rank:'Order',name:'Ericales'},{rank:'Family',name:'Primulaceae'},{rank:'Genus',name:'Primula'},{rank:'Species',name:'P. veris'}],id:{bark:'N/A — perennial forming rosette.',leaves:'Obovate to oval, 5–15 cm; wrinkled, hairy; abruptly contracted to a winged petiole. Lighter green than primrose.',branchLeaf:'Nodding umbel of 10–30 deep yellow flowers with orange spots, on a tall stem, April–May.',habitat:'Chalk and limestone meadows, road verges, open woodland on calcareous soils. Indicator of ancient grassland.'},facts:['Cowslip populations crashed 90%+ between 1930–1980 due to agricultural intensification.','Since the 1980s, cowslip has recovered significantly and is frequently seen on motorway verges.','Cowslip wine made from the flowers was a traditional country drink.','The Duke of Burgundy butterfly uses cowslip as its sole larval foodplant.']},

{type:'forbs',icon:'🌸',commonName:'Ragged Robin',taxonomicName:'Silene flos-cuculi',habitat:'Damp Meadows, Marshes & Fens',taxonomy:[{rank:'Order',name:'Caryophyllales'},{rank:'Family',name:'Caryophyllaceae'},{rank:'Genus',name:'Silene'},{rank:'Species',name:'S. flos-cuculi'}],id:{bark:'N/A — perennial herb 30–70 cm.',leaves:'Lower leaves spoon-shaped; upper leaves narrow lance-shaped, opposite. Rough, hairy.',branchLeaf:'Opposite. <strong>Distinctive ragged-looking pink flowers</strong> — each petal deeply divided into 4 lobes. May–June.',habitat:'Damp meadows, marshes, fens, pond edges. Indicator of wet, unimproved grassland.'},facts:['Ragged Robin has declined by over 70% since the 1930s due to drainage of wet meadows.','The long-tubed flowers are adapted for long-tongued bumblebees and butterflies.','Cuckoos traditionally arrived just as Ragged Robin flowered — flos-cuculi means "cuckoo flower."','A common May Day flower — now scarce enough that most people have never seen it.']},

{type:'forbs',icon:'🟣',commonName:'Common Knapweed',taxonomicName:'Centaurea nigra',habitat:'Meadows, Roadsides & Rough Grassland',taxonomy:[{rank:'Order',name:'Asterales'},{rank:'Family',name:'Asteraceae'},{rank:'Genus',name:'Centaurea'},{rank:'Species',name:'C. nigra'}],id:{bark:'N/A — perennial herb 20–90 cm. Stems erect, wiry.',leaves:'Lower leaves stalked, oval to lance-shaped; upper leaves smaller, stalkless. Rough, hairy.',branchLeaf:'Alternate/opposite. Thistle-like purple flower heads (no ray florets), June–September. Dark "drumstick" seed heads in autumn.',habitat:'Meadows, roadsides, chalk grassland, hedge banks. Very common throughout UK.'},facts:['One of the most valuable wildflowers for pollinators — visited by bumblebees, butterflies, hoverflies, and beetles.','The hard seed heads of autumn are eaten by goldfinch and linnet, which cling to the stems.','In folk tradition, knapweed seeds were used in love divination on Midsummer\'s Eve.','Sometimes called "hardheads" — children used the seed heads as jousting toys.']},

{type:'grasses',icon:'🌾',commonName:'Marram Grass',taxonomicName:'Ammophila arenaria',habitat:'Coastal Sand Dunes',taxonomy:[{rank:'Family',name:'Poaceae'},{rank:'Genus',name:'Ammophila'},{rank:'Species',name:'A. arenaria'}],id:{bark:'N/A — coarse, stiff perennial grass 60–120 cm.',leaves:'<strong>Tightly rolled, sharp-pointed, grey-green; stiff and wiry.</strong> Rolled form reduces water loss. Leaf tips can draw blood.',branchLeaf:'Erect dense tufts. Compact cylinder-shaped flower spike 10–25 cm. Spreads by long rhizomes that bind sand.',habitat:'Exclusively on coastal sand dunes — the primary dune-building grass of the UK.'},facts:['Marram Grass is the architect of coastal sand dunes — its rhizomes bind loose sand while growth keeps pace with sand accumulation.','Without marram, most of Britain\'s sand dune systems would not exist.','Marram leaves were traditionally woven into rope, baskets, and mats in coastal communities.','Natterjack toads breed in dune slack pools that form between marram-stabilised dune ridges.']},

{type:'grasses',icon:'🌾',commonName:'Tufted Hair-grass',taxonomicName:'Deschampsia cespitosa',habitat:'Damp Grassland, Woodland Rides & Bog',taxonomy:[{rank:'Family',name:'Poaceae'},{rank:'Genus',name:'Deschampsia'},{rank:'Species',name:'D. cespitosa'}],id:{bark:'N/A — dense tussock-forming perennial 50–150 cm.',leaves:'Very rough to the touch on both surfaces (sharply ridged). Flat, 3–5 mm wide. Cutting edge — use caution.',branchLeaf:'Large, graceful, open panicle to 50 cm; branches very fine; <strong>spikelets shimmering silver-purple-gold when in flower.</strong>',habitat:'Damp woodland rides, wet grassland, moorland, bog. Forms characteristic large tussocks.'},facts:['Large tussocks are nest sites for field voles — short-eared owls hunt areas dominated by tussock grass.','One of the most architecturally beautiful British grasses in flower — widely used in ornamental horticulture.','Very rough leaves caused by silica in the surface cells — can cut skin if run against the grain.','Indicative of damp, poorly-drained soils in woodland or grassland.']},

{type:'grasses',icon:'🌾',commonName:'Yorkshire Fog',taxonomicName:'Holcus lanatus',habitat:'Grassland, Meadows & Woodland Rides',taxonomy:[{rank:'Family',name:'Poaceae'},{rank:'Genus',name:'Holcus'},{rank:'Species',name:'H. lanatus'}],id:{bark:'N/A — perennial 20–100 cm. <strong>Covered in soft grey-white hairs — distinctive tactile quality.</strong>',leaves:'Grey-green, softly hairy (velvet-textured). Flat, 5–10 mm wide. Stem nodes purple-ringed.',branchLeaf:'Erect. Panicle compact to spreading, soft, white-pink — very distinctive woolly-soft appearance.',habitat:'Extremely common across all grassland types, meadows, woodland rides, road verges.'},facts:['Found in virtually every grassland in the country — one of the most common British grasses.','Yorkshire Fog is a major cause of hay fever — its abundant pollen is produced June–August.','The name "fog" is an old term for rank grass growth after hay-cutting.','Provides abundant fine seed for linnets and twite in upland grassland.']},

{type:'grasses',icon:'🌾',commonName:"Cock's-foot",taxonomicName:'Dactylis glomerata',habitat:'Grassland, Hedgerows & Rough Ground',taxonomy:[{rank:'Family',name:'Poaceae'},{rank:'Genus',name:'Dactylis'},{rank:'Species',name:'D. glomerata'}],id:{bark:'N/A — robust tussock-forming perennial 30–140 cm.',leaves:'Strongly folded, keeled; blue-green. Ligule long, white, ragged.',branchLeaf:'Erect stems. <strong>Distinctive one-sided clustered spikelets in compact angular clusters</strong> — looking like a cock\'s foot in profile.',habitat:'Extremely common in most grassland types, hedgebanks, roadsides on fertile soils.'},facts:['One of the most important agricultural grasses — highly productive and drought-resistant, widely sown in improved pasture.','A major contributor to the hay fever season May–September.','The tussocks provide important nest sites for bumblebees and sheltered overwintering sites for invertebrates.','One of the easiest grasses to identify — the one-sided clustered spikelets and folded blue-green leaves are distinctive even to beginners.']},

{type:'grasses',icon:'🌾',commonName:'Sweet Vernal Grass',taxonomicName:'Anthoxanthum odoratum',habitat:'Meadows, Heathland & Acid Grassland',taxonomy:[{rank:'Family',name:'Poaceae'},{rank:'Genus',name:'Anthoxanthum'},{rank:'Species',name:'A. odoratum'}],id:{bark:'N/A — slender perennial 20–50 cm. <strong>Whole plant aromatic.</strong>',leaves:'Flat, 3–6 mm; <strong>smell strongly of new-mown hay when crushed</strong> — coumarin.',branchLeaf:'Erect. Dense narrow spike-like panicle; dark purple-gold anthers. <strong>Flowers early (April–June)</strong>.',habitat:'Acid to neutral meadows, heathland, moorland. Characteristic of traditionally managed upland hay meadow.'},facts:['Sweet Vernal Grass contains coumarin — the compound responsible for the smell of freshly mown hay.','Flowers exceptionally early (April) — one of the best grass identification aids in spring.','Characteristic of upland hay meadows often found with wood cranesbill and melancholy thistle.','Poisonous to livestock if consumed in large quantity — coumarin interferes with blood clotting.']},

{type:'ferns',icon:'🌿',commonName:'Bracken',taxonomicName:'Pteridium aquilinum',habitat:'Heathland, Moorland, Woodland & Hillside',taxonomy:[{rank:'Division',name:'Polypodiophyta'},{rank:'Family',name:'Dennstaedtiaceae'},{rank:'Genus',name:'Pteridium'},{rank:'Species',name:'P. aquilinum'}],id:{bark:'N/A — fronds 30–200 cm, arising singly from deep underground rhizome network.',leaves:'Broadly triangular, divided into 2–3 pairs of major leaflets; each finely divided. Harsh texture. Yellow in autumn.',branchLeaf:'Single fronds (not central crown). Sori in continuous marginal band.',habitat:'Heathland, moorland, woodland, hillside on acid soils. One of the most widespread plants in Britain.'},facts:['Bracken is the world\'s most successful fern — found on every continent except Antarctica.','It is carcinogenic to cattle and contains thiaminase which destroys thiamine.','Bracken expansion onto heathland and grassland is a major conservation problem — managed by bruising and cutting.','Under bracken, millions of overwintering insects find shelter — it has more conservation value than its invasive reputation suggests.']},

{type:'ferns',icon:'🌿',commonName:"Hart's Tongue Fern",taxonomicName:'Asplenium scolopendrium',habitat:'Damp Walls, Rocky Woodland & Limestone',taxonomy:[{rank:'Division',name:'Polypodiophyta'},{rank:'Family',name:'Aspleniaceae'},{rank:'Genus',name:'Asplenium'},{rank:'Species',name:'A. scolopendrium'}],id:{bark:'Tufted, from short rhizome. Stipe with dark-edged brown scales.',leaves:'<strong>Uniquely: entirely undivided (simple), strap-shaped</strong> frond 20–60 cm. Glossy, dark green. Winter-green.',branchLeaf:'Fronds unfurl from a central crown. Sori in long parallel pairs on frond underside.',habitat:'Damp, shaded rocky habitats, limestone pavement, old walls, hedge banks.'},facts:["Uniquely among British ferns, Hart's Tongue has simple, undivided fronds — instantly distinguishing it from all other native ferns.",'A classic indicator of ancient hedgebanks and undisturbed damp limestone habitat.','The long parallel lines of sori resemble a centipede — hence scolopendrium (centipede).','In traditional medicine, hart\'s tongue was used to treat liver and spleen conditions.']},

{type:'ferns',icon:'🌿',commonName:'Common Polypody',taxonomicName:'Polypodium vulgare',habitat:'Rocks, Walls, Trees & Shaded Ground',taxonomy:[{rank:'Division',name:'Polypodiophyta'},{rank:'Family',name:'Polypodiaceae'},{rank:'Genus',name:'Polypodium'},{rank:'Species',name:'P. vulgare'}],id:{bark:'From creeping surface rhizome covered in orange-brown scales.',leaves:'Fronds 10–40 cm; once-pinnate with blunt entire segments. Mid-green, leathery, evergreen.',branchLeaf:'Fronds arise singly. Round sori on underside — naked (no cover), yellowish becoming orange.',habitat:'Rock faces, walls, tree trunks (epiphytic), and shaded banks. Prefers non-calcareous substrates.'},facts:['Often found growing as an epiphyte on mossy branches of old oak trees in humid Atlantic oakwoods of Wales and western Scotland.','The rhizome tastes of liquorice — contains osladin, a compound 3,000 times sweeter than sucrose.','One of three very similar polypody species in Britain — careful examination needed to distinguish them.','Evergreen through winter, providing green colour in otherwise bare woodland.']},

{type:'ferns',icon:'🌿',commonName:'Lady Fern',taxonomicName:'Athyrium filix-femina',habitat:'Damp Woodland, Streamside & Mountain',taxonomy:[{rank:'Division',name:'Polypodiophyta'},{rank:'Family',name:'Athyriaceae'},{rank:'Genus',name:'Athyrium'},{rank:'Species',name:'A. filix-femina'}],id:{bark:'Large, graceful tufted fern. Stipe with pale brown scales.',leaves:'Fronds 30–100 cm; broadly lance-shaped; <strong>finely divided giving a lacy elegant appearance.</strong> Pale to mid-green. Deciduous.',branchLeaf:'Central crown; fronds arch gracefully outward. Sori oblong, curved, with horseshoe-shaped indusium — diagnostic.',habitat:'Damp woodland, streamsides, mountain ravines. Especially abundant in Scottish Highlands.'},facts:['The most graceful of all British woodland ferns — its finely divided arching fronds create an elegant lacy texture.','One of the most variable ferns — hundreds of varieties with crested or forked frond tips were found during Victorian fern mania (pteridomania).','Highly sensitive to air pollution — its presence indicates clean, moist air conditions.','The "feminine" contrast with the coarser Male Fern gave rise to the name.']},

{type:'ferns',icon:'🌿',commonName:'Royal Fern',taxonomicName:'Osmunda regalis',habitat:'Bog, Fen, Streamside & Atlantic Woodland',taxonomy:[{rank:'Division',name:'Polypodiophyta'},{rank:'Family',name:'Osmundaceae'},{rank:'Genus',name:'Osmunda'},{rank:'Species',name:'O. regalis'}],id:{bark:'N/A — massive fern to 2+ m. Forms large clumps. Old rootstock very fibrous.',leaves:'Fronds to 2 m; twice-pinnate; oval pinnae. <strong>Fertile fronds with brown spore-bearing pinnae at apex</strong> — unique among British ferns.',branchLeaf:'Crown-forming. Fronds golden-brown in autumn.',habitat:'Acid bog, fen carr, streamside, Atlantic oakwood. Requires consistently moist conditions.'},facts:['The largest native British fern — fronds can reach over 2 metres, giving a tropical appearance.','Once common in fen and bog across Britain — over-harvested for the horticultural trade in the 19th century.','Osmunda fibre (the root mass) is used as a growing medium for orchids — once commercially harvested from wild plants.','Osmundacaulis — the fossil stem of Osmunda — is known from rocks over 200 million years old — a true "living fossil."']},

{type:'fungi',icon:'💀',commonName:'Death Cap',taxonomicName:'Amanita phalloides',habitat:'Broadleaved Woodland, Especially with Oak',taxonomy:[{rank:'Kingdom',name:'Fungi'},{rank:'Division',name:'Basidiomycota'},{rank:'Family',name:'Amanitaceae'},{rank:'Genus',name:'Amanita'},{rank:'Species',name:'A. phalloides'}],id:{bark:'Cap: <strong>pale yellowish-green to olive-grey, 5–15 cm; smooth. MUST KNOW this species.</strong>',leaves:'Gills: free, white. Stem: white with skirt-like ring and <strong>prominent cup-like volva at base</strong> — often buried in soil.',branchLeaf:'Grows in broadleaved woodland. Smells faintly pleasant when fresh. White to pale green throughout.',habitat:'Under oak, beech, chestnut, and hornbeam in southern and eastern England.'},facts:['<strong>Responsible for approximately 90% of all fatal mushroom poisonings worldwide.</strong>','Contains amatoxins causing delayed liver and kidney failure — symptoms appear 6–24 hours after eating, when irreversible damage may already have occurred.','Half a cap is sufficient to kill an adult human. No antidote — treatment is supportive care or liver transplant.','Frequently mistaken for edible species including button mushrooms and puffballs — a particular danger to those unfamiliar with European fungi.']},

{type:'fungi',icon:'🍄',commonName:'Cep / Penny Bun',taxonomicName:'Boletus edulis',habitat:'Broadleaved & Coniferous Woodland',taxonomy:[{rank:'Kingdom',name:'Fungi'},{rank:'Division',name:'Basidiomycota'},{rank:'Family',name:'Boletaceae'},{rank:'Genus',name:'Boletus'},{rank:'Species',name:'B. edulis'}],id:{bark:'Cap: brown ("bun-like"), convex to flat, 8–30 cm.',leaves:'<strong>Pores (not gills)</strong> — white to yellow, fine texture. Stem: pale brown with distinctive white net-like pattern (reticulation) — diagnostic.',branchLeaf:'Ectomycorrhizal with oak, beech, birch, pine. Heady rich earthy smell.',habitat:'Under broadleaves or conifers on sandy, well-drained soils.'},facts:['The cep (porcini) is one of the most highly valued edible fungi in the world — dried porcini are a staple of Italian cuisine.','The white net pattern (reticulation) on the stem is the key identification feature.','The Satanic Bolete (B. satanas) is a toxic lookalike with red pores.','British commercial picking is largely done by Eastern European pickers for export to continental Europe.']},

{type:'fungi',icon:'🍄',commonName:'Chanterelle',taxonomicName:'Cantharellus cibarius',habitat:'Broadleaved Woodland on Acid Soils',taxonomy:[{rank:'Kingdom',name:'Fungi'},{rank:'Division',name:'Basidiomycota'},{rank:'Family',name:'Cantharellaceae'},{rank:'Genus',name:'Cantharellus'},{rank:'Species',name:'C. cibarius'}],id:{bark:'Cap: egg-yolk yellow, 3–10 cm; wavy, irregular margin.',leaves:'<strong>False gills — forked, blunt-edged ridges</strong> (not true gills), running down stem. Fruity, apricot-like smell.',branchLeaf:'Ectomycorrhizal with oak and beech on acid soils. Fruiting July–November.',habitat:'Deciduous woodland on acid, well-drained soils.'},facts:['Among the most prized edible mushrooms in Europe — fruity apricot scent and delicate flavour.','The blunt, forking ridges (false gills) are critical for identification. The False Chanterelle (Hygrophoropsis aurantiaca) has true gills and is toxic.','Chanterelles cannot be cultivated commercially — strictly mycorrhizal and require established forest trees.','UK stocks have declined significantly in areas with commercial picking.']},

{type:'fungi',icon:'🌿',commonName:'Chicken of the Woods',taxonomicName:'Laetiporus sulphureus',habitat:'On Dead or Living Broadleaved Trees',taxonomy:[{rank:'Kingdom',name:'Fungi'},{rank:'Division',name:'Basidiomycota'},{rank:'Family',name:'Polyporaceae'},{rank:'Genus',name:'Laetiporus'},{rank:'Species',name:'L. sulphureus'}],id:{bark:'Large, overlapping, shelf-like brackets; <strong>bright sulphur-yellow to orange.</strong> No stalk.',leaves:'Pores on underside (not gills); tiny, yellow. Flesh white, soft and succulent when young; tough and dry when old.',branchLeaf:'Grows in mass of stacked overlapping brackets. Can weigh many kilograms.',habitat:'Dead or dying broadleaved trees, especially oak, yew, and sweet chestnut.'},facts:['The bright sulphur-yellow colour makes this one of the most unmistakeable fungi in Britain.','Young fresh brackets are edible with a remarkably chicken-like texture and flavour — hence the name.','Growing on yew produces a form that can cause adverse reactions — only eat specimens from non-yew trees.','A major cause of butt rot in oak trees — attacks the heartwood while the tree continues to live.']},

{type:'fungi',icon:'🟠',commonName:'Giant Puffball',taxonomicName:'Calvatia gigantea',habitat:'Meadow, Woodland Edge & Disturbed Ground',taxonomy:[{rank:'Kingdom',name:'Fungi'},{rank:'Division',name:'Basidiomycota'},{rank:'Family',name:'Agaricaceae'},{rank:'Genus',name:'Calvatia'},{rank:'Species',name:'C. gigantea'}],id:{bark:'<strong>Enormous white sphere — football to head-sized (30–80 cm). Smooth, white skin.</strong>',leaves:'No gills — pure white flesh inside (edible stage). Interior becomes yellow then olive-green (spore mass) with age.',branchLeaf:'Attached to substrate by a cord. No ring or volva.',habitat:'Meadows, woodland edge, parks, gardens. Sporadic and unpredictable.'},facts:['A single Giant Puffball can contain up to 7 trillion spores.','Edible and excellent when pure white inside — sliced and fried in butter, it has a mild earthy flavour.','Must always be sliced vertically before eating to confirm it is entirely white inside — rules out young death cap.','The largest ever recorded was 170 cm in circumference — found in Canada in 1877.']},

{type:'birds',icon:'🐦',commonName:'Robin',taxonomicName:'Erithacus rubecula',habitat:'Woodland, Garden & Hedgerow',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Muscicapidae'},{rank:'Genus',name:'Erithacus'},{rank:'Species',name:'E. rubecula'}],id:{colour:'Bright <strong>orange-red breast and face</strong>; brown upperparts; white belly. Both sexes identical.',sizeShape:'Body 13–14 cm. Plump, rounded body; large dark eye; upright stance.',keyFeatures:'Orange-red breast unmistakeable. Confusion: none as adult. <strong>Juvenile:</strong> completely different — brown and spotted, lacking red breast entirely. High thin "tic-tic" alarm call; melodious song year-round including winter nights.',habitat:'Woodland edge, gardens, hedgerows. Follows gardeners hoping for disturbed invertebrates. Strongly territorial.'},facts:['Voted unofficial national bird in a 2015 poll. Features on Christmas cards more than any other bird.','Robins sing throughout the night in urban areas, confused by artificial light.','Both male and female robins hold territories in winter — a female will attack a red-breasted intruder.','The robin\'s fondness for following garden digging derived from following wild boar — the gardener is a surprisingly effective boar substitute.']},

{type:'birds',icon:'🐦',commonName:'Blue Tit',taxonomicName:'Cyanistes caeruleus',habitat:'Woodland, Hedgerow & Garden',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Paridae'},{rank:'Genus',name:'Cyanistes'},{rank:'Species',name:'C. caeruleus'}],id:{colour:'<strong>Blue cap, wings, and tail</strong>; yellow underparts; white cheeks with dark stripe through eye; green back.',sizeShape:'Body 11–12 cm. Very small; short bill; acrobatic. Actively feeds upside-down on twigs.',keyFeatures:'Blue cap diagnostic. Confusion: Great Tit has black cap, white cheeks, bold black breast stripe. <strong>Juvenile:</strong> yellower overall, cap greenish-blue, cheeks washed yellow.',habitat:'Oak woodland, gardens, hedgerows. Uses nest boxes readily.'},facts:['Blue Tit breeding is timed to peak oak caterpillar abundance — climate-driven phenological mismatch is one of the most studied climate-change effects in British ecology.','In the 1920s, blue tits learned to pierce milk bottle tops — the behaviour spread across Britain, an early documented example of cultural transmission in birds.','A single nest can contain up to 16 eggs — among the largest clutches of any British bird.','Show a distinct preference for oak woodland — an oak tree supports more caterpillar species than any other British tree.']},

{type:'birds',icon:'🐦',commonName:'Great Tit',taxonomicName:'Parus major',habitat:'Woodland, Hedgerow & Garden',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Paridae'},{rank:'Genus',name:'Parus'},{rank:'Species',name:'P. major'}],id:{colour:'<strong>Glossy black head and throat</strong>; white cheeks; yellow underparts with broad black stripe (broader in males).',sizeShape:'Body 13–15 cm. Larger and more robust than Blue Tit. Powerful bill.',keyFeatures:'Bold black-and-white head pattern diagnostic. Confusion: Coal Tit has white nape-patch. <strong>Juvenile:</strong> head black-brown, cheeks washed yellow. Distinctive "tea-cher, tea-cher" call.',habitat:'Woodland, gardens, hedgerows. Most adaptable and common of the tit family.'},facts:['Great Tits have the largest vocabulary of any UK bird — over 40 distinct call types recorded.','They will use hammer blows to break open hazelnuts — one of the few British birds to use a tool-like technique.','In Dutch studies, bill size has measurably increased in response to garden feeders — rapid microevolution within decades.','A 60-year study at Wytham Wood, Oxford has tracked individual Great Tits since 1947.']},

{type:'birds',icon:'🐦',commonName:'Wren',taxonomicName:'Troglodytes troglodytes',habitat:'Woodland, Garden, Moorland & Coast',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Troglodytidae'},{rank:'Genus',name:'Troglodytes'},{rank:'Species',name:'T. troglodytes'}],id:{colour:'Warm brown, heavily barred above; pale supercilium; pale below with buff and brown barring.',sizeShape:'Body 9–10 cm — one of Britain\'s smallest birds. Very round, short-tailed; <strong>tail often cocked upright.</strong>',keyFeatures:'Tiny size, round body, cocked tail. Confusion: Dunnock is larger, grey-breasted. <strong>Juvenile:</strong> similar to adult. Explosive loud song (remarkably loud for size) and rattling "kerr" alarm.',habitat:'Almost every habitat with dense cover — woodland, garden, heathland, moorland, reedbeds, rocky coasts.'},facts:["The UK's most abundant breeding bird — estimated 8 million pairs.",'Despite tiny size, the Wren\'s song is one of the loudest relative to body size — audible up to 500 metres.','Populations can crash by 80% in a severe winter but recover rapidly in good years.','In Irish, Scottish, and Welsh tradition the Wren was the "king of birds" — Wren Day (26 December) is still celebrated.']},

{type:'birds',icon:'🐦',commonName:'Blackbird',taxonomicName:'Turdus merula',habitat:'Woodland, Garden, Park & Farmland',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Turdidae'},{rank:'Genus',name:'Turdus'},{rank:'Species',name:'T. merula'}],id:{colour:'<strong>Male: completely jet black with bright yellow-orange bill and eye-ring.</strong> Female: dark brown, streaked below.',sizeShape:'Body 24–25 cm. Sleek, long-tailed thrush. Runs and hops with characteristic pause-and-tilt posture.',keyFeatures:'Male unmistakeable. Confusion: Ring Ouzel has white breast crescent. <strong>Juvenile male:</strong> brown with blackish tinge, bill dark. Rich melodic flute-like song.',habitat:'Woodland, gardens, parks, hedgerows. One of the most adaptable UK species.'},facts:['The Blackbird\'s song is considered by many ornithologists to be the most musical of any British bird.','Blackbirds detect earthworms by sound — they tilt their head to listen, not to improve vision as sometimes claimed.','A woodland bird that has adapted completely to urban life — city blackbirds are less wary and sing differently to rural birds.','In the nursery rhyme — "four and twenty blackbirds baked in a pie" — live birds in pies were a documented medieval entertainment.']},

{type:'mammals',icon:'🦡',commonName:'European Badger',taxonomicName:'Meles meles',habitat:'Woodland & Farmland',taxonomy:[{rank:'Order',name:'Carnivora'},{rank:'Family',name:'Mustelidae'},{rank:'Genus',name:'Meles'},{rank:'Species',name:'M. meles'}],id:{colour:'Grey above; black below; <strong>distinctive black-and-white striped face</strong>.',sizeShape:'Body 70–80 cm plus short tail. Heavy, low-slung; powerful clawed forefeet.',keyFeatures:'Black-and-white striped face diagnostic. Confusion: none. Gruff snuffling sounds. Heavily worn paths through hedgerows.',habitat:'Woodland, farmland, hedgerows. Setts in well-drained sloping ground.'},facts:['The UK has the highest badger density in Europe — estimated 350,000+ animals.','Badger setts can contain up to 10 metres of underground tunnels and have been occupied for hundreds of years.','Badgers are omnivores — earthworms can make up 50–60% of the diet in summer.','Subject to ongoing TB-related culling in England — deeply controversial; the scientific evidence on culling efficacy is disputed.']},

{type:'mammals',icon:'🦦',commonName:'Eurasian Otter',taxonomicName:'Lutra lutra',habitat:'Rivers, Lakes & Coastal Waters',taxonomy:[{rank:'Order',name:'Carnivora'},{rank:'Family',name:'Mustelidae'},{rank:'Genus',name:'Lutra'},{rank:'Species',name:'L. lutra'}],id:{colour:'Rich brown above; creamy-buff below; paler throat.',sizeShape:'Body 60–80 cm plus 40 cm tail. Sleek, elongated, muscular; webbed feet.',keyFeatures:'Sinuous diving movement; elongated streamlined body. Confusion: Mink is much smaller, darker. Spraint (droppings) have distinctive fishy smell with mucilaginous texture.',habitat:'Clean rivers, lakes, and estuaries with good bankside cover. Requires clean water and abundant fish.'},facts:['UK Otter populations recovered dramatically from the 1970s DDT crash — now present in every English county.','Otters are largely nocturnal — tracks (webbed prints) and spraint (droppings) are the most reliable evidence.','A "holt" is the name for an otter\'s den — typically beneath tree roots or in a riverbank burrow.','Otters swim at up to 12 km/h — they can cover 30+ km of river in a single night\'s foraging.']},

{type:'mammals',icon:'🦌',commonName:'Roe Deer',taxonomicName:'Capreolus capreolus',habitat:'Woodland, Hedgerow & Agricultural Land',taxonomy:[{rank:'Order',name:'Artiodactyla'},{rank:'Family',name:'Cervidae'},{rank:'Genus',name:'Capreolus'},{rank:'Species',name:'C. capreolus'}],id:{colour:'Reddish-brown in summer; grey-brown in winter. <strong>Prominent white rump patch.</strong> No visible tail.',sizeShape:'Body 95–135 cm; shoulder height 60–75 cm. The smallest native UK deer. Short upright antlers (max 3 points).',keyFeatures:'White rump "powder puff" and very small size diagnostic. Confusion: Chinese Water Deer lacks antlers and has tusks. <strong>Fawn:</strong> spotted for first 6–8 weeks.',habitat:'Woodland edge, hedgerows, agricultural land. Largely solitary or in small family groups.'},facts:['The Roe Deer is one of Britain\'s two native deer species — the other being Red Deer.','It has the unusual reproductive strategy of delayed implantation — mating in July–August but the embryo not implanting until January, with fawns born in May–June.','The "fairy rings" in woodland clearings — circular trodden paths — are made by roe deer during their summer rut.','Roe deer numbers have increased substantially and now cause significant damage to young woodland and garden shrubs.']},

{type:'mammals',icon:'🦌',commonName:'Red Deer',taxonomicName:'Cervus elaphus',habitat:'Upland Moorland, Open Woodland & Deer Parks',taxonomy:[{rank:'Order',name:'Artiodactyla'},{rank:'Family',name:'Cervidae'},{rank:'Genus',name:'Cervus'},{rank:'Species',name:'C. elaphus'}],id:{colour:'Reddish-brown in summer; grey-brown in winter. Pale rump. Male: large complex branched antlers shed annually.',sizeShape:'Body 160–250 cm; shoulder height 115–130 cm. The largest native UK land mammal.',keyFeatures:'Size alone is often diagnostic in upland Britain. <strong>Male (stag):</strong> impressive branched antlers. <strong>Calf:</strong> spotted for first few weeks.',habitat:'Upland moorland and open woodland in Scotland; lowland deer parks elsewhere.'},facts:['The Red Deer stag\'s roaring rut in September–October is one of the most impressive wildlife spectacles in Britain — dominant stags are recognised by their deepest roars.','UK Red Deer numbers (approximately 400,000) are at the highest level for centuries — causing overgrazing of woodland regeneration across Scotland.','Red Deer are not continuously native in all areas — many UK populations derive from released deer park animals.','The antler growth cycle is one of the fastest tissue growth rates known in mammals — a full set of antlers regrows each year.']},

{type:'mammals',icon:'🦌',commonName:'Fallow Deer',taxonomicName:'Dama dama',habitat:'Woodland & Deer Parks',taxonomy:[{rank:'Order',name:'Artiodactyla'},{rank:'Family',name:'Cervidae'},{rank:'Genus',name:'Dama'},{rank:'Species',name:'D. dama'}],id:{colour:'Dappled fawn with white spots in summer (some individuals melanistic — dark brown to black). White rump with black inverted horseshoe. <strong>Male: distinctive broad palmate antlers.</strong>',sizeShape:'Body 130–165 cm; shoulder height 85–100 cm. Medium-sized deer.',keyFeatures:'Spotted summer coat + palmate antlers on male. Confusion: Sika Deer is smaller, less spotted. <strong>Fawn:</strong> very similar to adult pattern.',habitat:'Deciduous woodland, open parkland. Often in herds.'},facts:['Fallow Deer were introduced to Britain by the Normans — almost certainly not native (though possibly in Pleistocene).','Fallow Deer bucks produce a distinctive belching grunt during the rut — unlike the roar of Red Deer.','The spotted coat pattern is unique among UK deer — making fallow deer unmistakeable at a glance.','Fallow deer cause significant damage to young trees and ground flora in woodland, requiring management.']},

{type:'reptiles',icon:'🐍',commonName:'Grass Snake',taxonomicName:'Natrix helvetica',habitat:'Wetland Edge, Meadow & Garden',taxonomy:[{rank:'Order',name:'Squamata'},{rank:'Family',name:'Colubridae'},{rank:'Genus',name:'Natrix'},{rank:'Species',name:'N. helvetica'}],id:{colour:'Olive-green to grey above; black-chequered sides and belly; <strong>distinctive yellow-and-black collar behind head</strong>.',sizeShape:'Body 60–100 cm. Largest UK snake; slender; oval head; round pupils.',keyFeatures:'Yellow-and-black collar diagnostic. Confusion: Adder lacks collar, has zigzag; Smooth Snake has narrow head, no collar. Feigns death and emits foul musk when handled.',habitat:'Wet meadows, wetland edges, compost heaps (warm egg-laying sites), woodland edge. Swims readily.'},facts:['Grass Snake is entirely harmless — its defences are playing dead and releasing foul-smelling musk from cloacal glands.','The only egg-laying UK snake — lays in compost heaps and rotting vegetation, using the heat of decomposition to incubate.','Reclassified from Natrix natrix to N. helvetica in 2017 following genetic analysis — a distinct species from the Continental Grass Snake.','Can dive and swim underwater for several minutes pursuing frogs and fish.']},

{type:'reptiles',icon:'🐍',commonName:'Adder',taxonomicName:'Vipera berus',habitat:'Heathland, Moorland & Woodland Edge',taxonomy:[{rank:'Order',name:'Squamata'},{rank:'Family',name:'Viperidae'},{rank:'Genus',name:'Vipera'},{rank:'Species',name:'V. berus'}],id:{colour:'Grey (male) or brown (female); <strong>unmistakeable bold zigzag dorsal stripe the full body length</strong>. "X" or "V" mark on head. Vertical slit pupil.',sizeShape:'Body 50–80 cm. Stocky; diamond-shaped head; short tail.',keyFeatures:'Zigzag and vertical pupil diagnostic. Confusion: Grass Snake has collar; Smooth Snake has no zigzag. <strong>Juvenile:</strong> same pattern from birth.',habitat:'Heathland, moorland, chalk grassland, woodland edge with sunny rides. Basking sites essential.'},facts:['The only venomous UK snake — bites are rare and rarely fatal (last UK death in 1975) but need prompt medical attention.','Male Adders perform a "dance" in spring — rival males rear up and entwine, wrestling until one is overthrown.','Adder populations have declined by an estimated 50–90% at some sites since 1990 — habitat loss and fragmentation are primary causes.','Dogs are bitten far more often than humans — most recover with veterinary treatment.']},

{type:'reptiles',icon:'🦎',commonName:'Common Lizard',taxonomicName:'Zootoca vivipara',habitat:'Heathland, Moorland, Dunes & Grassland',taxonomy:[{rank:'Order',name:'Squamata'},{rank:'Family',name:'Lacertidae'},{rank:'Genus',name:'Zootoca'},{rank:'Species',name:'Z. vivipara'}],id:{colour:'Brown to grey-brown with rows of darker and paler spots and stripes. Male has bright orange or yellow spotted belly; female pale cream belly.',sizeShape:'Body 10–15 cm including long tail. Slender; pointed head.',keyFeatures:'Only truly widespread UK lizard. Confusion: Sand Lizard is larger, male has vivid green flanks; Slow-worm is legless. <strong>Juvenile:</strong> very dark, almost black.',habitat:'Heathland, moorland, rough grassland, woodland rides, dunes, rock faces. UK\'s most widespread reptile.'},facts:['The only UK reptile to occur throughout Britain including Scotland, Ireland, and mountain tops.','Viviparous — gives birth to live young, an adaptation to cool northern climates where eggs would not develop.','Tail autonomy: the lizard voluntarily sheds its tail to escape a predator. The tail wriggles as a decoy while the lizard escapes; it partly regrows.','Basks conspicuously on sunny mornings — the easiest reptile to observe in the field.']},

{type:'reptiles',icon:'🐍',commonName:'Slow-worm',taxonomicName:'Anguis fragilis',habitat:'Garden, Heathland & Rough Grassland',taxonomy:[{rank:'Order',name:'Squamata'},{rank:'Family',name:'Anguidae'},{rank:'Genus',name:'Anguis'},{rank:'Species',name:'A. fragilis'}],id:{colour:'Smooth, shiny, golden-brown or grey-brown (male); female browner, often with dark side stripe.',sizeShape:'Body 30–50 cm. Limbless — but a lizard, not a snake.',keyFeatures:'Smooth, shiny scales; <strong>eyelids present and visible</strong> (snakes cannot blink); ear openings. Confusion: Snakes have no eyelids. <strong>Juvenile:</strong> gold with fine black dorsal and side stripes.',habitat:'Gardens, heathland, rough grassland, woodland edges. Under compost heaps, logs, and roofing felt.'},facts:['The Slow-worm is a legless lizard, not a snake — it has eyelids, external ear openings, and can shed its tail.','Britain\'s longest-lived reptile — wild individuals can reach 20–30 years; captive record is over 54 years.','One of the commonest reptiles in British gardens, yet rarely seen — discovered under raised objects at dusk or dawn.','The specific epithet fragilis refers to tail autotomy — they readily shed their tail to escape.']},

{type:'reptiles',icon:'🐸',commonName:'Common Frog',taxonomicName:'Rana temporaria',habitat:'Pond, Garden, Meadow & Woodland',taxonomy:[{rank:'Order',name:'Anura'},{rank:'Family',name:'Ranidae'},{rank:'Genus',name:'Rana'},{rank:'Species',name:'R. temporaria'}],id:{colour:'Highly variable: yellow, brown, olive or reddish; dark blotches; dark stripe through eye. Smooth, moist skin.',sizeShape:'Body 6–9 cm. Round; smooth skin; powerful hind legs for jumping.',keyFeatures:'Smooth moist skin; round pupils; pointed snout. Confusion: Common Toad is warty, crawls rather than hops; Marsh Frog is larger, green.',habitat:'Any freshwater pond for breeding; wide range of damp terrestrial habitats year-round.'},facts:['Britain\'s commonest amphibian — its spawn in garden ponds is one of the most widely recognised signs of spring.','Frogs can breathe through their skin when hibernating in pond mud — absorbing dissolved oxygen directly.','Frog spawn has declined in countryside ponds but garden pond creation has helped maintain urban populations.','Ranavirus disease (ranavirosis) is causing increasing mass mortality events — dead frogs found near ponds should be reported.']},

{type:'fish',icon:'🐟',commonName:'Brown Trout',taxonomicName:'Salmo trutta',habitat:'Clean Upland Streams, Rivers & Lakes',taxonomy:[{rank:'Order',name:'Salmoniformes'},{rank:'Family',name:'Salmonidae'},{rank:'Genus',name:'Salmo'},{rank:'Species',name:'S. trutta'}],id:{colour:'Variable: brown to golden-olive; <strong>black and red-orange spots with pale halos on flanks</strong>. Pale belly. Sea Trout (same species) silver.',sizeShape:'Typically 20–50 cm (wild river fish). Variable by habitat.',keyFeatures:'Black and orange-red spots with pale halos. Confusion: Rainbow Trout has pink lateral band; Atlantic Salmon fewer but larger spots. Adipose fin present (no rays).',habitat:'Clean, cool, well-oxygenated streams, rivers, and upland lakes. Sea Trout is the migratory form.'},facts:['The most widely distributed native UK freshwater fish — in virtually every clean upland stream in Britain and Ireland.','Brown Trout require high water quality — they are indicator species and among the first fish to vanish from polluted rivers.','Sea Trout are genetically identical to Brown Trout — the same species in a sea-going form, like Salmon.','Fly fishing for Brown Trout on rivers like the Test and Itchen is one of Britain\'s oldest field sports traditions.']},

{type:'fish',icon:'🐟',commonName:'Atlantic Salmon',taxonomicName:'Salmo salar',habitat:'Clean Fast Rivers & North Atlantic',taxonomy:[{rank:'Order',name:'Salmoniformes'},{rank:'Family',name:'Salmonidae'},{rank:'Genus',name:'Salmo'},{rank:'Species',name:'S. salar'}],id:{colour:'At sea: steel-blue above; silver flanks; white belly. In river (breeding): copper-bronze with red flush. Cock fish develops hooked kype on lower jaw.',sizeShape:'Typically 70–100 cm; 3–10 kg (larger fish recorded). Streamlined with forked tail.',keyFeatures:'Large silver fish in river context. Confusion: Brown Trout is smaller, more heavily spotted; Sea Trout very similar but fewer, larger spots.',habitat:'Natal rivers for spawning; North Atlantic for growth. Requires clean gravel headstreams.'},facts:['Salmon navigate back to their exact birth stream using smell — memorising its unique chemical signature as juveniles.','UK salmon populations have declined dramatically since the 1970s — among the most urgent UK conservation concerns.','A salmon leaping a waterfall is one of Britain\'s most spectacular wildlife sights — the River Tay and River Awe are classic locations.','Spawning salmon that die enrich river and woodland ecology with marine-derived nutrients.']},

{type:'fish',icon:'🐟',commonName:'Three-spined Stickleback',taxonomicName:'Gasterosteus aculeatus',habitat:'Rivers, Ponds, Ditches & Coastal',taxonomy:[{rank:'Order',name:'Gasterosteiformes'},{rank:'Family',name:'Gasterosteidae'},{rank:'Genus',name:'Gasterosteus'},{rank:'Species',name:'G. aculeatus'}],id:{colour:'Non-breeding: silver-grey with greenish tinge. <strong>Breeding male: vivid scarlet-red throat and belly; brilliant blue-green eye.</strong>',sizeShape:'Body 4–8 cm — tiny. Three sharp dorsal spines.',keyFeatures:'Three spines + breeding male coloration unique. Confusion: Ten-spined Stickleback has 8–11 spines and is more slender.',habitat:'Almost all freshwater habitats and coastal brackish water. Extremely widespread.'},facts:['The breeding male is one of the most vividly coloured vertebrates in Britain — red-and-blue dress unlike any other UK fish.','The male builds a nest of plant material glued with kidney secretions, fans oxygen over the eggs, and guards the young alone.','Sticklebacks are among the most important animals in evolutionary biology — parallel freshwater colonisations from the sea have produced identical adaptations independently worldwide.','One of the easiest fish to observe: breeding males are conspicuous in shallow clear water in May and June.']},

{type:'fish',icon:'🐟',commonName:'Atlantic Mackerel',taxonomicName:'Scomber scombrus',habitat:'Open Sea & Inshore Coastal Waters',taxonomy:[{rank:'Order',name:'Scombriformes'},{rank:'Family',name:'Scombridae'},{rank:'Genus',name:'Scomber'},{rank:'Species',name:'S. scombrus'}],id:{colour:'<strong>Vivid blue-green above with wavy dark lines; silver-white below</strong> with iridescent sheen.',sizeShape:'Typically 30–50 cm. Torpedo-shaped; streamlined. Small finlets behind dorsal and anal fins.',keyFeatures:'Wavy dark lines on back unmistakeable. Confusion: none in UK coastal waters.',habitat:'Open Atlantic and North Sea; inshore June–October. Highly migratory.'},facts:['Mackerel are among the easiest fish for members of the public to catch — summer mackerel fishing from piers and rocks is a beloved UK coastal activity.','They lack a swim bladder and must keep swimming or they sink — a mackerel that stops moving dies.','Highly perishable because of their high oil content — "fresh mackerel" means caught today.','UK mackerel fishing has been at the centre of international quota disputes — the "mackerel wars" between UK, Norway, Iceland, and Faroe Islands.']},

{type:'fish',icon:'🐟',commonName:'Common Blenny',taxonomicName:'Lipophrys pholis',habitat:'Rocky Shore & Intertidal Pools',taxonomy:[{rank:'Order',name:'Blenniiformes'},{rank:'Family',name:'Blenniidae'},{rank:'Genus',name:'Lipophrys'},{rank:'Species',name:'L. pholis'}],id:{colour:'Olive-green to brown with mottled darker blotches; perfectly camouflaged against barnacles and seaweed.',sizeShape:'Body 5–15 cm. Squat, broad head; smooth scaleless skin; long single dorsal fin.',keyFeatures:'Blunt head, mottled camouflage, rock pool habitat. Often seen sitting on rocks or peering from crevices. Confusion: Tompot Blenny has prominent tentacles above eye.',habitat:'Rocky shore intertidal pools and crevices. One of the commonest rock pool fish in the UK.'},facts:['Can survive out of water for hours by breathing through moist skin — shelters in crevices above the tide line between tides.','One of the most interactive UK marine animals — curious and will investigate a finger placed in their pool.','Males guard egg masses laid by multiple females in a single crevice, fanning them with their fins.','Rock pool exploration by children is one of the most important early wildlife encounters in Britain — the Blenny is usually the star.']},

{type:'invertebrates',icon:'🦋',commonName:'Peacock Butterfly',taxonomicName:'Aglais io',habitat:'Gardens, Hedgerows & Woodland Edge',taxonomy:[{rank:'Order',name:'Lepidoptera'},{rank:'Family',name:'Nymphalidae'},{rank:'Genus',name:'Aglais'},{rank:'Species',name:'A. io'}],id:{colour:'Rich red-brown; <strong>vivid blue, yellow, black, and white eyespot on each of the four wings</strong>. Underwing near-black.',sizeShape:'Wingspan 63–75 mm. Robust, angular wing outline.',keyFeatures:'Four eyespots unmistakeable — no other UK butterfly similar. <strong>Caterpillar:</strong> black, spiny, feeds on nettles in groups.',habitat:'Gardens, parks, hedgerows, woodland edge. Hibernates in buildings and hollow trees as adult.'},facts:['Adults hibernate from late summer to March — one of the few UK butterflies to overwinter as an adult.','When disturbed, the butterfly opens its wings suddenly, exposing the eyespots — startling birds.','The underwing is near-black and perfectly camouflaged as dead leaf when wings are closed.','Caterpillars feed in communal groups on Common Nettle — leaving a "web tent" of black larvae.']},

{type:'invertebrates',icon:'🦋',commonName:'Red Admiral',taxonomicName:'Vanessa atalanta',habitat:'Gardens, Woodland Edge & Open Country',taxonomy:[{rank:'Order',name:'Lepidoptera'},{rank:'Family',name:'Nymphalidae'},{rank:'Genus',name:'Vanessa'},{rank:'Species',name:'V. atalanta'}],id:{colour:'Jet black wings with <strong>bold red-orange bands on forewing and hindwing; white spots on forewing tip</strong>.',sizeShape:'Wingspan 67–72 mm. Strong flier.',keyFeatures:'Black with red bands unmistakeable. <strong>Caterpillar:</strong> black or grey with yellow spots, feeding in folded nettle leaves.',habitat:'Gardens, parks, woodland edge, orchards. Mainly summer visitor from Europe; some now overwinter in UK.'},facts:['Largely migratory — most UK Red Admirals arrive from Europe and North Africa in spring and early summer.','In late summer, adults feed intensively on overripe windfall fruit — gathering on garden apples is a classic autumn sight.','Some now successfully overwinter in the UK as mild winters become more frequent — a documented climate-change response.','Name may derive from "red admirable" — considered one of Britain\'s most beautiful butterflies since the 17th century.']},

{type:'invertebrates',icon:'🐝',commonName:'Buff-tailed Bumblebee',taxonomicName:'Bombus terrestris',habitat:'Gardens, Farmland & Meadows',taxonomy:[{rank:'Order',name:'Hymenoptera'},{rank:'Family',name:'Apidae'},{rank:'Genus',name:'Bombus'},{rank:'Species',name:'B. terrestris'}],id:{colour:'Yellow band on front of thorax; yellow band on abdomen; <strong>buff-orange tail</strong>. Robust and large.',sizeShape:'Queen 20–22 mm — one of largest UK bumblebees. Worker smaller.',keyFeatures:'Buff (orange-cream) tail. Confusion: White-tailed Bumblebee (B. lucorum) has pure white tail; Early Bumblebee (B. pratorum) smaller, with red tail.',habitat:'Gardens, farmland, meadows, heathland. One of the first bees of spring; most common in the UK.'},facts:['A single Buff-tailed Bumblebee colony can contain 300–400 workers by midsummer.','Now produces a second winter generation in mild southern England — a documented climate change effect.','Commercially reared colonies are used to pollinate greenhouse tomatoes and soft fruit across the UK.','Queens emerging in February are one of the first signs of spring — often seen on willow catkins.']},
