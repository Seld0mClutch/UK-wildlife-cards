{type:'reptiles',icon:'🐍',commonName:'Aesculapian Snake',taxonomicName:'Zamenis longissimus',habitat:'Wooded Valley & Parkland',taxonomy:[{rank:'Order',name:'Squamata'},{rank:'Family',name:'Colubridae'},{rank:'Genus',name:'Zamenis'},{rank:'Species',name:'Z. longissimus'}],id:{colour:'Adults: uniform olive-green to brown above; pale cream-yellow below. <strong>Smooth, glossy scales; no bold patterning.</strong>',sizeShape:'Body up to 180 cm — potentially Britain\'s longest snake. Slender.',keyFeatures:'Large size, uniform olive colour, smooth glossy scales. Climbs trees readily. Confusion: Grass Snake has yellow collar.',habitat:'Wooded valleys and parks. Two small naturalised populations in Wales and London.'},facts:['The Aesculapian Snake is not native — two feral populations exist in Britain from zoo escapes: Colwyn Bay, Wales and London Zoo area.','The snake of Asclepius (Greek god of medicine) — the rod of Asclepius with a snake is the symbol of medicine worldwide.','Europe\'s longest snake, reaching 180+ cm; capable of climbing trees and walls.','Harmless and non-venomous; feeds on small mammals and birds.']},

{type:'fish',icon:'🐟',commonName:'Basking Shark',taxonomicName:'Cetorhinus maximus',habitat:'Offshore & Coastal Surface Waters',taxonomy:[{rank:'Order',name:'Lamniformes'},{rank:'Family',name:'Cetorhinidae'},{rank:'Genus',name:'Cetorhinus'},{rank:'Species',name:'C. maximus'}],id:{colour:'Grey-brown above; paler below. <strong>Enormous gaping mouth; huge gill slits almost encircling head.</strong>',sizeShape:'Typically 6–8 m; record to 12 m — the world\'s second-largest fish.',keyFeatures:'Enormous size and gaping mouth while surface-feeding on plankton. Dorsal and tail fin visible simultaneously at surface.',habitat:'Surface waters offshore and inshore, especially off south-west England, Wales, and west coast of Scotland, May–September.'},facts:['The Basking Shark is the world\'s second-largest fish — only the Whale Shark is bigger.','Filters enormous quantities of zooplankton by swimming slowly with its mouth open — capable of filtering 2,000 tonnes of water per hour.','The Sea of the Hebrides off western Scotland is a globally important summer aggregation site.','Listed as Vulnerable globally — historically hunted for liver oil; now fully protected in UK waters.']},

{type:'invertebrates',icon:'🦋',commonName:'Chalk Hill Blue',taxonomicName:'Polyommatus coridon',habitat:'Chalk Grassland',taxonomy:[{rank:'Order',name:'Lepidoptera'},{rank:'Family',name:'Lycaenidae'},{rank:'Genus',name:'Polyommatus'},{rank:'Species',name:'P. coridon'}],id:{colour:'Male: <strong>pale silvery-blue above with broad brown border</strong> — distinctive pale "milky" blue. Female: brown with orange spots.',sizeShape:'Wingspan 33–40 mm.',keyFeatures:'Male\'s pale silvery-blue is immediately distinct from Common Blue\'s vivid sky-blue. Solely on chalk.',habitat:'Short chalk grassland with abundant Horseshoe Vetch. A true chalk downland specialist.'},facts:['The Chalk Hill Blue is entirely confined to chalk and limestone grassland — one of the most habitat-specialist UK butterflies.','Larvae feed exclusively on Horseshoe Vetch — loss of chalk downland has reduced populations dramatically.','Males can be incredibly abundant on prime chalk downland in July and August — hundreds visible at once.','The pale silvery-blue is unlike any other UK blue butterfly — easily distinguished on the wing.']},

{type:'invertebrates',icon:'🦋',commonName:'Purple Hairstreak',taxonomicName:'Favonius quercus',habitat:'Oak Woodland & Parkland',taxonomy:[{rank:'Order',name:'Lepidoptera'},{rank:'Family',name:'Lycaenidae'},{rank:'Genus',name:'Favonius'},{rank:'Species',name:'F. quercus'}],id:{colour:'Male: <strong>rich purple gloss covering both wings. Female: purple patch on forewing only.</strong> Both: grey underside with white hairstreak line.',sizeShape:'Wingspan 36–39 mm.',keyFeatures:'Purple sheen visible in good light. Spends most time high in oak canopy — binoculars essential.',habitat:'Oak woodland canopy, veteran oak trees in parkland.'},facts:['Purple Hairstreak spends almost its entire adult life in the oak canopy — typically only descending to feed on aphid honeydew on lower leaves.','The purple iridescence is structural — only visible at certain angles in good light.','One of the most overlooked British butterflies despite being the most widespread hairstreak.','Larval foodplant is exclusively oak — one of the many oak-specialist species making this tree so important for wildlife.']},

{type:'invertebrates',icon:'🐝',commonName:'Red-tailed Bumblebee',taxonomicName:'Bombus lapidarius',habitat:'Garden, Meadow & Chalk Grassland',taxonomy:[{rank:'Order',name:'Hymenoptera'},{rank:'Family',name:'Apidae'},{rank:'Genus',name:'Bombus'},{rank:'Species',name:'B. lapidarius'}],id:{colour:'<strong>Black body with vivid red-orange tail</strong> — one of the most striking bumblebees in Britain.',sizeShape:'Queen 20–22 mm; worker 9–16 mm.',keyFeatures:'Black body and red tail diagnostic. Confusion: Early Bumblebee (B. pratorum) has yellow bands and smaller red tail; cuckoo bumblebees mimic this pattern.',habitat:'Gardens, meadows, chalk grassland, coastal slopes.'},facts:['One of the most commonly seen bumblebees in summer — the vivid red tail makes it instantly recognisable.','A surface nester — colonies typically in old mouse burrows, under stones, or in dry soil banks.','One of the later-emerging bumblebee species in spring compared to Buff-tailed and White-tailed.','Visited by the cuckoo bumblebee Bombus rupestris, which mimics its colouration to infiltrate nests.']},

{type:'invertebrates',icon:'🐜',commonName:'Black Garden Ant',taxonomicName:'Lasius niger',habitat:'Garden, Path, Grassland & Woodland',taxonomy:[{rank:'Order',name:'Hymenoptera'},{rank:'Family',name:'Formicidae'},{rank:'Genus',name:'Lasius'},{rank:'Species',name:'L. niger'}],id:{colour:'Black; workers 3–5 mm; queens 7–9 mm.',sizeShape:'Small ant. Nests under paving slabs, in lawns, at base of walls.',keyFeatures:'<strong>Familiar black ant of gardens and patios.</strong> Flying ant days in July–August. Confusion: Red Ant (Myrmica) is red-brown.',habitat:'Garden, lawn, paving, grassland, open woodland. The most abundant ant in Britain.'},facts:['"Flying Ant Day" — when winged males and virgin queens emerge to mate — is one of the most predictable summer wildlife events.','A single colony can contain 5,000–15,000 workers, all daughters of a single queen who may live 15 years.','Black Garden Ants farm aphids — protecting them from predators and harvesting honeydew from their abdomens.','Swifts, gulls, and starlings mass-feed on flying ants during nuptial flights — an important summer food source for many birds.']}

,

{type:'birds',icon:'🐦',commonName:'Peregrine Falcon',taxonomicName:'Falco peregrinus',habitat:'Coastal Cliff, Inland Crag, City & Quarry',taxonomy:[{rank:'Order',name:'Falconiformes'},{rank:'Family',name:'Falconidae'},{rank:'Genus',name:'Falco'},{rank:'Species',name:'F. peregrinus'}],id:{colour:'Blue-grey above; white-cream below with dark barring; <strong>black moustachial stripe on white face — diagnostic.</strong>',sizeShape:'Female 45–50 cm; male 36–42 cm. Strong sexual size dimorphism. Pointed wings; medium tail.',keyFeatures:'Black moustache on white face. High, fast flight; stoops at enormous speed. Confusion: Hobby is smaller with rusty red undertail; Kestrel hovers.',habitat:'Coastal cliffs, inland crags, moorland, quarries, city buildings.'},facts:['The Peregrine Falcon is the fastest animal on Earth — measured at over 380 km/h in a hunting stoop.','Recovered from near-extinction caused by organochlorine pesticide poisoning in the 1950s–60s — now over 1,800 pairs breed in the UK.','Urban Peregrines nesting on cathedral towers and office buildings are now found in most major UK cities, feeding on feral pigeons.','A single stoop can generate forces of up to 25 G — the bird has evolved reinforced eye sockets and a notched beak to kill prey instantly on impact.']},

{type:'mammals',icon:'🐾',commonName:'Common Shrew',taxonomicName:'Sorex araneus',habitat:'Woodland, Grassland, Hedgerow & Garden',taxonomy:[{rank:'Order',name:'Eulipotyphla'},{rank:'Family',name:'Soricidae'},{rank:'Genus',name:'Sorex'},{rank:'Species',name:'S. araneus'}],id:{colour:'Dark brown above; pale brown flanks; grey-white below — <strong>distinctly tricoloured from above.</strong> Long flexible snout.',sizeShape:'Body 6–9 cm; tail 3–5 cm. More robust than Pygmy Shrew.',keyFeatures:'Tricoloured flanks (dark above, pale brown sides, white below). Confusion: Pygmy Shrew is smaller and bicoloured; Water Shrew has white-fringed feet.',habitat:'Almost all terrestrial habitats with ground cover — one of Britain\'s most widespread mammals.'},facts:['Common Shrew is one of the most abundant mammals in Britain — estimated 40 million individuals.','Must eat every 2–3 hours to survive — a shrew starves to death within hours without food.','Shrews are territorial and fight ferociously — the high-pitched squeaking heard in undergrowth is often shrew combat.','Almost every predator from Tawny Owl to Adder catches shrews, but most reject them due to the strong musk-gland scent.']},

{type:'mammals',icon:'🐾',commonName:'Water Shrew',taxonomicName:'Neomys fodiens',habitat:'Clean Streams, Ponds & Wetland',taxonomy:[{rank:'Order',name:'Eulipotyphla'},{rank:'Family',name:'Soricidae'},{rank:'Genus',name:'Neomys'},{rank:'Species',name:'N. fodiens'}],id:{colour:'<strong>Jet black above; white below</strong> — the most strongly contrasting of UK shrews. White ear tuft often visible.',sizeShape:'Body 7–10 cm — Britain\'s largest shrew. Keel of stiff hairs on underside of tail.',keyFeatures:'Black-and-white colouration and aquatic habit. Fringed feet for swimming. Confusion: Water Vole is much larger.',habitat:'Clean, fast streams, pond margins, ditches, wetland. Always near water.'},facts:['The Water Shrew is the only UK mammal with venomous saliva — the toxin paralyzes invertebrates and small fish.','Dives underwater to hunt, using a bubble of air trapped in its fur for buoyancy.','The jet-black and white colouration is unique among British shrews — unmistakeable when seen.','A reliable indicator of clean water quality — absent from polluted streams.']},

{type:'mammals',icon:'🦇',commonName:'Greater Horseshoe Bat',taxonomicName:'Rhinolophus ferrumequinum',habitat:'Ancient Woodland, Pasture & Cave',taxonomy:[{rank:'Order',name:'Chiroptera'},{rank:'Family',name:'Rhinolophidae'},{rank:'Genus',name:'Rhinolophus'},{rank:'Species',name:'R. ferrumequinum'}],id:{colour:'Grey-brown fur; pinkish face with <strong>elaborate horseshoe-shaped noseleaf.</strong>',sizeShape:'Body 5.7–7.1 cm; wingspan 35–40 cm — one of Britain\'s largest bats.',keyFeatures:'Horseshoe noseleaf unmistakeable. Hangs freely wrapped in wings — not tucked into crevice like other bats.',habitat:'Ancient pastoral landscapes of south-west England and Wales. Roosts in caves, tunnels, and old buildings.'},facts:['Greater Horseshoe Bat is one of Britain\'s rarest mammals — fewer than 6,500 adults remain, almost entirely in south-west England and Wales.','The horseshoe noseleaf focuses echolocation calls emitted through the nose — producing a highly directional sonar beam.','Roosts by hanging freely, wrapping its wings around its body — distinctive and unlike any other UK bat.','Requires ancient, insect-rich pasture within a few kilometres of its roost — loss of traditional farming is the primary threat.']},

{type:'mammals',icon:'🦭',commonName:'Harbour Porpoise',taxonomicName:'Phocoena phocoena',habitat:'Inshore Coastal Waters',taxonomy:[{rank:'Order',name:'Artiodactyla'},{rank:'Family',name:'Phocoenidae'},{rank:'Genus',name:'Phocoena'},{rank:'Species',name:'P. phocoena'}],id:{colour:'Dark grey-brown above; white below. <strong>Small, rotund body; blunt rounded head — no beak.</strong>',sizeShape:'Body 145–165 cm. The smallest UK cetacean.',keyFeatures:'Small size and beakless blunt head. Low, triangular dorsal fin. Rolls quietly at surface — rarely leaps. Confusion: Dolphins have beaks and acrobatic behaviour.',habitat:'Inshore coastal waters, estuaries, occasionally rivers. Commonest cetacean in UK waters.'},facts:['The Harbour Porpoise is the most commonly encountered cetacean in British waters — seen year-round inshore.','Unlike dolphins, porpoises are quiet and unspectacular at the surface — a brief roll and triangular fin, then gone.','The name porpoise comes from the Latin porcus piscis — "pig fish" — a reference to its rotund shape.','Highly vulnerable to entanglement in fishing nets (bycatch) — one of the biggest cetacean conservation challenges in UK waters.']},

{type:'mammals',icon:'🐬',commonName:'Bottlenose Dolphin',taxonomicName:'Tursiops truncatus',habitat:'Inshore Coastal Waters & Estuary',taxonomy:[{rank:'Order',name:'Artiodactyla'},{rank:'Family',name:'Delphinidae'},{rank:'Genus',name:'Tursiops'},{rank:'Species',name:'T. truncatus'}],id:{colour:'Uniform grey above; paler below. <strong>Short, robust beak; prominent curved dorsal fin.</strong>',sizeShape:'Body 190–380 cm. The largest inshore dolphin in UK waters.',keyFeatures:'Large size, short beak, prominent curved dorsal fin. Confusion: Common Dolphin has hourglass flank pattern; Risso\'s Dolphin has scarred white body.',habitat:'Inshore bays, estuaries, coastal waters. Cardigan Bay (Wales) and Moray Firth (Scotland) hold resident populations.'},facts:['The Moray Firth population is the most northerly resident Bottlenose Dolphin population in the world.','Cardigan Bay, Wales holds one of only two known resident populations in English and Welsh waters — both are SACs (Special Areas of Conservation).','Bottlenose Dolphins live in complex, long-term social groups with individual personalities and cultural traditions.','Individuals are identified by natural marks and dorsal fin shape — some UK dolphins have been known for over 30 years.']},

{type:'mammals',icon:'🐳',commonName:'Minke Whale',taxonomicName:'Balaenoptera acutorostrata',habitat:'Offshore & Coastal Waters',taxonomy:[{rank:'Order',name:'Artiodactyla'},{rank:'Family',name:'Balaenopteridae'},{rank:'Genus',name:'Balaenoptera'},{rank:'Species',name:'B. acutorostrata'}],id:{colour:'Dark grey-black above; white below. <strong>Distinctive white band on each flipper.</strong>',sizeShape:'Body 7–10 m; weight up to 10 tonnes. Smallest baleen whale in UK waters.',keyFeatures:'White flipper band diagnostic. Pointed snout. Small dorsal fin set far back. Surfaces repeatedly in same area.',habitat:'Offshore and coastal waters, especially around Scottish islands, Hebrides, and west coast.'},facts:['The Minke Whale is the most commonly seen whale in UK waters — especially around the Hebrides, Orkney, and Shetland from June to October.','Despite being the smallest baleen whale, Minkes still reach 10 metres and 10 tonnes.','The white band on each flipper is visible underwater and is the most reliable identification feature.','UK waters are globally important for Minke Whales — the Hebridean Whale and Dolphin Trust monitors them as an indicator of ecosystem health.']}

,

{type:'mammals',icon:'🐳',commonName:'Humpback Whale',taxonomicName:'Megaptera novaeangliae',habitat:'Offshore & Coastal Waters',taxonomy:[{rank:'Order',name:'Artiodactyla'},{rank:'Family',name:'Balaenopteridae'},{rank:'Genus',name:'Megaptera'},{rank:'Species',name:'M. novaeangliae'}],id:{colour:'Black above; white below and on underside of flukes and flippers. <strong>Extraordinarily long white pectoral fins — up to a third of body length.</strong>',sizeShape:'Body 11–16 m; weight 25–35 tonnes. Very large whale.',keyFeatures:'Enormous white flippers unmistakeable. Knobbled head. Spectacular breaching. Raises flukes on deep dive — fluke underside individually distinctive.',habitat:'Offshore and coastal waters. Increasing sightings off Scotland, Ireland, and south-west England.'},facts:['Humpback Whales are recovering strongly in UK waters after near-extermination by commercial whaling in the 20th century — sightings are increasing annually.','Their complex, evolving songs — lasting up to 20 minutes and heard 100 km away — are the most elaborate vocalisations produced by any animal.','The fluke underside is unique to each individual, like a fingerprint — used by researchers worldwide to identify individuals across ocean basins.','Humpbacks have been seen bubble-net feeding off the Hebrides and west of Ireland — a cooperative hunting technique where whales circle prey while blowing a curtain of bubbles.']}


];

let deck=[],idx=0,flipped=false,activeFilter='all',activeSort='common';
function setSort(s){
  activeSort=s;
  document.getElementById('sortCommon').classList.toggle('active',s==='common');
  document.getElementById('sortAlpha').classList.toggle('active',s==='alpha');
  buildDeck(activeFilter);
  renderCard();
}
function group(t){return{trees:'flora',shrubs:'flora',forbs:'flora',grasses:'flora',ferns:'flora',fungi:'fungi',birds:'fauna',mammals:'fauna',fish:'fauna',reptiles:'fauna',invertebrates:'fauna'}[t]||'flora';}
function hdrClass(t){const g=group(t);return g==='fauna'?'fauna-hdr':g==='fungi'?'fungi-hdr':'';}
function catLabel(t){return{trees:'Trees',shrubs:'Shrubs & Climbers',forbs:'Forbs & Wildflowers',grasses:'Grasses & Sedges',ferns:'Ferns & Mosses',fungi:'Fungi & Lichens',birds:'Birds',mammals:'Mammals',fish:'Fish',reptiles:'Reptiles & Amphibians',invertebrates:'Invertebrates',all:'All Cards'}[t]||t;}

function buildDeck(filter){
  deck=filter==='all'?[...species]:species.filter(s=>s.type===filter);
  if(activeSort==='alpha') deck.sort((a,b)=>a.commonName.localeCompare(b.commonName));
  idx=0;flipped=false;
}
function renderCard(){
  // Trigger background load of Cloudinary photos for current species
  if(deck.length>0){
    const cur=deck[idx];
    if(cur&&!cur._photoLoaded){
      cur._photoLoaded=true;
      loadCloudinaryPhotos(cur.commonName).then(()=>{
        // Re-render only if still on same card
        if(deck[idx]&&deck[idx].commonName===cur.commonName)renderCard();
      });
    }
  }
  const card=document.getElementById('card');
  const front=document.getElementById('cardFront');
  const back=document.getElementById('cardBack');
  card.classList.toggle('flipped',flipped);
  if(!deck.length){front.innerHTML='<div class="empty-state">No cards in this category</div>';back.innerHTML='';document.getElementById('counter').textContent='';document.getElementById('progressFill').style.width='0%';return;}
  const s=deck[idx];
  const isFlora=group(s.type)==='flora';
  const labels=isFlora?FL:FA;
  const keys=isFlora?FK:AK;
  document.getElementById('counter').textContent=`${idx+1} / ${deck.length}`;
  document.getElementById('progressFill').style.width=`${((idx+1)/deck.length)*100}%`;
  front.innerHTML=`<p class="front-cat">${catLabel(s.type)}</p><div class="front-icon">${s.icon}</div><h2 class="front-name">${s.commonName}</h2><p class="front-latin">${s.taxonomicName}</p><span class="habitat-pill">${s.habitat}</span><p class="front-hint">Tap to reveal identification</p>`;
  const txHtml=(s.taxonomy||[]).map((t,i)=>`<span class="tx"><span class="tx-rank">${t.rank}</span> <span class="tx-name">${t.name}</span></span>${i<s.taxonomy.length-1?'<span class="tx-sep">·</span>':''}`).join('');
  const idHtml=keys.map((k,i)=>`<div class="sec"><div class="sec-title ${group(s.type)==='fauna'?'sky':''}">${labels[i]}</div><div class="sec-body">${s.id[k]||'—'}</div></div>`).join('');
  const factsHtml=(s.facts||[]).map(f=>`<p class="fact">${f}</p>`).join('');
  const slots=isFlora?FSLOTS:ASLOTS;
  const photoHtml=slots.map(sl=>{
    const key=`${s.commonName}::${sl.id}`;
    const entry=photoStore[key];
    const imgUrl=entry?entry.url:'';
    const uploading=entry&&entry.uploading;
    const label=getSlotLabel(s.commonName,sl.id,sl.label);
    const img=imgUrl?`<img src="${imgUrl}" alt="${label}">`:'';
    const uploadingOverlay=uploading?`<div class="photo-uploading">uploading…</div>`:'';
    const actions=imgUrl&&!uploading?`<div class="photo-actions" onclick="event.stopPropagation()">
        <button class="photo-btn replace" title="Replace photo" onclick="event.stopPropagation()">↑<input type="file" accept="image/*" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%" onchange="handlePhoto(event,'${s.commonName}','${sl.id}')"></button>
        <button class="photo-btn delete" title="Delete photo" onclick="event.stopPropagation();deletePhoto('${s.commonName}','${sl.id}')">✕</button>
      </div>`:'';
    const dropClick=imgUrl?'':`onclick="event.stopPropagation();this.querySelector('input').click()"`;
    const fileInput=imgUrl?'':`<span class="drop-icon">📷</span><span class="drop-hint">tap to add</span><input type="file" accept="image/*" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%" onchange="handlePhoto(event,'${s.commonName}','${sl.id}')">`;
    return`<div class="photo-slot">
      <div class="photo-drop" ${dropClick}>${img}${uploadingOverlay}${actions}${fileInput}</div>
      <div class="photo-label-wrap">
        <span class="photo-label" title="Click to rename" contenteditable="false"
          onclick="event.stopPropagation();this.contentEditable='true';this.focus()"
          onblur="this.contentEditable='false';saveSlotLabel('${s.commonName}','${sl.id}',this.textContent.trim()||'${sl.label}');this.textContent=getSlotLabel('${s.commonName}','${sl.id}','${sl.label}')"
          onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
        >${label}</span>
      </div>
    </div>`;}).join('');
  back.innerHTML=`<div class="back-header ${hdrClass(s.type)}"><span class="back-common">${s.commonName}</span><span class="back-latin">${s.taxonomicName}</span></div><div class="taxon-row">${txHtml}</div><div class="back-body">${idHtml}<div class="sec full facts-sec"><div class="sec-title">Natural History</div>${factsHtml}</div><div class="photos-sec"><div class="sec-title">Field Photos</div><div class="photos-grid">${photoHtml}</div></div></div>`;
  const qnGrid=document.getElementById('qnGrid');
  qnGrid.innerHTML=deck.map((sp,i)=>`<button class="qn-chip ${i===idx?'current':''}" onclick="goTo(${i})"><span class="qn-icon">${sp.icon}</span><span class="qn-name">${sp.commonName}</span></button>`).join('');
  document.getElementById('qnTitle').textContent=`${catLabel(activeFilter)} — ${deck.length} cards`;
}
function flipCard(){flipped=!flipped;document.getElementById('card').classList.toggle('flipped',flipped);}
function navigate(dir){if(!deck.length)return;idx=(idx+dir+deck.length)%deck.length;flipped=false;document.getElementById('card').classList.remove('flipped');renderCard();}
function goTo(i){idx=i;flipped=false;document.getElementById('card').classList.remove('flipped');renderCard();}
function shuffle(){
  activeSort='none';
  document.getElementById('sortCommon').classList.remove('active');
  document.getElementById('sortAlpha').classList.remove('active');
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  idx=0;flipped=false;renderCard();
}
// handlePhoto defined above with Cloudinary support
// PWA service worker
if('serviceWorker' in navigator){
  const swCode=`
    const CACHE='wfc-v1';
    const ASSETS=['/'];
    self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))));
    self.addEventListener('fetch',e=>{
      if(e.request.url.includes('cloudinary.com'))return;
      e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
        const clone=res.clone();
        caches.open(CACHE).then(c=>c.put(e.request,clone));
        return res;
      }).catch(()=>caches.match(e.request))));
    });
  `;
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

document.querySelectorAll('.fbtn').forEach(btn=>{btn.addEventListener('click',()=>{const f=btn.dataset.filter;activeFilter=f;document.querySelectorAll('.fbtn').forEach(b=>{b.classList.remove('active','active-fauna','active-fungi');});if(f==='all'){btn.classList.add('active');}else{const g=group(f);btn.classList.add(g==='fauna'?'active-fauna':g==='fungi'?'active-fungi':'active');}buildDeck(f);renderCard();document.getElementById('quicknav').classList.toggle('open',deck.length>0);});});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown')navigate(1);else if(e.key==='ArrowLeft'||e.key==='ArrowUp')navigate(-1);else if(e.key===' '){e.preventDefault();flipCard();}});
buildDeck('all');renderCard();
document.getElementById('quicknav').classList.add('open');

</script>
