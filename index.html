{type:'invertebrates',icon:'🐞',commonName:'Seven-spot Ladybird',taxonomicName:'Coccinella 7-punctata',habitat:'Gardens, Farmland & Open Ground',taxonomy:[{rank:'Order',name:'Coleoptera'},{rank:'Family',name:'Coccinellidae'},{rank:'Genus',name:'Coccinella'},{rank:'Species',name:'C. 7-punctata'}],id:{colour:'Bright red elytra with exactly <strong>seven black spots</strong> (3+3+1). Black thorax with white spots at corners.',sizeShape:'Body 5–8 mm. Classic oval ladybird shape.',keyFeatures:'Seven black spots on red. Confusion: Harlequin Ladybird is variable, often larger; Two-spot Ladybird has only two spots.',habitat:'Almost any habitat with aphid colonies — garden, farmland, hedgerow, coastal.'},facts:['Each adult consumes up to 5,000 aphids during its lifetime — one of the most important natural pest control agents.','In winter, ladybirds aggregate in thousands in sheltered sites — attic spaces, crevices, and dense ivy.','The red-and-black colouration is warning colouration — ladybirds produce bitter alkaloids from leg joints when threatened.','The Harlequin Ladybird (Harmonia axyridis), arrived in 2004, is outcompeting the Seven-spot in southern England.']},

{type:'invertebrates',icon:'🦋',commonName:'Emperor Dragonfly',taxonomicName:'Anax imperator',habitat:'Well-vegetated Ponds & Lakes',taxonomy:[{rank:'Order',name:'Odonata'},{rank:'Family',name:'Aeshnidae'},{rank:'Genus',name:'Anax'},{rank:'Species',name:'A. imperator'}],id:{colour:'<strong>Male: vivid sky-blue abdomen with black dorsal stripe; apple-green thorax.</strong> Female: green abdomen. Both have large green eyes.',sizeShape:'Body 70–80 mm; wingspan 95–110 mm — Britain\'s largest dragonfly.',keyFeatures:'Huge size and male sky-blue abdomen unique. Confusion: Hairy Dragonfly is smaller; Blue Dasher much smaller. <strong>Larva:</strong> aquatic, up to 5 cm — voracious predator in pond.',habitat:'Well-vegetated ponds, lakes, and slow rivers. Males aggressively patrol territories over open water.'},facts:['Britain\'s largest dragonfly — the male\'s vivid sky-blue abdomen is unmistakeable.','Males patrol and defend stretches of open water aggressively — aerial combat between rival males is dramatic and audible.','The aquatic larva lives in pond weed for 2–3 years and is a top predator, taking tadpoles, small fish, and newt larvae.','Dragonflies are among the most ancient insects — the body plan has barely changed in 300 million years.']},

{type:'trees',icon:'🍁',commonName:'Sycamore',taxonomicName:'Acer pseudoplatanus',habitat:'Woodland, Hedgerow & Coastal Areas',taxonomy:[{rank:'Order',name:'Sapindales'},{rank:'Family',name:'Sapindaceae'},{rank:'Genus',name:'Acer'},{rank:'Species',name:'A. pseudoplatanus'}],id:{bark:'Grey-brown; developing irregular orange-brown <strong>flaking plates</strong> with age.',leaves:'Palmately 5-lobed, 10–25 cm; coarsely toothed. Often blackened by tar spot fungus (Rhytisma acerinum).',branchLeaf:'Opposite. Paired winged fruits (samaras) at ~90°. Dense shade canopy suppressing ground flora.',habitat:'Widely naturalised. Tolerates salt spray and exposure — very common on coasts and upland.'},facts:['Not native — introduced from central Europe, probably in the 16th century.','Its heavy shade suppresses native woodland ground flora, causing conservation conflict.','Helicopter seeds are aerodynamically efficient, travelling up to 200 metres from the parent.','Sycamore wood is used for violin backs and sides — prized for its figure and resonance.']},

{type:'trees',icon:'🌿',commonName:'Hazel',taxonomicName:'Corylus avellana',habitat:'Ancient Woodland Understorey & Hedgerow',taxonomy:[{rank:'Order',name:'Fagales'},{rank:'Family',name:'Betulaceae'},{rank:'Genus',name:'Corylus'},{rank:'Species',name:'C. avellana'}],id:{bark:'Smooth, grey-brown with obvious horizontal lenticels. Twigs hairy; buds rounded, green.',leaves:'Broadly oval, almost circular, 6–12 cm; doubly toothed; heart-shaped base. Hairy on both surfaces.',branchLeaf:'Alternate. <strong>Catkins (lambs\' tails) January–March</strong> before leaves. Multi-stemmed shrubby habit.',habitat:'Understorey of ancient woodland, especially on limestone. Classic coppice species.'},facts:['The most important coppice tree in Britain — managed on 7–12 year rotations for hurdles, charcoal, and thatching spars.','Dormice depend on hazel for flowers, nuts, and aphids at different life-cycle stages.','Hazelnuts found at Mesolithic campsites in Scotland date to over 7,000 years ago.','Hazel divining rods are still used for dowsing, despite lacking scientific support.']},

{type:'trees',icon:'🌿',commonName:'Field Maple',taxonomicName:'Acer campestre',habitat:'Hedgerow, Woodland Edge & Chalk Downland',taxonomy:[{rank:'Order',name:'Sapindales'},{rank:'Family',name:'Sapindaceae'},{rank:'Genus',name:'Acer'},{rank:'Species',name:'A. campestre'}],id:{bark:'Pale grey-brown; developing corky fissured ridges. Twigs may develop corky wings.',leaves:'Palmate with 5 rounded lobes; <strong>milky sap in petiole when broken</strong> — diagnostic. Brilliant gold in autumn.',branchLeaf:'Opposite. Paired samaras nearly horizontal (180°). Smaller than Sycamore.',habitat:'Britain\'s only truly native maple. Thrives on chalk and limestone. Very common in hedgerows.'},facts:['Britain\'s only native maple — Sycamore and Norway Maple are introductions.','The milky sap in cut leaf stalks is the single most useful field identification character.','Often an indicator of ancient hedgerows when found alongside hawthorn, hazel, and ash.','Produces brilliant gold and orange autumn colour — among the finest of any native tree.']},

{type:'trees',icon:'🌿',commonName:'Common Alder',taxonomicName:'Alnus glutinosa',habitat:'Riverbanks, Fens & Wet Woodland',taxonomy:[{rank:'Order',name:'Fagales'},{rank:'Family',name:'Betulaceae'},{rank:'Genus',name:'Alnus'},{rank:'Species',name:'A. glutinosa'}],id:{bark:'Dark grey-brown, cracking into small plates. <strong>Small woody oval cones persistent through winter</strong> — highly distinctive.',leaves:'Broadly oval; tip blunt or notched (unusual). Slightly sticky when young. Dark green.',branchLeaf:'Alternate. Dark purple catkins January–April. Always associated with water.',habitat:'Riverbanks, lake margins, fen carr. The defining tree of UK wet woodland (alder carr).'},facts:['Alder roots host nitrogen-fixing bacteria (Frankia alni), enriching waterlogged soils that few other trees tolerate.','Alder wood is uniquely durable underwater — Venice\'s foundations were driven alder piles.','The persistent woody cones are the most reliable winter identification feature.','Supports over 140 invertebrate species, including several alder-specialist moths.']},

{type:'trees',icon:'🌳',commonName:'Sessile Oak',taxonomicName:'Quercus petraea',habitat:'Upland Oak Woodland & Western Britain',taxonomy:[{rank:'Order',name:'Fagales'},{rank:'Family',name:'Fagaceae'},{rank:'Genus',name:'Quercus'},{rank:'Species',name:'Q. petraea'}],id:{bark:'Grey, deeply furrowed — similar to English Oak but generally more regular.',leaves:'Lobed; <strong>long petiole but NO auricles at base</strong> — key difference from English Oak.',branchLeaf:'Alternate. <strong>Acorns stalkless (sessile)</strong> on twig — the reverse of English Oak\'s stalked acorns.',habitat:'Dominant on acidic, thin, rocky soils of upland Wales, Scotland, and western England.'},facts:['Atlantic oakwoods of western Britain support internationally important bryophytes, lichens, and invertebrates.','Sessile and English Oak hybridise readily — intermediate trees are common.','Simple rule: leaf has stalk but acorn does not = Sessile Oak; reverse = English Oak.','Upland sessile oak woodland is a UK Biodiversity Action Plan priority habitat.']},

{type:'trees',icon:'🌿',commonName:'Rowan',taxonomicName:'Sorbus aucuparia',habitat:'Upland Woodland, Moorland & Mountain',taxonomy:[{rank:'Order',name:'Rosales'},{rank:'Family',name:'Rosaceae'},{rank:'Genus',name:'Sorbus'},{rank:'Species',name:'S. aucuparia'}],id:{bark:'Smooth, silver-grey with distinct horizontal lenticels; inner bark bright orange.',leaves:'Pinnate with 5–9 pairs of leaflets plus terminal; each lance-shaped and toothed.',branchLeaf:'Alternate. White flower clusters May. <strong>Spectacular scarlet-orange berries August–October.</strong>',habitat:'Tree of highest altitude in Britain — recorded to 1,000 m. Acid, thin, poor soils.'},facts:['Rowan berries are eaten by over 60 bird species; redwing and fieldfare time their UK arrival to the berry crop.','In Celtic and Norse traditions, rowan was the strongest protection against witchcraft.','Berries contain more vitamin C by weight than oranges — made into traditional jelly and wine.','Among the most cold-tolerant broadleaved trees in Britain; survives where few others can.']},

{type:'trees',icon:'🍂',commonName:'Beech',taxonomicName:'Fagus sylvatica',habitat:'Chalk & Limestone Woodland',taxonomy:[{rank:'Order',name:'Fagales'},{rank:'Family',name:'Fagaceae'},{rank:'Genus',name:'Fagus'},{rank:'Species',name:'F. sylvatica'}],id:{bark:'<strong>Remarkably smooth, silver-grey throughout its life</strong> — the most consistently smooth bark of any large UK tree.',leaves:'Oval, 5–10 cm; wavy margin (not toothed). Rich green; spectacular copper-gold autumn colour.',branchLeaf:'Alternate. Triangular nuts (mast) in spiny husks. Creates dense shade canopy.',habitat:'Native to chalk and limestone of SE England; widely planted. Free-draining calcareous soils.'},facts:['Beech casts such dense shade that almost nothing grows beneath its canopy in summer.','Mast years every 5–10 years produce enormous nut crops sustaining millions of birds and mammals.','Bark carvings made centuries ago remain legible — beech bark never fissures or sheds with age.','Beech wood burns slowly with high heat — the traditional firewood of southern England.']},

{type:'trees',icon:'🌿',commonName:'Hornbeam',taxonomicName:'Carpinus betulus',habitat:'Ancient Woodland, Especially SE England',taxonomy:[{rank:'Order',name:'Fagales'},{rank:'Family',name:'Betulaceae'},{rank:'Genus',name:'Carpinus'},{rank:'Species',name:'C. betulus'}],id:{bark:'Smooth, grey with <strong>distinctive fluted muscular-looking ridges</strong> — resembles twisted sinew.',leaves:'Oval, 4–10 cm; sharply doubly toothed. Prominently ridged with impressed veins.',branchLeaf:'Alternate. Distinctive three-lobed bracts on fruiting clusters enclosing ribbed nut.',habitat:'Ancient woodland of SE England, especially Epping Forest. Heavy clay soils.'},facts:['The hardest and heaviest wood of any native British tree — used for cogs, millwheels, and piano hammers.','Epping Forest contains some of the finest ancient hornbeam pollards in Europe.','Retains dead brown leaves (marcescence) through winter — a distinctive russet winter appearance.','The fluted, muscle-like bark is unique among British trees.']},

{type:'trees',icon:'🌸',commonName:'Crab Apple',taxonomicName:'Malus sylvestris',habitat:'Woodland Edge, Hedgerow & Scrub',taxonomy:[{rank:'Order',name:'Rosales'},{rank:'Family',name:'Rosaceae'},{rank:'Genus',name:'Malus'},{rank:'Species',name:'M. sylvestris'}],id:{bark:'Brown-grey, developing shallow irregular plates. Twigs often end in a sharp spine.',leaves:'Oval to elliptic, 3–9 cm; finely serrated. Dark green and <strong>hairless above</strong> (unlike cultivated apple — diagnostic).',branchLeaf:'Alternate. White or pinkish blossom April–May. Hard yellowish-green apples 2–4 cm.',habitat:'Occasional in ancient woodland and hedgerows. True natives are scarce.'},facts:['Crab Apple is the wild ancestor of all cultivated apples (Malus domestica).','The fruits make excellent jelly, verjuice, and crab apple wine.','Blossom provides critical early-season nectar for queen bumblebees and early pollinators.','True native crab apple is scarce — most are seedlings from discarded cultivated fruit.']},

{type:'trees',icon:'🌸',commonName:'Bird Cherry',taxonomicName:'Prunus padus',habitat:'Upland Woodland, Streamside & Hedgerow',taxonomy:[{rank:'Order',name:'Rosales'},{rank:'Family',name:'Rosaceae'},{rank:'Genus',name:'Prunus'},{rank:'Species',name:'P. padus'}],id:{bark:'Dark grey-brown; smooth when young. <strong>Strongly unpleasant bitter almond smell when scratched</strong> — diagnostic.',leaves:'Oval to elliptic, 6–12 cm; finely toothed. Dull green above. Two glands at top of petiole.',branchLeaf:'Alternate. <strong>Flowers in long drooping racemes (not clusters)</strong> — unlike Wild Cherry. Small black cherries.',habitat:'Upland woodland, streamsides, limestone pavements. Commoner in northern Britain.'},facts:['The drooping flower racemes are the most reliable identification character, unique among UK Prunus.','The bitter almond scent from scratched bark is caused by hydrocyanic acid — a mild toxin.','The tiny, bitter black cherries are eagerly eaten by blackbirds, starlings, and waxwings.','More common in Scotland, northern England, and Wales than in the south — a northern indicator species.']},

{type:'shrubs',icon:'🌿',commonName:'Common Hawthorn',taxonomicName:'Crataegus monogyna',habitat:'Hedgerow, Scrub & Woodland Edge',taxonomy:[{rank:'Order',name:'Rosales'},{rank:'Family',name:'Rosaceae'},{rank:'Genus',name:'Crataegus'},{rank:'Species',name:'C. monogyna'}],id:{bark:'Grey-brown, developing shallow fissures and orange patches. Stout, sharp thorns.',leaves:'Deeply 3–7 lobed, 1.5–4.5 cm; almost cut to the midrib. Glossy, dark green.',branchLeaf:'Alternate. <strong>May blossom — white flowers in dense clusters, strongly scented.</strong> Red haws (berries) autumn.',habitat:'The definitive hedgerow shrub. Grows on almost any soil except waterlogged.'},facts:['More hedgerow hawthorn has been removed in the UK since WWII than in the previous 400 years combined.','Hawthorn supports over 300 insect species — second only to oak among woody plants.','Haws are eaten by over 30 bird species including redwing, fieldfare, and blackbird.','The May blossom was traditionally associated with bad luck if brought indoors — the smell of rotting flesh (trimethylamine) is produced by older flowers.']},

{type:'shrubs',icon:'🟡',commonName:'Broom',taxonomicName:'Cytisus scoparius',habitat:'Heathland, Woodland Edge & Sandy Ground',taxonomy:[{rank:'Order',name:'Fabales'},{rank:'Family',name:'Fabaceae'},{rank:'Genus',name:'Cytisus'},{rank:'Species',name:'C. scoparius'}],id:{bark:'Green, strongly ridged, angled stems — photosynthetic even in winter. No spines (unlike Gorse).',leaves:'Small, mostly trefoil; upper leaves simple. Often shed in dry conditions.',branchLeaf:'Alternate. <strong>Brilliant golden-yellow pea flowers April–June.</strong> Black seed pods twist explosively to disperse seeds.',habitat:'Heathland, open woodland, road cuttings, railway banks on dry acid soils.'},facts:['Native broom is legally distinct from invasive Spanish Broom — correct identification matters.','The explosive seed pods audibly pop on hot days, ejecting seeds up to 2 metres.','Broom fixes atmospheric nitrogen through root bacteria, improving impoverished acid soils.','The young green shoots are browsed by deer, and seeds eaten by yellowhammer and linnet.']},

{type:'shrubs',icon:'🔵',commonName:'Bilberry',taxonomicName:'Vaccinium myrtillus',habitat:'Heathland, Moorland & Upland Woodland',taxonomy:[{rank:'Order',name:'Ericales'},{rank:'Family',name:'Ericaceae'},{rank:'Genus',name:'Vaccinium'},{rank:'Species',name:'V. myrtillus'}],id:{bark:'Bright green, sharply angled stems — highly distinctive and visible all year.',leaves:'Oval, 1–3 cm; finely toothed; bright fresh green. Deciduous.',branchLeaf:'Alternate. Small pink urn-shaped flowers April–June. <strong>Blue-black berries with grey bloom July–September.</strong>',habitat:'Upland heathland, moorland, acidic woodland ground layer. Dominant on many Scottish hillsides.'},facts:['Bilberries stain lips, tongue, and fingers deep purple — traditional free hillside food gathered in late summer.','The Red Grouse is almost entirely dependent on heather and bilberry — both plant and bird are managed together on driven grouse moors.','Bilberries contain more antioxidants than cultivated blueberries.','The green angled stems are visible all year and make winter identification easy.']},

{type:'shrubs',icon:'🟠',commonName:'Heather',taxonomicName:'Calluna vulgaris',habitat:'Heathland & Moorland',taxonomy:[{rank:'Order',name:'Ericales'},{rank:'Family',name:'Ericaceae'},{rank:'Genus',name:'Calluna'},{rank:'Species',name:'C. vulgaris'}],id:{bark:'Woody, twisting, grey-brown stems. Forms dense low cushions 20–60 cm.',leaves:'Tiny, scale-like, <strong>in four rows along stem — distinctive when examined closely.</strong> Evergreen.',branchLeaf:'Opposite. <strong>Purple-pink flowers August–September</strong> turning moorland purple. Tiny capsule fruits.',habitat:'The dominant plant of most UK lowland heathland and upland moorland. Acid, nutrient-poor soils.'},facts:['Heather moorland covers 25% of the world\'s total — disproportionately concentrated in Scotland and northern England.','Managed in rotation by burning (muirburn) to create a mosaic of age classes for grouse and other moorland species.','White heather occurs at about 1 in 30,000 plants — traditionally considered extremely lucky.','Provides critical late-summer nectar for bees, including specialist mining bees.']},

{type:'shrubs',icon:'🔴',commonName:'Sea Buckthorn',taxonomicName:'Hippophae rhamnoides',habitat:'Coastal Dunes, Cliffs & Riverbanks',taxonomy:[{rank:'Order',name:'Rosales'},{rank:'Family',name:'Rhamnaceae'},{rank:'Genus',name:'Hippophae'},{rank:'Species',name:'H. rhamnoides'}],id:{bark:'Dark grey-brown; densely spiny. Suckers vigorously, forming thickets.',leaves:'Narrow, lance-shaped, 2–8 cm; <strong>distinctive silver-grey scaly surface</strong>.',branchLeaf:'Alternate. Small inconspicuous flowers March–April. <strong>Dense clusters of brilliant orange berries</strong> on female plants.',habitat:'Native on coastal sand dunes and cliffs of eastern England. Also riverbanks in upland Britain.'},facts:['Sea Buckthorn berries are among the richest sources of vitamin C of any UK plant — used to make juice and supplements.','The silvery leaves reflect UV light — an adaptation to the extreme coastal environment.','Sea Buckthorn is native on the east coast but has spread far inland via planting for dune stabilisation.','Winter thrush flocks — fieldfares and redwings — strip the berries rapidly when they arrive from Scandinavia.']},

{type:'shrubs',icon:'🌿',commonName:'Bramble',taxonomicName:'Rubus fruticosus agg.',habitat:'Woodland Edge, Hedgerow & Scrub',taxonomy:[{rank:'Order',name:'Rosales'},{rank:'Family',name:'Rosaceae'},{rank:'Genus',name:'Rubus'},{rank:'Species',name:'R. fruticosus'}],id:{bark:'Arching stems (canes) with <strong>stout, recurved thorns.</strong> Stems green or red-purple; angular.',leaves:'Usually 3–5 leaflets, toothed. Undersides often silvery. Evergreen in mild winters.',branchLeaf:'Alternate. White or pale pink flowers June–August. <strong>Blackberries September–October.</strong>',habitat:'Almost all open and semi-shaded habitats on most soils. One of the most widespread plants in Britain.'},facts:['Bramble is the most important wildlife plant in lowland Britain — berries eaten by over 50 bird species and 100 insect species visit the flowers.','Blackberrying is the most widely practised foraging activity in the UK — up to 10,000 tonnes gathered annually.','Bramble is a microspecies complex — there are over 320 described British microspecies, all slightly different.','After the first frost, bramble tradition says the devil has spat on the berries — a warning not to harvest.']},

{type:'shrubs',icon:'🌿',commonName:'Common Ivy',taxonomicName:'Hedera helix',habitat:'Woodland, Hedgerow, Wall & Rock Face',taxonomy:[{rank:'Order',name:'Apiales'},{rank:'Family',name:'Araliaceae'},{rank:'Genus',name:'Hedera'},{rank:'Species',name:'H. helix'}],id:{bark:'Woody, climbing via adhesive rootlets. <strong>Two distinct leaf forms:</strong> lobed (climbing/juvenile) and oval (adult/flowering).',leaves:'Juvenile: 3–5 lobed, dark green with pale veins. Adult: oval, unlobed, on fertile flowering stems.',branchLeaf:'Alternate. Small yellow-green flowers October–November — vital late nectar. <strong>Black berries December–March.</strong>',habitat:'Woodland ground layer, trees, walls, cliffs. Tolerates deep shade.'},facts:['Ivy flowers are the single most important late-season nectar source for bees and hoverflies — essential for autumn-flying insects.','Ivy berries ripen in winter when little other fruit is available — eaten by woodpigeons, blackbirds, and thrushes.','Ivy does not parasitise trees — it uses them purely for support and photosynthesises independently.','Provides nest sites and hibernation cover for insects, birds, and bats.']},

{type:'shrubs',icon:'🌿',commonName:'Common Holly',taxonomicName:'Ilex aquifolium',habitat:'Ancient Woodland, Hedgerow & Moorland Edge',taxonomy:[{rank:'Order',name:'Aquifoliales'},{rank:'Family',name:'Aquifoliaceae'},{rank:'Genus',name:'Ilex'},{rank:'Species',name:'I. aquifolium'}],id:{bark:'Smooth, grey-green. Evergreen. Dioecious — male and female plants separate.',leaves:'Oval; <strong>wavy margin with sharp spines on lower branches</strong>; upper branches often spineless.',branchLeaf:'Alternate. Small white flowers May–June. <strong>Scarlet berries on female plants, ripening October.</strong>',habitat:'Ancient woodland understorey, hedgerows, moorland edge. Tolerates deep shade and exposure.'},facts:['Holly is one of the most important native evergreen trees for wildlife, providing year-round shelter and winter food.','The Holly Blue butterfly uses holly as its spring larval foodplant.','Leaves on lower branches are heavily spined — a defensive response to browsing pressure — while upper leaves (above browse height) may be spineless.','Holly berries are mildly toxic to humans but essential winter food for mistle thrush, redwing, and fieldfare.']},

{type:'shrubs',icon:'🟡',commonName:'Spindle',taxonomicName:'Euonymus europaeus',habitat:'Hedgerow, Scrubland & Chalk Woodland',taxonomy:[{rank:'Order',name:'Celastrales'},{rank:'Family',name:'Celastraceae'},{rank:'Genus',name:'Euonymus'},{rank:'Species',name:'E. europaeus'}],id:{bark:'Green, smooth; young stems distinctly 4-angled with corky ridges.',leaves:'Opposite, oval to lance-shaped, 3–10 cm; finely toothed. Dark green; turning red and pink in autumn.',branchLeaf:'Opposite. Small greenish-white flowers May–June. <strong>Distinctive 4-lobed pink capsules splitting to reveal orange-coated seeds</strong>.',habitat:'Calcareous soils — chalk scrub, hedgerows, woodland edges. Indicator of ancient chalk hedgerow.'},facts:['Spindle is one of the most spectacular autumn-fruiting shrubs — the shocking pink fruits with orange seeds are unmistakeable.','The extremely hard, fine-grained wood was used to make spindles for wool-spinning — hence the name.','The Spindle Ermine moth (Yponomeuta cagnagella) covers entire shrubs in silk webbing in spring.','A reliable indicator of ancient chalk or limestone hedgerow and scrub.']},

{type:'shrubs',icon:'🟡',commonName:'Wayfaring Tree',taxonomicName:'Viburnum lantana',habitat:'Chalk & Limestone Scrub and Hedgerow',taxonomy:[{rank:'Order',name:'Dipsacales'},{rank:'Family',name:'Adoxaceae'},{rank:'Genus',name:'Viburnum'},{rank:'Species',name:'V. lantana'}],id:{bark:'Grey-brown. Young shoots and leaves densely covered in star-shaped hairs — felty texture.',leaves:'Oval, 6–14 cm; wrinkled surface; finely toothed; <strong>densely hairy (felty) on both surfaces.</strong> Opposite.',branchLeaf:'Opposite. Dense, flat-topped white flower heads May–June. <strong>Berries in clusters ripening red then black.</strong>',habitat:'Chalk and limestone scrub, hedgerows, and woodland edge. Classic chalk downland indicator.'},facts:['One of the most reliable indicator species for chalk and limestone grassland and scrub.','The berries ripen progressively through the summer — green, red, and black berries often visible simultaneously.','Named by John Gerard (1597) as the tree used to line "the ways and wayfares" — common on chalk tracks.','Felty hairs on leaves and shoots are distinctive and make identification straightforward in any season.']},

{type:'forbs',icon:'💛',commonName:'Yellow Rattle',taxonomicName:'Rhinanthus minor',habitat:'Traditional Hay Meadow & Grassland',taxonomy:[{rank:'Order',name:'Lamiales'},{rank:'Family',name:'Orobanchaceae'},{rank:'Genus',name:'Rhinanthus'},{rank:'Species',name:'R. minor'}],id:{bark:'N/A — annual herb 10–50 cm. Semi-parasitic on grass roots.',leaves:'Opposite, oblong, coarsely toothed. Stalkless; slightly rough.',branchLeaf:'Opposite. <strong>Yellow hooded flowers in leaf axils, May–August.</strong> Inflated calyx rattles when ripe seeds shake.',habitat:'Traditional unimproved hay meadow and grassland. Annual — requires open ground to establish.'},facts:['Yellow Rattle is the meadow-maker\'s most important tool — it parasitises grass roots, weakening them and allowing wildflowers to establish.','Seed viability is short — Yellow Rattle seed must be sown fresh in autumn on a scarified surface.','The rattling of ripe seeds in the swollen calyx was historically the signal to begin haymaking.','Decline of traditional haymaking has made Yellow Rattle a priority species in meadow creation schemes.']},

{type:'forbs',icon:'💙',commonName:'Meadow Cranesbill',taxonomicName:'Geranium pratense',habitat:'Roadsides, Meadows & Limestone Grassland',taxonomy:[{rank:'Order',name:'Geraniales'},{rank:'Family',name:'Geraniaceae'},{rank:'Genus',name:'Geranium'},{rank:'Species',name:'G. pratense'}],id:{bark:'N/A — perennial herb 30–80 cm. Hairy stems.',leaves:'Deeply cut into 7–9 lobes; each lobe further divided. Rough, hairy.',branchLeaf:'Alternate. <strong>Large, vivid blue-violet flowers 3–4 cm, June–September.</strong> Distinctive crane\'s bill seed head.',habitat:'Roadsides, hay meadows, limestone grassland. Commoner in northern England.'},facts:['One of Britain\'s most beautiful native wildflowers — the intense violet-blue is unmatched among UK geraniums.','One of the tallest native cranesbills — up to 80 cm in good conditions.','The "crane\'s bill" seed dispersal mechanism flings seeds up to a metre from the plant.','Particularly abundant on roadside verges and river floodplains in the northern Pennines and Yorkshire Dales.']},

{type:'forbs',icon:'🌿',commonName:'Wild Garlic',taxonomicName:'Allium ursinum',habitat:'Damp Ancient Woodland Floor',taxonomy:[{rank:'Order',name:'Asparagales'},{rank:'Family',name:'Amaryllidaceae'},{rank:'Genus',name:'Allium'},{rank:'Species',name:'A. ursinum'}],id:{bark:'N/A — bulbous perennial. Bulbs narrow, not round.',leaves:'Broad, elliptic, 10–25 cm; <strong>strong garlic smell when crushed — diagnostic.</strong> Bright glossy green.',branchLeaf:'Leaves arise singly from bulbs. White star flowers in umbels April–May. Entire woodland floors carpeted.',habitat:'Ancient semi-natural woodland on moist soils. Reliable indicator of ancient woodland.'},facts:['Wild Garlic carpets are one of the most spectacular spring woodland sights in Britain.','The entire plant is edible — leaves, flowers, and bulbs — making it the most popular spring forage plant.','Confusion: Lily of the Valley (toxic) lacks the garlic smell; Lords and Ladies has arrow-shaped leaves.','Bears (ursinum) were said to dig up the bulbs after hibernation to restore strength.']},

{type:'forbs',icon:'🟣',commonName:'Common Teasel',taxonomicName:'Dipsacus fullonum',habitat:'Roadsides, Riverbanks & Disturbed Ground',taxonomy:[{rank:'Order',name:'Dipsacales'},{rank:'Family',name:'Caprifoliaceae'},{rank:'Genus',name:'Dipsacus'},{rank:'Species',name:'D. fullonum'}],id:{bark:'N/A — biennial herb to 2 m. Prickly stems.',leaves:'Opposite, lance-shaped; stem leaves fused around stem forming a <strong>water-collecting cup</strong>. Spiny midrib.',branchLeaf:'Opposite. <strong>Egg-shaped spiny heads with purple florets opening in a ring</strong> July–August. Heads persist all winter.',habitat:'Roadsides, riverbanks, disturbed ground, waste ground. Prefers clay soils.'},facts:['The persistent brown seed heads are among the most important winter food sources for goldfinch — flocks of 100+ regularly feed on teasel in winter.','The water-collecting cups formed by fused leaves trap rainwater — the plant may absorb nutrients from drowned insects.','Fuller\'s Teasel (var. sativus) was used in the textile industry to raise the nap on woollen cloth — the spiny heads were ideal natural brushes.','Teasel heads make beautiful natural dried decorations — a much-collected plant.']},

{type:'forbs',icon:'❤️',commonName:'Common Poppy',taxonomicName:'Papaver rhoeas',habitat:'Arable Fields, Disturbed Ground & Roadsides',taxonomy:[{rank:'Order',name:'Ranunculales'},{rank:'Family',name:'Papaveraceae'},{rank:'Genus',name:'Papaver'},{rank:'Species',name:'P. rhoeas'}],id:{bark:'N/A — annual herb 20–90 cm. Hairy stems; milky sap.',leaves:'Deeply pinnately lobed, coarsely toothed, hairy. Grey-green.',branchLeaf:'Alternate. <strong>Vivid scarlet 4-petalled flowers June–August</strong>, often with black basal blotch. Round pepper-pot seed capsule.',habitat:'Arable field margins, disturbed ground, roadsides on chalk and calcareous soils.'},facts:['Poppy seeds can remain viable in soil for over 100 years — they germinate when soil is disturbed and light reaches them.','The association with Remembrance comes from the Great War battlefields of Flanders, where the churned soil triggered mass germination.','Poppy numbers have fallen by 90%+ since the 1970s due to herbicide use in agriculture.','The seeds are not narcotic — only Papaver somniferum (opium poppy) contains significant alkaloids.']},

{type:'forbs',icon:'💛',commonName:'Primrose',taxonomicName:'Primula vulgaris',habitat:'Woodland Edge, Hedgebank & Scrub',taxonomy:[{rank:'Order',name:'Ericales'},{rank:'Family',name:'Primulaceae'},{rank:'Genus',name:'Primula'},{rank:'Species',name:'P. vulgaris'}],id:{bark:'N/A — rosette-forming perennial. No stem.',leaves:'Obovate, 5–25 cm; wrinkled, crinkly surface; hairy below; pale green. Narrowing abruptly to winged petiole.',branchLeaf:'Leaves form flat rosette. <strong>Pale yellow, solitary flowers on individual stalks, February–May.</strong>',habitat:'Ancient woodland edges, hedgebanks, scrub, cliff ledges, churchyards. Damp but well-drained.'},facts:['Primrose is one of the best-loved signs of spring in Britain — its appearance in February is an ancient seasonal marker.','The two flower forms (pin and thrum) require cross-pollination between them — Charles Darwin wrote extensively on this.','Primrose leaves were eaten in salads historically and flowers crystallised as cake decorations.','Primrose populations crash when woodlands become too shaded — a sensitive indicator of woodland management.']},

{type:'forbs',icon:'💙',commonName:'Common Viper\'s Bugloss',taxonomicName:'Echium vulgare',habitat:'Chalk Grassland, Dunes & Disturbed Ground',taxonomy:[{rank:'Order',name:'Boraginales'},{rank:'Family',name:'Boraginaceae'},{rank:'Genus',name:'Echium'},{rank:'Species',name:'E. vulgare'}],id:{bark:'N/A — biennial herb 30–90 cm. Stems covered in stiff bristly hairs.',leaves:'Narrow lance-shaped; rough, bristly. Basal leaves larger, stalked; stem leaves stalkless.',branchLeaf:'Alternate. <strong>Vivid blue trumpet flowers (pink in bud) June–September</strong>, in curving spike. Stamens protrude.  ',habitat:'Chalk and limestone grassland, coastal dunes, waste ground, road cuttings.'},facts:['One of the most intensely blue wildflowers in Britain — the colour deepens from pink bud to pure blue.','The flowers produce large amounts of nectar — a favourite of bumblebees, honeybees, and many specialist solitary bees.','The name comes from the supposed resemblance of the seeds to a viper\'s head — once thought a remedy for snakebite.','A biennial — rosettes in year one, tall flowering spikes in year two.']},

{type:'forbs',icon:'🟣',commonName:'Common Spotted Orchid',taxonomicName:'Dactylorhiza fuchsii',habitat:'Chalk Grassland, Woodland Rides & Verges',taxonomy:[{rank:'Order',name:'Asparagales'},{rank:'Family',name:'Orchidaceae'},{rank:'Genus',name:'Dactylorhiza'},{rank:'Species',name:'D. fuchsii'}],id:{bark:'N/A — perennial from palmate tubers. 15–65 cm.',leaves:'Oblong to lance-shaped; <strong>dark purple-brown blotches arranged in rows</strong> — highly diagnostic.',branchLeaf:'Alternate, sheathing stem. Dense spike of pale pink to purple flowers with deeper markings, June–August.',habitat:'Chalk and limestone grassland, woodland rides, road verges, old quarries, calcareous marsh.'},facts:['The most common native orchid in Britain — up to 50,000 plants recorded in some chalk grassland sites.','Orchid seeds are dust-like (1 million per gram) and lack endosperm — they can only germinate if infected by a specific fungus.','The leaf spots vary enormously — some plants are almost unspotted; others heavily marked.','Hybridises freely with other Dactylorhiza species, producing a confusing range of intermediates.']},

{type:'forbs',icon:'💛',commonName:'Birdsfoot Trefoil',taxonomicName:'Lotus corniculatus',habitat:'Grassland, Meadows & Coastal Turf',taxonomy:[{rank:'Order',name:'Fabales'},{rank:'Family',name:'Fabaceae'},{rank:'Genus',name:'Lotus'},{rank:'Species',name:'L. corniculatus'}],id:{bark:'N/A — low perennial herb, usually sprawling.',leaves:'5 leaflets (2 basal look like stipules). Bright green; small, oval.',branchLeaf:'Alternate. <strong>Bright yellow pea flowers streaked red/orange (\"eggs and bacon\")</strong>, June–September. Claw-like seed pods.',habitat:'Dry grassland, meadows, cliffs, dunes, road verges. Tolerates close grazing.'},facts:['One of the most important grassland wildflowers for pollinators — visited by bumblebees, solitary bees, and many butterfly species.','The larval foodplant of the Common Blue, Green Hairstreak, and Six-spot Burnet Moth.','Contains small amounts of cyanogenic glycosides — harmless at normal consumption but part of its chemical defence.','The cheerful red-and-yellow bicoloured flowers give rise to the country name "eggs and bacon."']},

{type:'forbs',icon:'❤️',commonName:'Red Campion',taxonomicName:'Silene dioica',habitat:'Woodland Edge, Hedgebank & Cliffside',taxonomy:[{rank:'Order',name:'Caryophyllales'},{rank:'Family',name:'Caryophyllaceae'},{rank:'Genus',name:'Silene'},{rank:'Species',name:'S. dioica'}],id:{bark:'N/A — perennial herb 30–100 cm. Softly hairy throughout.',leaves:'Oval to lance-shaped; lower leaves stalked, upper stalkless. Softly hairy.',branchLeaf:'Opposite. <strong>Deep rose-pink 5-petalled flowers March–November</strong> (very long season). Dioecious — male and female plants.',habitat:'Woodland edges, hedgebanks, cliff ledges, streamsides. Avoids very acid or dry soils.'},facts:['One of the earliest and longest-flowering native wildflowers — from March to November in sheltered sites.','Dioecious — male and female flowers on separate plants. Female flowers produce the swollen capsule.','Hybridises with White Campion (Silene latifolia) to produce pale pink hybrids — very common in disturbed habitats.','Important nectar plant for long-tongued bumblebees and early butterflies.']},

{type:'grasses',icon:'🌾',commonName:'Common Reed',taxonomicName:'Phragmites australis',habitat:'Fen, Marsh, Lake Edge & Ditch',taxonomy:[{rank:'Family',name:'Poaceae'},{rank:'Genus',name:'Phragmites'},{rank:'Species',name:'P. australis'}],id:{bark:'N/A — stout perennial to 3.5 m. Forms extensive reedbeds via rhizomes.',leaves:'Grey-green, flat, 1–3 cm wide; <strong>ligule a fringe of hairs.</strong> Leaf blade falls in autumn; stem persists.',branchLeaf:'Erect. <strong>Large, dense, feathery purple-brown panicle August–November</strong> persisting through winter.',habitat:'Reedbeds, fen, lake and river margins, ditches. The most widespread large wetland grass.'},facts:['Common Reed is the most widely distributed flowering plant on Earth — found on every continent except Antarctica.','Thatching reed (water reed) is harvested from managed reedbeds — a living roof-covering lasting 40–60 years.','Reedbeds are critical habitat for bittern, marsh harrier, and bearded tit — among the most threatened UK birds.','A single reedbed can filter vast quantities of agricultural nitrates and phosphates from runoff water.']},

{type:'grasses',icon:'🌾',commonName:'Meadow Fescue',taxonomicName:'Schedonorus pratensis',habitat:'Traditional Hay Meadow & Permanent Pasture',taxonomy:[{rank:'Family',name:'Poaceae'},{rank:'Genus',name:'Schedonorus'},{rank:'Species',name:'S. pratensis'}],id:{bark:'N/A — tufted perennial 30–100 cm.',leaves:'Flat, 3–6 mm wide; <strong>auricles (claw-like projections) at leaf base clasping stem</strong> — important diagnostic.',branchLeaf:'Erect. Open panicle, somewhat one-sided. Spikelets 7–15 flowered.',habitat:'Traditional hay meadows, river meadows, and old permanent pasture on fertile soils.'},facts:['One of the key grasses of traditional hay meadows — its presence indicates old, unimproved grassland.','The auricles (small claw-like projections at leaf base) distinguish it from similar fescues.','Declined significantly as permanent pasture is reseeded with ryegrass — an indicator of agricultural intensification.','Provides seed for linnets and other seed-eating farmland birds in the autumn.']},

{type:'grasses',icon:'🌾',commonName:'False Oat-grass',taxonomicName:'Arrhenatherum elatius',habitat:'Roadsides, Meadows & Rough Grassland',taxonomy:[{rank:'Family',name:'Poaceae'},{rank:'Genus',name:'Arrhenatherum'},{rank:'Species',name:'A. elatius'}],id:{bark:'N/A — tall tufted perennial 60–150 cm.',leaves:'Flat, 4–10 mm wide. Rough on both surfaces. Ligule short and blunt.',branchLeaf:'Erect. <strong>Large, graceful, open panicle 15–30 cm; green to purplish — one of the most elegant roadside grasses.</strong>',habitat:'Road verges, ungrazed meadows, hedgebanks, rough grassland. Very common throughout UK.'},facts:['One of the tallest and most architecturally striking common grasses — dominant on ungrazed road verges.','The swollen bulbous-based form (var. bulbosum) is a troublesome weed of gardens.','Provides important late-season seed for finches.','Dominant in the "tall grassland" successional stage before scrub moves in.']},

{type:'grasses',icon:'🌾',commonName:'Common Bent',taxonomicName:'Agrostis capillaris',habitat:'Heathland, Acid Grassland & Lawn',taxonomy:[{rank:'Family',name:'Poaceae'},{rank:'Genus',name:'Agrostis'},{rank:'Species',name:'A. capillaris'}],id:{bark:'N/A — tufted perennial 10–70 cm.',leaves:'Flat, 2–5 mm wide; very fine and hair-like. <strong>Ligule short and truncate.</strong>',branchLeaf:'Erect. <strong>Delicate, diffuse, spreading panicle</strong> — looks like a fine purple-green haze over heathland in July.',habitat:'Acid and neutral grassland, heathland, lawns. One of the commonest grasses in the UK.'},facts:['Common Bent is one of the most characteristic grasses of acid grassland and heathland — found in virtually every such habitat.','Much used in fine lawns and sports turf — tolerates close mowing well.','The fine diffuse panicle creates the distinctive purple haze over heathland visible in summer from a distance.','An important component of upland grassland grazed by sheep and deer.']},

{type:'grasses',icon:'🌾',commonName:'Purple Moor Grass',taxonomicName:'Molinia caerulea',habitat:'Upland Moorland, Bog & Wet Heath',taxonomy:[{rank:'Family',name:'Poaceae'},{rank:'Genus',name:'Molinia'},{rank:'Species',name:'M. caerulea'}],id:{bark:'N/A — tussock-forming perennial 30–120 cm. Stems have a single node near the base.',leaves:'Flat, 3–6 mm; grey-green. Distinctive <strong>single raised node on the stem near the base</strong>.',branchLeaf:'Erect flowering stem. <strong>Purple-tinged panicle August–September.</strong> Leaves and stems turn tawny gold in autumn.',habitat:'Upland moorland, blanket bog, wet heath on acid, peaty or waterlogged soils.'},facts:['Purple Moor Grass turns brilliant orange-gold in autumn — one of the finest seasonal colour changes on upland moors.','Molinia is increasing at the expense of Sphagnum bog — linked to drainage and atmospheric nitrogen deposition.','The hard, wiry stems (known as "flying bent" when dead) are almost indestructible and leave bare tussocks.','Reindeer in Scandinavia graze the nutritious green shoots — used as winter fodder by Norwegian farmers for centuries.']},

{type:'grasses',icon:'🌾',commonName:'Sheep\'s Fescue',taxonomicName:'Festuca ovina',habitat:'Chalk Downland, Heathland & Mountain',taxonomy:[{rank:'Family',name:'Poaceae'},{rank:'Genus',name:'Festuca'},{rank:'Species',name:'F. ovina'}],id:{bark:'N/A — dense tufted perennial 10–60 cm.',leaves:'<strong>Very fine, bristle-like, grey-green; tightly inrolled</strong> — like a pin or needle. 0.5–1 mm diameter.',branchLeaf:'Erect. Narrow panicle, somewhat one-sided. Spikelets purple-tinged.',habitat:'Chalk downland, heathland, upland grassland, mountain rocks. Tolerates poor, dry, acid soils.'},facts:['The defining grass of chalk downland and upland grassland — fine-leaved, closely grazed turf dominated by Sheep\'s Fescue is the most species-rich grassland type in Britain.','Its needle-fine leaves are diagnostic — impossible to confuse with coarser-leaved grasses.','Where sheep grazing is removed, Sheep\'s Fescue is outcompeted by coarser grasses within a few years.','One of the most important food plants of several specialist grassland butterflies including Chalkhill Blue larvae.']},

{type:'grasses',icon:'🌾',commonName:'Timothy',taxonomicName:'Phleum pratense',habitat:'Meadows, Pasture & Roadside',taxonomy:[{rank:'Family',name:'Poaceae'},{rank:'Genus',name:'Phleum'},{rank:'Species',name:'P. pratense'}],id:{bark:'N/A — tufted perennial 40–150 cm. Base often swollen and corm-like.',leaves:'Flat, 4–8 mm wide. Auricles absent. Ligule blunt, 2–6 mm.',branchLeaf:'Erect. <strong>Long, dense, cylindrical spike-like panicle 5–15 cm — unmistakeable in the field.</strong>',habitat:'Meadows, pastures, road verges, waste ground. Widely sown in agricultural grassland.'},facts:['The cylindrical, dense panicle is one of the most easily recognised inflorescences of any British grass.','One of the most widely sown agricultural grasses in the UK — important in hay and silage mixtures.','Named after Timothy Hanson, who promoted it as a fodder grass in America in the early 18th century.','One of the most allergenic grass pollens — a significant cause of hay fever.']},

{type:'grasses',icon:'🌾',commonName:'Great Fen Sedge',taxonomicName:'Cladium mariscus',habitat:'Fen, Ditch & Shallow Lake',taxonomy:[{rank:'Family',name:'Cyperaceae'},{rank:'Genus',name:'Cladium'},{rank:'Species',name:'C. mariscus'}],id:{bark:'N/A — very large, robust sedge 1–3 m. Forming dense stands.',leaves:'<strong>Long, flat, grey-green; edges and midrib with sharp serrations that will cut skin — use caution.</strong>',branchLeaf:'Alternate. Tall, stiff, erect. Brown compound panicle of spikelets July–August.',habitat:'Base-rich fens, especially Broadland and the Somerset Levels. Requires calcareous water.'},facts:['Great Fen Sedge (also called sedge grass or saw sedge) was traditionally harvested in Broadland for thatching ridges — a specialised craft continuing today.','The serrated leaf edges make it the most dangerous plant to handle in British wetlands — capable of causing deep lacerations.','Wicken Fen (Cambridgeshire) and Broadland are the most important UK sites — the plant requires careful water-level management.','Bitterns were historically associated with sedge fens and the grinding noise of sedge cutting was said to explain the bittern\'s boom.']},

{type:'grasses',icon:'🌾',commonName:'Common Cotton Grass',taxonomicName:'Eriophorum angustifolium',habitat:'Blanket Bog, Wet Moorland & Upland Flush',taxonomy:[{rank:'Family',name:'Cyperaceae'},{rank:'Genus',name:'Eriophorum'},{rank:'Species',name:'E. angustifolium'}],id:{bark:'N/A — loosely tufted perennial 20–70 cm.',leaves:'Narrow, channelled, dark green. Stem triangular in cross-section.',branchLeaf:'Erect. <strong>Multiple drooping, brilliant white cotton-wool tufts in spring</strong> — unmistakeable over blanket bog.',habitat:'Blanket bog, valley bog, wet moorland, upland flushes on acid, waterlogged peat.'},facts:['The brilliant white cotton tufts of Cotton Grass blowing over dark peat bog in spring are one of the most iconic upland sights in Britain.','The tufts are the greatly elongated perianth bristles of the flowers — not seeds or petals.','Cotton Grass indicates healthy blanket bog — where peat accumulates and carbon is stored.','The tufts were historically used to stuff pillows and mattresses in remote upland communities.']},

{type:'ferns',icon:'🌿',commonName:'Male Fern',taxonomicName:'Dryopteris filix-mas',habitat:'Woodland, Hedgebank & Shaded Ground',taxonomy:[{rank:'Division',name:'Polypodiophyta'},{rank:'Family',name:'Dryopteridaceae'},{rank:'Genus',name:'Dryopteris'},{rank:'Species',name:'D. filix-mas'}],id:{bark:'Large, robust, tufted fern. Stipe covered in pale brown, papery scales.',leaves:'Fronds 30–150 cm; broadly lance-shaped; once-pinnate with deeply lobed pinnae. Semi-evergreen.',branchLeaf:'Central crown; fronds arch outward. <strong>Kidney-shaped indusium covering each circular sorus</strong> — diagnostic.',habitat:'Woodland, hedgebanks, rocky hillsides, shaded walls. The commonest large woodland fern.'},facts:['The most common large fern in British woodland — found in virtually every piece of ancient woodland.','Male Fern extract was used as a remedy for tapeworm for centuries — it contains toxic filicic acid.','The "male" name is a historical contrast to the more delicate Lady Fern — not a biological distinction.','Semi-evergreen — the old fronds persist through winter until pushed off by new growth in spring.']},

{type:'ferns',icon:'🌿',commonName:'Broad Buckler Fern',taxonomicName:'Dryopteris dilatata',habitat:'Damp Woodland, Streamside & Mountain',taxonomy:[{rank:'Division',name:'Polypodiophyta'},{rank:'Family',name:'Dryopteridaceae'},{rank:'Genus',name:'Dryopteris'},{rank:'Species',name:'D. dilatata'}],id:{bark:'Tufted. Stipe with dark-centred, pale-edged scales — <strong>bicoloured scales diagnostic vs. Male Fern.</strong>',leaves:'Fronds 30–120 cm; broadly triangular, 2–3 pinnate (more finely divided than Male Fern). Dark green.',branchLeaf:'Crown-forming. Broadly triangular outline distinguishes it from lance-shaped Male Fern.',habitat:'Damp woodland, streamside, upland rocky slopes and ravines. Tolerates more shade than Male Fern.'},facts:['The broadly triangular frond outline is the key field character distinguishing it from Male Fern.','The bicoloured stipe scales (dark centre, pale edge) are diagnostic when examined closely.','More tolerant of shade than Male Fern — often the dominant ground fern in deep woodland.','One of the most common ferns in upland and western Britain.']},

{type:'ferns',icon:'🌿',commonName:'Maidenhair Spleenwort',taxonomicName:'Asplenium trichomanes',habitat:'Drystone Walls, Rock Faces & Limestone',taxonomy:[{rank:'Division',name:'Polypodiophyta'},{rank:'Family',name:'Aspleniaceae'},{rank:'Genus',name:'Asplenium'},{rank:'Species',name:'A. trichomanes'}],id:{bark:'Tufted. Very short stipe. <strong>Dark, shiny, wiry rachis (midrib) persisting after leaflets fall</strong>.',leaves:'Fronds 4–20 cm; narrow, once-pinnate; <strong>paired rounded dark green pinnae on a dark midrib.</strong> Evergreen.',branchLeaf:'Fronds hang from rock faces and walls. Small, circular sori on pinnae undersides.',habitat:'Drystone walls, mortared walls, shaded rock faces, especially limestone. Ubiquitous on old walls.'},facts:['One of the most common and charming of British ferns — found on old walls and rock faces throughout the country.','Two subspecies: subsp. trichomanes (acid rock) and subsp. quadrivalens (calcareous) — subtly different.','The dark wiry midrib persists long after leaflets have fallen — creating thread-like dead fronds.','One of the first colonisers of new drystone walls — a reliable indicator of old and stable stone structures.']},

{type:'ferns',icon:'🌿',commonName:'Hard Fern',taxonomicName:'Blechnum spicant',habitat:'Upland Woodland, Heathland & Bog Edge',taxonomy:[{rank:'Division',name:'Polypodiophyta'},{rank:'Family',name:'Blechnaceae'},{rank:'Genus',name:'Blechnum'},{rank:'Species',name:'B. spicant'}],id:{bark:'Tufted, from short rhizome.',leaves:'<strong>Two distinct frond types:</strong> sterile fronds spreading, once-pinnate, strap-shaped pinnae; fertile fronds erect, with narrower pinnae bearing continuous sori.',branchLeaf:'The contrast between spreading sterile fronds and upright fertile fronds is <strong>unique among British ferns.</strong>',habitat:'Upland and western woodland, heathland, bog edges on acid, damp soils. Commonest in west.'},facts:['The two distinct frond types — sterile spreading and fertile erect — make Hard Fern instantly recognisable.','A reliable indicator of ancient, undisturbed acid woodland and heath — particularly in western Britain.','Hard Fern is abundant in Atlantic oakwoods of Wales and Scotland where humidity is high year-round.','A characteristic species of the National Vegetation Classification W17 (Quercus petraea-Betula pubifera-Dicranum majus) woodland type.']},

{type:'ferns',icon:'🌿',commonName:'Wall-rue',taxonomicName:'Asplenium ruta-muraria',habitat:'Mortared Walls, Limestone Pavement & Rock',taxonomy:[{rank:'Division',name:'Polypodiophyta'},{rank:'Family',name:'Aspleniaceae'},{rank:'Genus',name:'Asplenium'},{rank:'Species',name:'A. ruta-muraria'}],id:{bark:'Tiny, tufted fern. Very short, dark stipe.',leaves:'Fronds 3–12 cm; greyish-green; <strong>small, fan-shaped or wedge-shaped pinnules</strong> — very distinctive leaf shape unlike any other British fern.',branchLeaf:'Fronds emerge from wall crevices. Long, linear sori on pinnule undersides, usually merging when mature.',habitat:'Mortared walls, limestone pavement, chalk and limestone rock faces. Calcareous substrates only.'},facts:['Wall-rue is one of the smallest British ferns — easily overlooked as moss or lichen in wall crevices.','The fan-shaped pinnules are unique among British ferns and make identification straightforward.','One of the most calcicolous (lime-loving) of British ferns — reliable indicator of calcareous stone.','Found on medieval church walls throughout Britain — one of the oldest continuous human habitats for a plant.']},

{type:'ferns',icon:'🌿',commonName:'Soft Shield Fern',taxonomicName:'Polystichum setiferum',habitat:'Ancient Woodland, Hedgebank & Shaded Wall',taxonomy:[{rank:'Division',name:'Polypodiophyta'},{rank:'Family',name:'Dryopteridaceae'},{rank:'Genus',name:'Polystichum'},{rank:'Species',name:'P. setiferum'}],id:{bark:'Tufted. Stipe and rachis densely covered in pale brown, lance-shaped scales.',leaves:'Fronds 30–120 cm; broadly lance-shaped; 2-pinnate; very finely and softly divided. <strong>Each pinnule with a small forward-pointing lobe (auricle) at the base.</strong> Evergreen.',branchLeaf:'Graceful, arching crown. Pinnules softly textured — not harsh or brittle.',habitat:'Ancient woodland, hedgebanks, old walls in western and southern Britain.'},facts:['Among the most graceful and beautiful British ferns — the lacy, arching fronds are prized in cultivation.','The small forward-pointing lobe (auricle) at the base of each pinnule is diagnostic.','More tolerant of dry conditions than most large woodland ferns.','An excellent indicator of ancient woodland in southern England.']},

{type:'ferns',icon:'🌿',commonName:'Lemon-scented Fern',taxonomicName:'Oreopteris limbosperma',habitat:'Upland Woodland, Streamside & Acid Flush',taxonomy:[{rank:'Division',name:'Polypodiophyta'},{rank:'Family',name:'Thelypteridaceae'},{rank:'Genus',name:'Oreopteris'},{rank:'Species',name:'O. limbosperma'}],id:{bark:'Tufted. Stipe short, pale green-brown; scales narrowly lance-shaped.',leaves:'Fronds 20–100 cm; lance-shaped, narrowing abruptly towards base. Once-pinnate with lobed pinnae. <strong>Strong lemon scent when crushed — unmistakeable.</strong>',branchLeaf:'Erect to arching. Lower pinnae much shorter — abrupt narrowing at frond base is distinctive.',habitat:'Upland woodland, streamside, acidic flushes and damp moorland. Mainly northern and western Britain.'},facts:['The strong lemon scent when fronds are crushed is entirely unmistakeable — the only British fern reliably identified by smell.','The abrupt narrowing of the frond base (lower pinnae much shorter) is the most reliable visual character.','Found almost exclusively in upland, western, and northern Britain — a specialist of humid acid habitats.','The lemon scent comes from volatile oils in yellow glands on the pinnae undersides — visible with a hand lens.']},

{type:'ferns',icon:'🌿',commonName:'Intermediate Polypody',taxonomicName:'Polypodium interjectum',habitat:'Hedgebanks, Trees & Rocky Ground',taxonomy:[{rank:'Division',name:'Polypodiophyta'},{rank:'Family',name:'Polypodiaceae'},{rank:'Genus',name:'Polypodium'},{rank:'Species',name:'P. interjectum'}],id:{bark:'From creeping rhizome. Very similar to Common Polypody.',leaves:'Fronds 10–50 cm; once-pinnate. Pinnae narrower and more pointed than Common Polypody. <strong>Sori elongated oval, not perfectly round</strong>.',branchLeaf:'Fronds arise singly. Leathery, evergreen. Yellow sori becoming orange, with paraphyses.',habitat:'Hedgebanks, epiphytic on trees, rocky ground. Often on more calcareous substrates than Common Polypody.'},facts:['Britain has three polypody species — Intermediate is often the most common in hedgerows of south and west England.','Distinguished from Common Polypody by more pointed pinnae and elongated (not round) sori.','Hybridises with both other polypody species — hybrid plants are not uncommon.','The three polypody species were not separated until the 1970s — previous records of Common Polypody may include all three.']},

{type:'fungi',icon:'🍄',commonName:'Fly Agaric',taxonomicName:'Amanita muscaria',habitat:'Birch & Pine Woodland',taxonomy:[{rank:'Division',name:'Basidiomycota'},{rank:'Family',name:'Amanitaceae'},{rank:'Genus',name:'Amanita'},{rank:'Species',name:'A. muscaria'}],id:{bark:'N/A',leaves:'<strong>Brilliant scarlet cap with distinctive white warts</strong> — white remnants of universal veil. Cap 8–20 cm.',branchLeaf:'White gills; white stipe with ring and volva at base. White warts may wash off in rain.',habitat:'Mycorrhizal with birch and Scots pine. Birch woodland, pinewoods, moorland edge.'},facts:['The most iconic mushroom in the world — the classic fairy-tale red and white spotted toadstool.','Toxic but rarely fatal — causes hallucinations and delirium. Ibotenic acid and muscimol are the active compounds.','Traditionally used as a fly killer — placed in milk to attract and stupefy flies.','Important in shamanic traditions across northern Eurasia; possibly connected to the Vedic drink Soma.']},

{type:'fungi',icon:'🍄',commonName:'Common Earthball',taxonomicName:'Scleroderma citrinum',habitat:'Woodland, Heath & Grassy Areas',taxonomy:[{rank:'Division',name:'Basidiomycota'},{rank:'Family',name:'Sclerodermataceae'},{rank:'Genus',name:'Scleroderma'},{rank:'Species',name:'S. citrinum'}],id:{bark:'N/A',leaves:'<strong>Dirty yellow-brown, rounded, no stipe. Tough warty exterior</strong> with scaly cracks. 3–10 cm.',branchLeaf:'Interior: white becoming purplish-black as spores mature. Opens at top when ripe. No stipe.',habitat:'Woodland, heathland, grassy areas on acid soils. Often half-buried. Mycorrhizal with broadleaves.'},facts:['The Common Earthball is poisonous — sometimes mistaken for edible puffballs, but the purple-black interior distinguishes it clearly.','The spore mass (gleba) turns black before the outer skin splits to release millions of spores.','Host to the parasitic fungus Pseudoboletus parasiticus (Parasitic Bolete), which grows from its surface.','One of the commonest fungi encountered on woodland paths in late summer and autumn.']},

{type:'fungi',icon:'🍄',commonName:'Amethyst Deceiver',taxonomicName:'Laccaria amethystina',habitat:'Broadleaved & Conifer Woodland',taxonomy:[{rank:'Division',name:'Basidiomycota'},{rank:'Family',name:'Hydnangiaceae'},{rank:'Genus',name:'Laccaria'},{rank:'Species',name:'L. amethystina'}],id:{bark:'N/A',leaves:'<strong>Vivid purple-violet cap, gills, and stipe when fresh</strong> — dramatic and unmistakeable. Cap 1–6 cm. Fades to dull brown when dry.',branchLeaf:'Thick, widely spaced purple gills. Fibrous purple stipe. White spore print.',habitat:'Broadleaved and conifer woodland. Common, especially under beech and oak on acid soils.'},facts:['One of the most beautiful British fungi — the intense amethyst-violet colour is unlike any other woodland mushroom.','The name "Deceiver" (shared with Laccaria laccata) refers to its highly variable appearance as it dries — fresh plants are vivid violet; dry ones dull brown.','Edible — but small, and the faded dry forms are unremarkable.','Forms mycorrhizal associations with many woodland trees.']},

{type:'fungi',icon:'🍄',commonName:'Velvet Shank',taxonomicName:'Flammulina velutipes',habitat:'Dead & Dying Broadleaved Trees',taxonomy:[{rank:'Division',name:'Basidiomycota'},{rank:'Family',name:'Physalacriaceae'},{rank:'Genus',name:'Flammulina'},{rank:'Species',name:'F. velutipes'}],id:{bark:'N/A',leaves:'Honey-yellow to orange-brown cap, 2–8 cm; smooth, sticky/slimy when wet.',branchLeaf:'<strong>Stipe distinctly velvety dark-brown below, contrasting with paler top.</strong> Cream gills. Clustered on wood.',habitat:'Clusters on trunks and stumps of dead or dying elm, ash, oak, and other broadleaves.'},facts:['A winter and early spring fungus — one of the few species fruiting December to February in cold weather.','The velvety, dark-brown stipe is the most reliable identification character.','The cultivated "Enoki" mushroom sold in supermarkets is Flammulina velutipes — grown in the dark to produce long white stems.','Appears in mild weather throughout winter, often surviving light frosts.']},

{type:'fungi',icon:'🍄',commonName:'Hedgehog Mushroom',taxonomicName:'Hydnum repandum',habitat:'Broadleaved & Mixed Woodland',taxonomy:[{rank:'Division',name:'Basidiomycota'},{rank:'Family',name:'Hydnaceae'},{rank:'Genus',name:'Hydnum'},{rank:'Species',name:'H. repandum'}],id:{bark:'N/A',leaves:'Pale cream to buff-ochre cap, 4–15 cm; surface irregular, wavy margin.',branchLeaf:'<strong>Underside has dense cream-coloured spines (teeth) instead of gills or pores</strong> — unmistakeable.',habitat:'Broadleaved and mixed woodland on most soils. Common under beech, oak, and hazel.'},facts:['The Hedgehog Mushroom is one of the safest fungi for beginners — the spines instead of gills are unique among common edible UK species.','Edible and good — mild, slightly bitter flavour. The spines become more bitter with age.','A reliable autumn species under beech in southern England.','Spines (teeth) instead of gills or pores are characteristic of the hydnoid fungi — a fascinating diverse group.']},

{type:'fungi',icon:'🍄',commonName:'Jelly Ear',taxonomicName:'Auricularia auricula-judae',habitat:'Elder, Beech & Other Dead Wood',taxonomy:[{rank:'Division',name:'Basidiomycota'},{rank:'Family',name:'Auriculariaceae'},{rank:'Genus',name:'Auricularia'},{rank:'Species',name:'A. auricula-judae'}],id:{bark:'N/A',leaves:'<strong>Ear-shaped, rubbery-gelatinous, translucent brown-purple</strong>. 3–12 cm. Fluted like an auricle.',branchLeaf:'Outer surface velvety. Inner (spore-producing) surface smooth, grey-purple. No stipe. On dead wood.',habitat:'Almost always on elder; also beech, sycamore, and other dead or dying wood.'},facts:['Also called Jew\'s Ear — the name may derive from a story that Judas Iscariot hanged himself on an elder tree.','Edible — widely used in Chinese cuisine (sold as "wood ear" fungus), with a distinctive gelatinous crunch.','Dries to a hard, black crisp but reconstitutes fully in water — can be stored dried indefinitely.','Almost always found on elder — the association with elder is so strong that finding Jelly Ear usually means elder is nearby.']},

{type:'fungi',icon:'🍄',commonName:'Scarlet Elf Cup',taxonomicName:'Sarcoscypha austriaca',habitat:'Mossy Woodland Floors & Fallen Branches',taxonomy:[{rank:'Division',name:'Ascomycota'},{rank:'Family',name:'Sarcoscyphaceae'},{rank:'Genus',name:'Sarcoscypha'},{rank:'Species',name:'S. austriaca'}],id:{bark:'N/A',leaves:'<strong>Stunning scarlet-red cup-shaped fruiting body 2–5 cm</strong> on short stipe. Outer surface white to pale, finely hairy.',branchLeaf:'Interior vivid scarlet; exterior paler. Cups on buried or mossy fallen wood, often part-hidden.',habitat:'Mossy woodland floors; attached to fallen, buried, or decaying wood. Winter–spring.'},facts:['One of the most beautiful fungi in Britain — the vivid scarlet cups against bright green moss in winter are spectacular.','A winter and early spring species — fruiting December to April, often when little else is visible.','Two virtually identical species: Sarcoscypha austriaca and S. coccinea — microscopy needed to separate them.','Provides some of the earliest colour in the woodland floor before spring vegetation emerges.']},

{type:'fungi',icon:'🍄',commonName:'Sulphur Tuft',taxonomicName:'Hypholoma fasciculare',habitat:'Stumps & Dead Wood in Woodland',taxonomy:[{rank:'Division',name:'Basidiomycota'},{rank:'Family',name:'Strophariaceae'},{rank:'Genus',name:'Hypholoma'},{rank:'Species',name:'H. fasciculare'}],id:{bark:'N/A',leaves:'Bright sulphur-yellow cap 2–7 cm; sometimes with orange-brown centre. <strong>Grows in dense tufted clusters on wood.</strong>',branchLeaf:'Gills sulphur-yellow, becoming grey-green with age. Purple-brown spore print. Bitter taste.',habitat:'Dense clusters on stumps, fallen logs and buried roots of broadleaved and conifer trees.'},facts:['One of the most common fungi in British woodland — conspicuous bright yellow tufts on stumps throughout the year.','Poisonous — causes severe gastrointestinal symptoms.','The grey-green gills of mature specimens and the bitter taste distinguish it from edible Honey Fungus.','Can fruit in almost any month — persistent and extremely common.']},

{type:'fungi',icon:'🍄',commonName:'Shaggy Ink Cap',taxonomicName:'Coprinus comatus',habitat:'Roadsides, Lawns & Disturbed Ground',taxonomy:[{rank:'Division',name:'Basidiomycota'},{rank:'Family',name:'Agaricaceae'},{rank:'Genus',name:'Coprinus'},{rank:'Species',name:'C. comatus'}],id:{bark:'N/A',leaves:'<strong>White, cylindrical, shaggy cap with recurved white-brown scales</strong> — like a lawyer\'s wig. Cap 5–15 cm tall.',branchLeaf:'<strong>Cap autodigests (deliquesces) to black ink from the margin upward.</strong> White gills becoming pink then black.',habitat:'Roadsides, lawns, gardens, disturbed ground, path edges. Often in groups.'},facts:['The Shaggy Ink Cap autodigests itself — the black dripping liquid is spore-laden "ink" once used to write letters.','Edible when young and white — but must be eaten within hours of picking as autodigestion begins rapidly.','Contains a compound (coprine) that causes an unpleasant reaction if consumed with alcohol — even days after eating.','One of the few fungi that colonises disturbed and compacted urban ground — often seen on roadsides and building sites.']},

{type:'fungi',icon:'🍄',commonName:'Common Ink Cap',taxonomicName:'Coprinopsis atramentaria',habitat:'Stumps, Disturbed Ground & Gardens',taxonomy:[{rank:'Division',name:'Basidiomycota'},{rank:'Family',name:'Psathyrellaceae'},{rank:'Genus',name:'Coprinopsis'},{rank:'Species',name:'C. atramentaria'}],id:{bark:'N/A',leaves:'Grey-brown, egg-shaped then bell-shaped cap 3–7 cm; surface smooth to slightly scaly. <strong>Less shaggy than Shaggy Ink Cap.</strong>',branchLeaf:'<strong>Autodigests to black ink like Shaggy Ink Cap.</strong> Often growing in clusters near buried wood.',habitat:'Clusters near stumps, buried roots, gardens, parks, roadsides.'},facts:['Edible but contains coprine — causes a severe flushing reaction (Antabuse effect) when combined with alcohol, even several days after eating.','The ink produced by autodigestion was used in medieval manuscripts.','One of the most important fungi medicinally — coprine has been investigated as a treatment for alcoholism.','Far more uniform and less shaggy than Shaggy Ink Cap — the two are easily confused in the field.']},

{type:'birds',icon:'🐦',commonName:'Song Thrush',taxonomicName:'Turdus philomelos',habitat:'Woodland, Garden & Hedgerow',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Turdidae'},{rank:'Genus',name:'Turdus'},{rank:'Species',name:'T. philomelos'}],id:{colour:'Warm brown above; <strong>buff-cream below with neat rows of dark brown arrow-head spots</strong>.',sizeShape:'Body 23 cm. Smaller and more upright than Mistle Thrush; spotted not streaked below.',keyFeatures:'Arrow-head spots in rows. Confusion: Mistle Thrush is larger, greyer, rounder spots in untidy rows; Redwing has red flanks and eye-stripe.',habitat:'Woodland, gardens, hedgerows. Famous for breaking snail shells on an "anvil" stone.'},facts:['Song Thrush is a UK Red List species — declined 73% since 1970, primarily due to loss of invertebrate food in agricultural landscapes.','The song is famous for repeating phrases 2–4 times — "Did he do it? Did he do it? He did! He did!"','One of very few birds to use a tool — a stone anvil to break snail shells, leaving a characteristic scatter of broken shells.','Males sing from a prominent perch from January — one of the earliest signs of the breeding season.']},

{type:'birds',icon:'🐦',commonName:'Starling',taxonomicName:'Sturnus vulgaris',habitat:'Farmland, Garden, Town & Coast',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Sturnidae'},{rank:'Genus',name:'Sturnus'},{rank:'Species',name:'S. vulgaris'}],id:{colour:'<strong>Iridescent purple-green gloss</strong> on black plumage (summer); winter white spots covering body. Yellow bill in summer.',sizeShape:'Body 21 cm. Short-tailed, triangular-winged in flight — distinctive flight silhouette.',keyFeatures:'Short tail, pointed wings. Confusion: Blackbird is larger, longer-tailed; Starling walks (not hops) and probes soil with bill.',habitat:'Almost all habitats. Roosts in vast communal murmurations in winter.'},facts:['Starling murmurations can contain millions of birds — the fluid, shape-shifting flocks are among the most spectacular wildlife sights in Britain.','Declined 66% in the UK since 1979 — a Red List species. Loss of permanent pasture and insect food is the cause.','Starlings are exceptional mimics — they can reproduce the calls of over 20 other species, including chainsaws and phones.','Introduced to North America in 1890 — now over 200 million birds, the most destructive bird introduction in history.']},

{type:'birds',icon:'🐦',commonName:'House Sparrow',taxonomicName:'Passer domesticus',habitat:'Town, Village, Farm & Garden',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Passeridae'},{rank:'Genus',name:'Passer'},{rank:'Species',name:'P. domesticus'}],id:{colour:'Male: <strong>grey cap, white cheek, black bib</strong>; streaked brown back. Female: dull brown, pale supercilium, no bib.',sizeShape:'Body 14–15 cm. Stocky, rounded; thick seed-cracking bill.',keyFeatures:'Male\'s grey cap and black bib diagnostic. Female confusion: Dunnock is slimmer with thinner bill; Tree Sparrow has chestnut cap and black cheek spot.',habitat:'Towns, villages, farms. Rarely far from human habitation.'},facts:['House Sparrow declined 71% in the UK since 1977 — a Red List species. Loss of nest sites, insect food, and weed seeds are the causes.','One of the most successful birds on Earth — found on every continent except Antarctica, always associated with humans.','Despite living on seeds, sparrow chicks need insects in the first days of life — loss of aphids and small beetles in gardens has driven declines.','London\'s sparrow population crashed from 150,000 in 1925 to near extinction by 2000.']},

{type:'birds',icon:'🐦',commonName:'Chaffinch',taxonomicName:'Fringilla coelebs',habitat:'Woodland, Garden, Farm & Hedgerow',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Fringillidae'},{rank:'Genus',name:'Fringilla'},{rank:'Species',name:'F. coelebs'}],id:{colour:'Male: <strong>blue-grey crown, pink-red face and breast; green rump; white wing bars and outer tail feathers.</strong> Female: dull olive-brown with white wing bars.',sizeShape:'Body 14–15 cm. Finch shape — stout conical bill; prominent wing bars in flight.',keyFeatures:'Double white wing bars diagnostic in all plumages. Male unmistakeable. Female: wing bars distinguish from sparrows.',habitat:'Woodland, garden, farmland, hedgerow. One of UK\'s most common birds.'},facts:['The Chaffinch is the second most common breeding bird in the UK — approximately 5.8 million pairs.','The song varies by region and population — birds learn their "dialect" from local males in their first summer.','Females and young birds move south in winter — the name coelebs ("bachelor") refers to the males that stay behind.','Chaffinch wing bars are one of the most reliable winter bird identification features.']},

{type:'birds',icon:'🐦',commonName:'Goldfinch',taxonomicName:'Carduelis carduelis',habitat:'Garden, Scrub, Meadow & Farmland',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Fringillidae'},{rank:'Genus',name:'Carduelis'},{rank:'Species',name:'C. carduelis'}],id:{colour:'<strong>Red face, white cheeks, black cap</strong>; tawny-brown back; white rump; <strong>vivid yellow wing bar</strong>. Sexes alike.',sizeShape:'Body 12 cm. Small, neat finch. Yellow wing bar unmistakeable in flight.',keyFeatures:'Red and white head + vivid yellow wing bar unique. Confusion: none in UK.',habitat:'Gardens, scrub, meadows, farmland. Especially teasel, thistle, and knapweed seed heads in winter.'},facts:['A group of goldfinches is called a "charm" — fittingly, as their tinkling calls and vivid colours light up any winter scrub.','UK Goldfinch numbers have increased 80% since 1995 — partly due to garden nyjer (thistle) seed feeders.','The specialised long, fine bill allows goldfinches to extract seeds from teasel heads that other birds cannot reach.','Historically trapped in huge numbers for the cage-bird trade — the Wild Birds Protection Acts of 1880 ended the practice.']},

{type:'birds',icon:'🐦',commonName:'Sparrowhawk',taxonomicName:'Accipiter nisus',habitat:'Woodland, Garden & Farmland',taxonomy:[{rank:'Order',name:'Accipitriformes'},{rank:'Family',name:'Accipitridae'},{rank:'Genus',name:'Accipiter'},{rank:'Species',name:'A. nisus'}],id:{colour:'Male: blue-grey above, <strong>orange-barred rufous below</strong>. Female: brown above, brown-barred below. Both have long tail, short rounded wings.',sizeShape:'Male 28–34 cm; female 35–41 cm — strong sexual size dimorphism.',keyFeatures:'Rounded wings, long tail. Confusion: Kestrel has pointed wings, hovers; Goshawk is much larger.',habitat:'Woodland edge, gardens, farmland. The most common forest raptor in the UK.'},facts:['Sparrowhawks hunt by ambush — hugging hedgerows and garden fences at high speed, using surprise to catch small birds.','Female Sparrowhawks are almost twice the mass of males — the most extreme size difference in any British bird.','Recovered strongly from near-extinction due to pesticide poisoning (organochlorines) in the 1950s-60s.','A hunting Sparrowhawk creates instant pandemonium at garden feeders — birds scatter before the hawk is even visible.']},

{type:'birds',icon:'🦅',commonName:'Common Buzzard',taxonomicName:'Buteo buteo',habitat:'Woodland, Farmland & Upland',taxonomy:[{rank:'Order',name:'Accipitriformes'},{rank:'Family',name:'Accipitridae'},{rank:'Genus',name:'Buteo'},{rank:'Species',name:'B. buteo'}],id:{colour:'Very variable: typically brown above; pale below with brown breast band and carpal patches. <strong>Short rounded tail with fine bars.</strong>',sizeShape:'Body 51–57 cm; wingspan 110–130 cm. Large, broad-winged. Soars in wide circles.',keyFeatures:'Broad wings, short rounded tail, "V" soar. Confusion: Red Kite has forked tail; Osprey has white head. Mewing cat-like call.',habitat:'Woodland edge, farmland, upland valleys. Now the commonest large raptor in Britain.'},facts:['The Buzzard is now the most common large raptor in Britain — estimated 67,000 pairs, having recovered from severe persecution.','Often seen soaring on thermals, calling with a distinctive mewing cry — many people mistake it for a cat.','Hunts earthworms on farmland after rain — frequently seen walking on ploughed fields.','The recovery of Buzzards across England and Wales is one of UK conservation\'s greatest success stories.']},

{type:'birds',icon:'🦅',commonName:'Kestrel',taxonomicName:'Falco tinnunculus',habitat:'Farmland, Moorland & Road Verge',taxonomy:[{rank:'Order',name:'Falconiformes'},{rank:'Family',name:'Falconidae'},{rank:'Genus',name:'Falco'},{rank:'Species',name:'F. tinnunculus'}],id:{colour:'Male: <strong>blue-grey head and tail; chestnut back with black spots.</strong> Female: rufous brown with dark bars throughout.',sizeShape:'Body 32–35 cm; wingspan 68–80 cm. Pointed wings; long tail.',keyFeatures:'<strong>Hovering flight</strong> — unique among large UK birds of prey. Male\'s grey head. Confusion: Merlin is smaller, doesn\'t hover.',habitat:'Farmland, moorland, road verges, urban areas. The only common hovering UK raptor.'},facts:['Kestrels can see ultraviolet light — they use UV-reflective vole urine trails to find prey from the air.','Declined 36% in the UK since 1995 — intensification of farmland and loss of rough grassland has reduced vole prey.','The most familiar UK bird of prey to most people — commonly seen hovering alongside motorways.','A single Kestrel can eat its own body weight in voles every few days during breeding season.']},

{type:'birds',icon:'🦆',commonName:'Mallard',taxonomicName:'Anas platyrhynchos',habitat:'Lake, River, Pond & Park',taxonomy:[{rank:'Order',name:'Anseriformes'},{rank:'Family',name:'Anatidae'},{rank:'Genus',name:'Anas'},{rank:'Species',name:'A. platyrhynchos'}],id:{colour:'Male: <strong>iridescent green head, white collar, purple-brown breast, yellow bill.</strong> Female: mottled brown with orange and black bill.',sizeShape:'Body 50–65 cm. Large, stocky surface-feeding duck. Both sexes have blue speculum.',keyFeatures:'Male unmistakeable. Female: blue speculum, orange and black bill. Confusion: other surface-feeding ducks smaller or with different head patterns.',habitat:'Almost any freshwater. Parks, ponds, rivers, lakes, coastal marshes.'},facts:['The ancestor of most domestic duck breeds.','The loud quack is always female — male Mallards make a softer, reedy sound.','Mallard pairs form in autumn, but the female alone incubates and raises the young.','Hybridises with many other duck species — hybrid ducks at park ponds are usually Mallard crosses.']},

{type:'birds',icon:'🦢',commonName:'Mute Swan',taxonomicName:'Cygnus olor',habitat:'River, Lake, Estuary & Park',taxonomy:[{rank:'Order',name:'Anseriformes'},{rank:'Family',name:'Anatidae'},{rank:'Genus',name:'Cygnus'},{rank:'Species',name:'C. olor'}],id:{colour:'Entirely white. <strong>Orange bill with black knob at base</strong> (knob larger in male).',sizeShape:'Body 140–160 cm; wingspan 200–240 cm. The heaviest flying bird in Britain.',keyFeatures:'All white with orange bill. Confusion: Whooper and Bewick\'s Swans have yellow and black bills, hold necks straight. Mute Swan holds neck in S-curve.',habitat:'Rivers, lakes, parks, estuaries. The most common and familiar swan in Britain.'},facts:['At up to 15 kg, the Mute Swan is the heaviest bird capable of sustained flight in Britain.','All unmarked Mute Swans on the Thames are technically owned by the Crown — an ancient royal prerogative.','Swan upping, the annual census of Thames Mute Swans, has been conducted since the 12th century.','Mute Swans are not actually mute — they hiss, snort, and produce a distinctive throbbing flight sound from their wings.']},

{type:'mammals',icon:'🦊',commonName:'Red Fox',taxonomicName:'Vulpes vulpes',habitat:'Woodland, Farmland, Urban & Coastal',taxonomy:[{rank:'Order',name:'Carnivora'},{rank:'Family',name:'Canidae'},{rank:'Genus',name:'Vulpes'},{rank:'Species',name:'V. vulpes'}],id:{colour:'<strong>Rich orange-red above; white below and on cheeks; black legs and backs of ears; white-tipped bushy tail.</strong>',sizeShape:'Body 58–77 cm; tail 35–50 cm. Dog-like but more slender; pointed muzzle.',keyFeatures:'Orange-red coat and white tail tip unique. Confusion: none in UK. Cat-like vertical slit pupils.',habitat:'All habitats — woodland, farmland, urban gardens, coastal dunes. One of the most adaptable mammals in Britain.'},facts:['Urban foxes are now found in most UK cities — London has approximately 10,000 foxes, one of the highest densities in the world.','Foxes cache food in multiple locations with remarkable spatial memory — and remember the locations for months.','The vixen\'s call in winter (a blood-curdling shriek) is frequently mistaken for a human scream.','Foxes use a rolling, cat-like hunting technique — leaping high and pouncing nose-first onto small mammals in long grass.']},

{type:'mammals',icon:'🦔',commonName:'Western Hedgehog',taxonomicName:'Erinaceus europaeus',habitat:'Garden, Hedgerow & Woodland Edge',taxonomy:[{rank:'Order',name:'Eulipotyphla'},{rank:'Family',name:'Erinaceidae'},{rank:'Genus',name:'Erinaceus'},{rank:'Species',name:'E. europaeus'}],id:{colour:'Spines buff-brown with dark bands. Face and underside with coarse grey-brown hair.',sizeShape:'Body 15–30 cm. Rounded; 5,000–7,000 spines on back.',keyFeatures:'Spines unmistakeable. Confusion: none. Rolls into defensive ball when threatened. <strong>Snuffling foraging sounds and shuffling movement distinctive.</strong>',habitat:'Gardens, hedgerows, woodland edges, suburban parks. Requires invertebrate-rich ground.'},facts:['Hedgehog populations have declined approximately 50% since 2000 — garden pesticide use, habitat loss, and road deaths are causes.','Hedgehogs can travel 1–2 km per night — garden-linking gaps in fences (13×13 cm) are now encouraged by wildlife organisations.','The average hedgehog carries 100–500 fleas — Archaeopsylla erinacei, a species specific to hedgehogs and not found on other animals.','Rolls into a perfect defensive ball of spines when threatened — the spines of an adult can resist most predators except badger.']},
