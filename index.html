{type:'birds',icon:'🕊️',commonName:'Wood Pigeon',taxonomicName:'Columba palumbus',habitat:'Woodland, Farmland & Garden',taxonomy:[{rank:'Order',name:'Columbiformes'},{rank:'Family',name:'Columbidae'},{rank:'Genus',name:'Columba'},{rank:'Species',name:'C. palumbus'}],id:{colour:'Blue-grey; pink-red breast; <strong>white patch on neck and bold white wing bar visible in flight.</strong>',sizeShape:'Body 40–42 cm. The largest UK pigeon. Plump; small head.',keyFeatures:'White neck patch and wing bar diagnostic. Confusion: Stock Dove lacks white neck patch; Feral Pigeon more variable.',habitat:'Woodland, farmland, gardens, parks. The most abundant UK pigeon.'},facts:['Wood Pigeon is the UK\'s most numerous bird species — estimated 5+ million breeding pairs and increasing.','A major agricultural pest — flocks of thousands descend on oilseed rape, brassicas, and cereals.','The lazy cooing song ("take two cows, Taffy") is one of the most familiar summer sounds of British woodland.','Despite being constantly hunted, Wood Pigeon populations continue to grow — the availability of winter oilseed rape crops has driven population growth.']},

{type:'birds',icon:'🐦',commonName:'Lapwing',taxonomicName:'Vanellus vanellus',habitat:'Farmland, Wet Meadow & Upland',taxonomy:[{rank:'Order',name:'Charadriiformes'},{rank:'Family',name:'Charadriidae'},{rank:'Genus',name:'Vanellus'},{rank:'Species',name:'V. vanellus'}],id:{colour:'<strong>Metallic green-black above; white below; orange-rufous undertail. Long wispy crest.</strong>',sizeShape:'Body 28–31 cm. Rounded wings; broad black-and-white wing pattern in flight.',keyFeatures:'Long crest and broad rounded wings unique. Tumbling display flight and "pee-wit" call unmistakeable.',habitat:'Wet meadows, arable farmland, upland moors, estuaries in winter.'},facts:['UK Lapwing has declined over 50% since 1987 — one of the most dramatic UK farmland bird crashes.','The tumbling, "peewit" display flight of males in spring over meadows is one of the great sights of the British countryside.','Lapwing eggs were a Victorian delicacy — collected commercially until the 1926 Wild Birds Protection Act.','Forms large flocks in winter, moving to coastal estuaries when hard weather freezes inland fields.']},

{type:'birds',icon:'🐦',commonName:'Curlew',taxonomicName:'Numenius arquata',habitat:'Upland Moor, Coastal Marsh & Estuary',taxonomy:[{rank:'Order',name:'Charadriiformes'},{rank:'Family',name:'Scolopacidae'},{rank:'Genus',name:'Numenius'},{rank:'Species',name:'N. arquata'}],id:{colour:'Brown, heavily streaked throughout. <strong>Extremely long, downcurved bill — the most distinctive wader feature in Britain.</strong>',sizeShape:'Body 50–57 cm — largest UK wader. Long legs; long downcurved bill.',keyFeatures:'Long downcurved bill unmistakeable. Confusion: Whimbrel is smaller with shorter bill and striped crown.',habitat:'Upland moorland and bog (breeding); estuaries and coastal marsh (winter).'},facts:['The bubbling, haunting call of the Curlew on moorland is widely considered one of the most evocative sounds in the British countryside.','UK Curlew has declined 48% since 1994 — predation of nests and chicks by foxes, corvids, and mink is a major cause.','The UK holds approximately 25% of the European Curlew breeding population — an international responsibility.','Curlew use their long bill to probe deep into estuarine mud for lugworms and cockles inaccessible to other waders.']},

{type:'birds',icon:'🐦',commonName:'Oystercatcher',taxonomicName:'Haematopus ostralegus',habitat:'Rocky Shore, Sandy Beach & Upland River',taxonomy:[{rank:'Order',name:'Charadriiformes'},{rank:'Family',name:'Haematopodidae'},{rank:'Genus',name:'Haematopus'},{rank:'Species',name:'H. ostralegus'}],id:{colour:'<strong>Black above; white below; vivid orange-red bill; pink legs.</strong>',sizeShape:'Body 40–45 cm. Stocky wader. Bold black-and-white wing pattern in flight.',keyFeatures:'Black-white-orange combination unmistakeable. Very loud "kleeeep" call carries long distances.',habitat:'Rocky and sandy coasts; also upland rivers and fields inland.'},facts:['Despite the name, Oystercatchers rarely eat oysters — they specialise in mussels, cockles, and marine worms.','Chicks of "stabbers" are taught to stab open mussel shells; chicks of "hammerers" learn to hammer — technique is culturally transmitted from parent to offspring.','One of the most vocal coastal birds — the loud piping calls of winter roost flocks are a defining sound of the British coast.','Now colonising inland rivers and fields in Scotland and northern England — an expanding range driven by river restoration.']},

{type:'birds',icon:'🐦',commonName:'Puffin',taxonomicName:'Fratercula arctica',habitat:'Atlantic Cliff & Sea',taxonomy:[{rank:'Order',name:'Charadriiformes'},{rank:'Family',name:'Alcidae'},{rank:'Genus',name:'Fratercula'},{rank:'Species',name:'F. arctica'}],id:{colour:'<strong>Black above; white below; vivid multi-coloured orange-red, blue-grey and yellow bill; bright orange legs.</strong>',sizeShape:'Body 26–29 cm. Compact; upright stance on land.',keyFeatures:'Multi-coloured bill unmistakeable. Confusion: none in UK. Returns to sea between August and March.',habitat:'Atlantic cliff colonies; open ocean outside breeding season.'},facts:['Puffins can carry up to 62 small fish (sand eels) crossways in their bill simultaneously, held by a unique hinge mechanism.','The coloured bill covering is shed each autumn — breeding puffins have the most vivid bills, winter birds are drabber.','Skomer Island (Wales) and Handa Island (Scotland) hold internationally important UK puffin colonies.','UK Puffin populations have declined sharply due to sand eel collapse driven by warming seas and overfishing.']},

{type:'birds',icon:'🐦',commonName:'Gannet',taxonomicName:'Morus bassanus',habitat:'Atlantic Cliff Colony & Open Sea',taxonomy:[{rank:'Order',name:'Suliformes'},{rank:'Family',name:'Sulidae'},{rank:'Genus',name:'Morus'},{rank:'Species',name:'M. bassanus'}],id:{colour:'Adult: <strong>brilliant white with black wingtips; buff-yellow head; blue-rimmed eye.</strong> Juvenile: dark brown, gradually whitening over 5 years.',sizeShape:'Body 87–100 cm; wingspan 165–180 cm — the largest UK seabird. Cigar-shaped body.',keyFeatures:'White with black wingtips and size unmistakeable as adult. Plunge-dives from height diagnostic.',habitat:'Atlantic cliff colonies; open sea and shelf waters.'},facts:['Gannets plunge-dive from up to 30 metres at 100 km/h — air sacs under the skin absorb the impact.','The Bass Rock in the Firth of Forth holds 75,000 breeding Gannets — the largest single-rock gannetry in the world, visible as a white cap from miles away.','UK holds approximately 60% of the world\'s Gannet population — an extraordinary global responsibility.','Gannets pair for life and reunite at the same nest site each year, greeting with an elaborate bill-fencing ceremony.']},

{type:'birds',icon:'🐦',commonName:'Grey Heron',taxonomicName:'Ardea cinerea',habitat:'River, Lake, Estuary & Garden Pond',taxonomy:[{rank:'Order',name:'Pelecaniformes'},{rank:'Family',name:'Ardeidae'},{rank:'Genus',name:'Ardea'},{rank:'Species',name:'A. cinerea'}],id:{colour:'Grey above; white head with <strong>broad black eye-stripe extending to black crest.</strong> White neck with black streaks. Yellow bill.',sizeShape:'Body 90–98 cm; wingspan 175–195 cm. Very tall; long neck, long legs.',keyFeatures:'Tall, hunched grey bird at waterside. <strong>Neck retracted into S-shape in flight — diagnostic.</strong> Loud "fraank" call.',habitat:'Almost any water — rivers, lakes, estuaries, garden ponds.'},facts:['Grey Herons stand motionless for hours, waiting to ambush fish — the classic hunting technique of patience and explosive strike.','Garden pond goldfish are taken regularly — a Heron visiting a garden pond is virtually impossible to deter.','Colonial nesters (heronries) in treetops — the same trees may be used for generations.','Can hunt at night — the large eyes adapt well to low light.']},

{type:'birds',icon:'🐦',commonName:'Skylark',taxonomicName:'Alauda arvensis',habitat:'Farmland, Upland Moor & Coastal Turf',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Alaudidae'},{rank:'Genus',name:'Alauda'},{rank:'Species',name:'A. arvensis'}],id:{colour:'Brown, streaked above; buff-white below with streaked breast. Small crest (raised when alert).',sizeShape:'Body 18–19 cm. Compact; white outer tail feathers visible in flight.',keyFeatures:'Sustained aerial song from high altitude. Crest visible. White trailing wing edges. Confusion: Meadow Pipit lacks crest and sings briefly.',habitat:'Open farmland, upland grassland, moorland, coastal heathland. Needs unobstructed open ground.'},facts:['The Skylark song — an unbroken stream of notes and phrases delivered from high altitude for minutes at a time — is one of the great sounds of British open countryside.','UK Skylarks have declined over 50% since 1975 — intensive arable farming leaving no winter stubble and no spring nest sites is the cause.','A singing male may maintain a sustained performance for 20 minutes or more without landing.','Skylark plots — small undrilled areas in cereal fields — have been shown to significantly improve Skylark breeding success.']},

{type:'birds',icon:'🐦',commonName:'Reed Warbler',taxonomicName:'Acrocephalus scirpaceus',habitat:'Reedbed',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Acrocephalidae'},{rank:'Genus',name:'Acrocephalus'},{rank:'Species',name:'A. scirpaceus'}],id:{colour:'Warm brown above; buff-white below; pale supercilium. No distinctive markings.',sizeShape:'Body 13 cm. Slim; rounded tail; long undertail coverts.',keyFeatures:'Reedbed habitat + song. Confusion: Sedge Warbler has bold supercilium and streaked back. Reed Warbler is plain.',habitat:'Almost exclusively Common Reed — one of the most habitat-specialist UK birds.'},facts:['Reed Warbler is the most frequent Cuckoo host in lowland England — female Cuckoos specialise in finding Reed Warbler nests among the reeds.','One of the most difficult species to see despite being vocally prominent — forages deep within reeds.','Migrates to west Africa each winter — tagged birds show they cross the Sahara in a single non-stop flight.','Decline in reedbed area has constrained UK Reed Warbler populations — reedbed creation directly benefits this species.']},

{type:'birds',icon:'🐦',commonName:'Meadow Pipit',taxonomicName:'Anthus pratensis',habitat:'Upland Moor, Grassland & Coastal Heath',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Motacillidae'},{rank:'Genus',name:'Anthus'},{rank:'Species',name:'A. pratensis'}],id:{colour:'Brown, heavily streaked above and below; pale legs; <strong>white outer tail feathers.</strong>',sizeShape:'Body 14–15 cm. Slender; walks (does not hop).',keyFeatures:'White outer tail and walking gait. Confusion: Skylark is larger with crest; Tree Pipit best separated by call and display.',habitat:'Upland moorland, rough grassland, coastal heath, saltmarsh. The most abundant upland bird.'},facts:['The Meadow Pipit is the most important Cuckoo host in upland Britain — upland Cuckoo populations are almost entirely dependent on it.','UK Meadow Pipits have declined significantly — drainage and improvement of rough grassland reduces breeding success.','Performs a parachute display flight — ascending with rapid wingbeats then gliding down singing.','In winter, large numbers move to coastal areas and southern lowlands from upland breeding grounds.']},

{type:'birds',icon:'🐦',commonName:'Dunnock',taxonomicName:'Prunella modularis',habitat:'Garden, Hedgerow & Woodland',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Prunellidae'},{rank:'Genus',name:'Prunella'},{rank:'Species',name:'P. modularis'}],id:{colour:'<strong>Brown and black streaked above; grey head and breast.</strong> Thin, insect-eating bill.',sizeShape:'Body 14–15 cm. Compact; mouse-like; creeps low through vegetation.',keyFeatures:'Grey head on streaked body; thin bill. Confusion: House Sparrow has thick seed-cracking bill; Robin has orange breast.',habitat:'Gardens, hedgerows, woodland edge, scrub. Almost everywhere with low dense cover.'},facts:['The Dunnock is one of the most complex mating systems of any bird — polygyny, polyandry, and monogamy all occur in the same population.','Female Dunnocks mate with multiple males, who then compete to feed "their" chicks — leading to intense rivalry and wing-flicking displays.','Despite being in virtually every garden, Dunnocks are often overlooked — they creep quietly in hedgerow bases.','A frequent Cuckoo host in gardens and hedgerows.']},

{type:'birds',icon:'🐦',commonName:'Nuthatch',taxonomicName:'Sitta europaea',habitat:'Ancient Woodland & Old Parkland',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Sittidae'},{rank:'Genus',name:'Sitta'},{rank:'Species',name:'S. europaea'}],id:{colour:'Blue-grey above; <strong>rufous-orange below; bold black eye-stripe from bill to neck.</strong>',sizeShape:'Body 14 cm. Compact; no tail to speak of; strong dagger bill.',keyFeatures:'Only UK bird that routinely descends trees head-first. Blue-grey and orange. Loud ringing calls.',habitat:'Ancient deciduous woodland, old parkland. Needs large old trees.'},facts:['Nuthatches are the only UK bird that regularly descends trees head-downwards — a unique foraging behaviour.','They plaster mud around enlarged nest holes to reduce the size — and will also plaster over cracks in bark, apparently for unknown reasons.','One of the fastest expanding UK bird species — spreading northward into Scotland for the first time in recent decades.','Nuthatches wedge nuts and large insects into bark crevices and hammer them open — the name means "nut-hacker."']},

{type:'birds',icon:'🐦',commonName:'Long-tailed Tit',taxonomicName:'Aegithalos caudatus',habitat:'Woodland, Hedgerow & Garden',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Aegithalidae'},{rank:'Genus',name:'Aegithalos'},{rank:'Species',name:'A. caudatus'}],id:{colour:'Pink, black, and white; <strong>very long tail relative to tiny body; pink and white below; black stripe over eye.</strong>',sizeShape:'Body 14 cm including 7–9 cm tail. Tiny round body.',keyFeatures:'Tiny ball-shaped body with enormous tail unmistakeable. Flocks with distinctive "seee-seee-seee" calls.',habitat:'Woodland edge, hedgerows, gardens. Forages in noisy flocks outside breeding season.'},facts:['Long-tailed Tit nests are among the most elaborate in Britain — an oval dome of moss, feathers, and spider silk takes 3 weeks to build.','Outside breeding season, Long-tailed Tits roost communally, huddled in a tight line — sharing body heat in cold nights.','Related birds help at the nest if their own breeding attempt fails — one of few UK examples of cooperative breeding.','A single nest has been recorded to contain over 1,500 feathers as lining.']},

{type:'birds',icon:'🐦',commonName:'Jay',taxonomicName:'Garrulus glandarius',habitat:'Woodland, Hedgerow & Garden',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Corvidae'},{rank:'Genus',name:'Garrulus'},{rank:'Species',name:'G. glandarius'}],id:{colour:'Pink-brown body; <strong>blue-and-black barred wing patch; white rump obvious in flight; black moustache.</strong>',sizeShape:'Body 34–35 cm. Chunky; broad wings; undulating flight.',keyFeatures:'Blue wing patch and white rump unmistakeable in flight. Harsh screaming call.',habitat:'Deciduous and mixed woodland, larger gardens, parks.'},facts:['A single Jay caches up to 3,000 acorns each autumn — forgotten caches are responsible for most oak woodland regeneration in the UK.','The blue wing feather is one of the most structurally complex objects in nature — the iridescence is produced by nano-scale light diffraction.','Jays are expert mimics — they can reproduce the calls of Tawny Owl, Buzzard, and other species accurately.','The loud screaming alarm call alerts every animal in the woodland to approaching danger — a sentinel of the forest.']},

{type:'birds',icon:'🐦',commonName:'Great Spotted Woodpecker',taxonomicName:'Dendrocopos major',habitat:'Woodland, Park & Garden',taxonomy:[{rank:'Order',name:'Piciformes'},{rank:'Family',name:'Picidae'},{rank:'Genus',name:'Dendrocopos'},{rank:'Species',name:'D. major'}],id:{colour:'Black and white; large white shoulder patches; <strong>male has red nape patch; both have red undertail.</strong>',sizeShape:'Body 22–23 cm. Compact; strong bill; stiff tail for support.',keyFeatures:'Black-white-red combination. Drumming on wood. Confusion: Lesser Spotted Woodpecker is sparrow-sized with barred back.',habitat:'Deciduous and mixed woodland, parks, gardens with old trees.'},facts:['The rapid drumming in spring is territorial advertisement — Great Spotted Woodpeckers choose resonant dead branches to maximise the carry of the sound.','UK Great Spotted Woodpecker numbers have doubled since 1970 — the only UK woodpecker increasing.','They predate other birds\' nest holes, reaching in with the tongue to extract chicks — Blue Tit nest boxes are regularly predated.','The tongue wraps around the skull and is anchored on the right side of the skull to absorb the shock of drumming.']},

{type:'birds',icon:'🐦',commonName:'Goldcrest',taxonomicName:'Regulus regulus',habitat:'Conifer Woodland & Garden',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Regulidae'},{rank:'Genus',name:'Regulus'},{rank:'Species',name:'R. regulus'}],id:{colour:'Olive-green above; buff-white below; two white wing bars. <strong>Brilliant orange (male) or yellow (female) stripe on crown.</strong>',sizeShape:'Body 8.5–9.5 cm; weight 5–7 g — <strong>Britain\'s smallest bird.</strong>',keyFeatures:'Tiny size and crown stripe. Very high-pitched "see-see-see" call at limit of human hearing. Confusion: Firecrest has bold black-and-white eye-stripe.',habitat:'Conifer woodland, mixed woodland, yew; gardens with conifers in winter.'},facts:['The Goldcrest is Britain\'s smallest bird — at 5–7 g, it is lighter than a 10p coin.','At this size, surviving a British winter is extraordinary — a Goldcrest must feed almost continuously in daylight hours.','Despite being tiny, Goldcrests cross the North Sea in autumn migration — sometimes arriving exhausted on North Sea oil rigs.','The high-pitched call is often the first sign of hearing loss in older adults — it is one of the highest-pitched bird calls in Britain.']},

{type:'mammals',icon:'🦌',commonName:'Muntjac',taxonomicName:'Muntiacus reevesi',habitat:'Woodland, Scrub & Garden',taxonomy:[{rank:'Order',name:'Artiodactyla'},{rank:'Family',name:'Cervidae'},{rank:'Genus',name:'Muntiacus'},{rank:'Species',name:'M. reevesi'}],id:{colour:'Rufous-brown in summer; grey-brown in winter. <strong>Buck has short, single-tined antlers and visible canine tusks.</strong>',sizeShape:'Shoulder height 44–52 cm; weight 10–18 kg — the smallest UK deer.',keyFeatures:'Small size; hunched posture; short antlers with pedicles running down face. Tusks in buck. Confusion: Chinese Water Deer is larger with no antlers.',habitat:'Dense woodland, scrub, large gardens. Expanding rapidly across England.'},facts:['Muntjac is now the most numerous deer in England — the population has grown from zoo escapes in the early 20th century to over 150,000.','Breeding continuously throughout the year — the only UK deer with no set breeding season, giving females up to four offspring annually.','The deep barking call is often heard but the animal rarely seen — Muntjac are secretive woodland deer.','Significant impact on woodland ground flora — bluebells, orchids, and other plants are heavily browsed.']},

{type:'mammals',icon:'🦌',commonName:'Sika Deer',taxonomicName:'Cervus nippon',habitat:'Conifer Plantation, Woodland & Moorland',taxonomy:[{rank:'Order',name:'Artiodactyla'},{rank:'Family',name:'Cervidae'},{rank:'Genus',name:'Cervus'},{rank:'Species',name:'C. nippon'}],id:{colour:'Summer: chestnut-brown with rows of white spots. Winter: dark grey-brown. <strong>Large white rump patch prominent when alarmed.</strong>',sizeShape:'Shoulder height 70–95 cm. Medium-sized deer; stag has simple antlers with typically 8 tines.',keyFeatures:'White spots (summer) and white rump. Confusion: Fallow Deer has palmate antlers; Red Deer is larger and less spotted.',habitat:'Conifer plantations, woodland, moorland edge. Introduced from Japan in the 19th century.'},facts:['Sika Deer hybridise with Red Deer — a major conservation threat to the genetic integrity of native Red Deer, especially in Scotland.','The Sika stag\'s rutting call is a remarkable multi-pitched whistle-shriek — unlike any other UK deer.','Introduced from Japan and East Asia in the 1860s — escaped from deer parks to establish wild populations.','Damage to plantation forestry from bark-stripping makes Sika one of the most economically significant UK invasive species.']},

{type:'mammals',icon:'🐭',commonName:'Wood Mouse',taxonomicName:'Apodemus sylvaticus',habitat:'Woodland, Hedgerow, Garden & Grassland',taxonomy:[{rank:'Order',name:'Rodentia'},{rank:'Family',name:'Muridae'},{rank:'Genus',name:'Apodemus'},{rank:'Species',name:'A. sylvaticus'}],id:{colour:'Brown above; white below; <strong>large ears and eyes; long tail.</strong> Often a small yellow-buff spot on chest.',sizeShape:'Body 8–11 cm; tail similar length. Slim; distinctly long-legged.',keyFeatures:'Large ears and eyes, long hind legs. Confusion: House Mouse smaller ears, grey-brown all over; Yellow-necked Mouse has full yellow collar.',habitat:'Woodland, hedgerows, gardens, arable fields. The most widespread UK small rodent.'},facts:['The most common small mammal in Britain — found in virtually every habitat including houses in winter.','Wood Mice can leap 45 cm — extraordinarily athletic for their size; the long hind legs make them look kangaroo-like when running.','Caches food in underground stores — hazelnuts with characteristic neat round holes are Wood Mouse larder food.','The primary prey of Tawny Owl, Kestrel, Weasel, and Stoat in most UK habitats.']},

{type:'mammals',icon:'🐭',commonName:'Field Vole',taxonomicName:'Microtus agrestis',habitat:'Grassland, Moorland & Roadside Verge',taxonomy:[{rank:'Order',name:'Rodentia'},{rank:'Family',name:'Cricetidae'},{rank:'Genus',name:'Microtus'},{rank:'Species',name:'M. agrestis'}],id:{colour:'Grey-brown above; buff-grey below. <strong>Blunt snout; small ears almost hidden in fur; short tail.</strong>',sizeShape:'Body 9–13 cm; tail 3–4 cm (short relative to body). Stocky.',keyFeatures:'Blunt snout, hidden ears, short tail. Confusion: Bank Vole has chestnut back and slightly longer tail.',habitat:'Long grassland, rough field margins, moorland, young conifer plantations. Avoids closed woodland.'},facts:['The Field Vole is the cornerstone prey species of UK grassland predators — Barn Owl, Short-eared Owl, Kestrel, Weasel, Stoat, and Adder are all primarily dependent on it.','Field Vole populations undergo 3–5 year cycles of boom and crash — predator populations track these cycles closely.','An estimated 75 million Field Voles live in the UK — one of the most abundant wild mammals in Britain.','Active throughout the day in runways under long grass — the network of runways is often visible by parting the vegetation.']},

{type:'mammals',icon:'🐭',commonName:'Bank Vole',taxonomicName:'Myodes glareolus',habitat:'Woodland, Hedgerow & Scrub',taxonomy:[{rank:'Order',name:'Rodentia'},{rank:'Family',name:'Cricetidae'},{rank:'Genus',name:'Myodes'},{rank:'Species',name:'M. glareolus'}],id:{colour:'<strong>Rich chestnut-brown above — the most distinctively coloured small rodent in Britain.</strong> Grey-white below.',sizeShape:'Body 8–12 cm; tail 4–7 cm (longer than Field Vole).',keyFeatures:'Chestnut back diagnostic. Confusion: Wood Mouse has larger ears and eyes; Field Vole is greyer with shorter tail.',habitat:'Woodland with dense ground cover, hedgerows, scrub. Requires shrub and herb layer.'},facts:['The rich chestnut back makes Bank Vole the most colourful UK small rodent — immediately distinguishable from the grey-brown Field Vole.','Hazel nuts opened by Bank Voles have characteristic smooth inner edges around the hole — compared to Wood Mouse\'s neat round holes and Squirrel\'s split shells.','The sole host of the Cowpox virus in Britain — Bank Voles are the natural reservoir.','An important prey species for woodland predators — Tawny Owl and Weasel are heavily dependent on Bank Vole in woodland habitats.']},

{type:'mammals',icon:'🐭',commonName:'Harvest Mouse',taxonomicName:'Micromys minutus',habitat:'Long Grass, Reedbed & Cereal Field',taxonomy:[{rank:'Order',name:'Rodentia'},{rank:'Family',name:'Muridae'},{rank:'Genus',name:'Micromys'},{rank:'Species',name:'M. minutus'}],id:{colour:'Orange-brown above; white below. <strong>Prehensile tail used to grip grass stems.</strong>',sizeShape:'Body 5.5–7.5 cm; weight 4–6 g — <strong>Europe\'s smallest rodent.</strong>',keyFeatures:'Tiny size and prehensile tail. Football-sized nest of woven grass stems. Confusion: none at this size.',habitat:'Long grassland, cereal field margins, reedbeds, hedgerow bases.'},facts:['The Harvest Mouse is Europe\'s smallest rodent — at 4–6 g, barely heavier than a 2p coin.','Builds a remarkable spherical woven nest of grass blades about 7 cm across, suspended above the ground.','The prehensile tail can grip a grass stem and support the whole body weight — like a sixth limb.','Populations have declined dramatically with the loss of traditional cereal field margins and rough grassland — largely overlooked due to its tiny size.']},

{type:'mammals',icon:'🐭',commonName:'Hazel Dormouse',taxonomicName:'Muscardinus avellanarius',habitat:'Ancient Woodland & Mature Hedgerow',taxonomy:[{rank:'Order',name:'Rodentia'},{rank:'Family',name:'Gliridae'},{rank:'Genus',name:'Muscardinus'},{rank:'Species',name:'M. avellanarius'}],id:{colour:'<strong>Uniform golden-orange above; paler buff below; fluffy tail same colour as body.</strong>',sizeShape:'Body 6–9 cm; fluffy tail 5.7–7.5 cm. Rounded; large black eyes.',keyFeatures:'Fluffy orange tail and all-orange colour unique. Confusion: none.',habitat:'Ancient woodland and mature hedgerows with Hazel, Honeysuckle, and bramble. Western and southern Britain.'},facts:['Dormice hibernate for up to 7 months — from October to April — in a grass-and-leaf nest at or below ground level.','One of the UK\'s most endangered mammals — declined approximately 70% since 2000; now under intensive conservation management.','Nest tubes (licence-exempt dormouse survey tubes) are the primary survey tool for dormice.','Honeysuckle bark stripped in characteristic spirals is the most reliable field sign of dormouse presence.']},

{type:'mammals',icon:'🐭',commonName:'Brown Rat',taxonomicName:'Rattus norvegicus',habitat:'Urban, Farm, Riverbank & Coastal',taxonomy:[{rank:'Order',name:'Rodentia'},{rank:'Family',name:'Muridae'},{rank:'Genus',name:'Rattus'},{rank:'Species',name:'R. norvegicus'}],id:{colour:'Grey-brown above; grey-white below. <strong>Long, scaly, almost hairless tail.</strong>',sizeShape:'Body 18–28 cm; tail 17–23 cm. Heavy and robust.',keyFeatures:'Large size, pointed muzzle, naked scaly tail. Confusion: Water Vole is similar size but has blunt muzzle and hairy tail. Brown Rat has ears clearly visible.',habitat:'Almost everywhere — farms, sewers, rivers, ports, urban waste ground.'},facts:['Brown Rat arrived in Britain from Russia around 1720 — it is not native.','Rats can produce 5 litters of 6–12 young per year — theoretically one pair can become 12,000 in a year.','Brown Rats are ecologically important as prey for Barn Owl, Tawny Owl, and Stoat — but significant agricultural pests.','Rats can tread water for 3 days and can enter a house through pipes as small as 2.5 cm diameter.']},

{type:'mammals',icon:'🦔',commonName:'Pygmy Shrew',taxonomicName:'Sorex minutus',habitat:'Grassland, Moorland, Woodland & Mountain',taxonomy:[{rank:'Order',name:'Eulipotyphla'},{rank:'Family',name:'Soricidae'},{rank:'Genus',name:'Sorex'},{rank:'Species',name:'S. minutus'}],id:{colour:'Brown above; grey-white below. <strong>Long, flexible pointed snout; minute eyes.</strong> Distinctly bicoloured compared to Common Shrew.',sizeShape:'Body 4–6 cm; tail relatively longer than Common Shrew (>70% of body length).',keyFeatures:'Smaller than Common Shrew with longer tail relative to body. Confusion: Common Shrew is larger and darker.',habitat:'Almost all habitats including mountain tops — the only small mammal on some Irish islands.'},facts:['The Pygmy Shrew is the only small mammal found in Ireland — it colonised after the last ice age and no competitors could follow.','At 2–6 g, it is Britain\'s second-smallest mammal after the Harvest Mouse.','Must eat at least 125% of its body weight daily — dies within hours without food.','The long tail (proportionally the longest of UK shrews) is a reliable field identification character.']},

{type:'mammals',icon:'🦇',commonName:'Soprano Pipistrelle',taxonomicName:'Pipistrellus pygmaeus',habitat:'Woodland Edge, Garden & Waterside',taxonomy:[{rank:'Order',name:'Chiroptera'},{rank:'Family',name:'Vespertilionidae'},{rank:'Genus',name:'Pipistrellus'},{rank:'Species',name:'P. pygmaeus'}],id:{colour:'Pale to medium brown; slightly paler than Common Pipistrelle. Pale-coloured face (vs. Common\'s dark face).',sizeShape:'Body 3.5–4.5 cm; wingspan 19–22 cm. Nearly identical in size to Common Pipistrelle.',keyFeatures:'Echolocates at 55 kHz (vs 45 kHz for Common Pipistrelle) — bat detector essential to separate them. Paler face.',habitat:'Woodland edge, rivers, lakes, gardens. Often forages over water.'},facts:['Only separated as a distinct species from Common Pipistrelle in 1999 using echolocation frequency — one of the most recent mammal splits in Britain.','The 55 kHz echolocation call distinguishes it from Common Pipistrelle (45 kHz) — a bat detector is essential for accurate identification.','Tends to forage more over water than Common Pipistrelle.','Large maternity roosts of several thousand individuals have been found — suggesting its population may rival Common Pipistrelle.']},

{type:'mammals',icon:'🦇',commonName:'Noctule Bat',taxonomicName:'Nyctalus noctula',habitat:'Woodland Edge, Parkland & Open Country',taxonomy:[{rank:'Order',name:'Chiroptera'},{rank:'Family',name:'Vespertilionidae'},{rank:'Genus',name:'Nyctalus'},{rank:'Species',name:'N. noctula'}],id:{colour:'Golden-brown fur; dark face, ears, and wing membranes.',sizeShape:'Body 6–8 cm; wingspan 32–40 cm — <strong>one of Britain\'s largest bats.</strong> Fast, powerful, high flight.',keyFeatures:'Large size, golden fur, very fast direct flight high above trees. Echolocates at 20–25 kHz — audible on bat detector before dark.',habitat:'Woodland, open parkland, large gardens, rivers. Often seen before sunset.'},facts:['The Noctule is one of the earliest bats out each evening — often visible in broad daylight, well before sunset.','One of Britain\'s largest bats — the wingspan rivals some swifts.','Migrates within Europe — some UK Noctules overwinter in Germany and beyond.','Roosts in holes in old trees — loss of veteran trees is the primary conservation concern.']},

{type:'mammals',icon:'🦇',commonName:'Brown Long-eared Bat',taxonomicName:'Plecotus auritus',habitat:'Woodland, Garden & Rural Building',taxonomy:[{rank:'Order',name:'Chiroptera'},{rank:'Family',name:'Vespertilionidae'},{rank:'Genus',name:'Plecotus'},{rank:'Species',name:'P. auritus'}],id:{colour:'Brown above; buff-white below. <strong>Enormous ears — nearly as long as the body.</strong>',sizeShape:'Body 4–5 cm; wingspan 23–28 cm. Slow, hovering flight close to vegetation.',keyFeatures:'Enormous ears folded back under wings at roost — like ram\'s horns. Confusion: Grey Long-eared Bat (rare) is greyer.',habitat:'Woodland, orchards, large gardens, churches and roof spaces.'},facts:['The enormous ears are among the largest of any bat relative to body size — they allow hunting by passive listening without echolocation.','A "gleaner" — hovers and picks insects directly off leaves and bark surfaces.','Folds its enormous ears under its wings when roosting — a diagnostic roost feature.','One of the most common bats in UK church roof spaces — church conservation and bat conservation are closely linked.']},

{type:'mammals',icon:'🦡',commonName:'Polecat',taxonomicName:'Mustela putorius',habitat:'Woodland, Farmland & Riverbank',taxonomy:[{rank:'Order',name:'Carnivora'},{rank:'Family',name:'Mustelidae'},{rank:'Genus',name:'Mustela'},{rank:'Species',name:'M. putorius'}],id:{colour:'Dark chocolate-brown above; paler below. <strong>Distinctive pale yellow facial mask with dark "bandit" stripe through eyes.</strong>',sizeShape:'Body 31–44 cm plus tail. Robust mustelid.',keyFeatures:'Facial mask pattern is diagnostic. Confusion: Ferret (domestic polecat) is paler; polecat-ferret hybrids common.',habitat:'Woodland, farmland, riverbanks. Mainly Wales, now recolonising England.'},facts:['Exterminated from most of Britain by early 20th century gamekeeping — survived only in central Wales.','Has recovered dramatically and now recolonising much of England — one of UK conservation\'s great success stories.','The wild ancestor of the domestic Ferret — hybridises with ferrets wherever both occur.','The strong musky smell from scent glands gives the French name "putois" — the basis of the genus name Mustela putorius.']},

{type:'reptiles',icon:'🐸',commonName:'Palmate Newt',taxonomicName:'Lissotriton helveticus',habitat:'Ponds, Heathland Pool & Upland Lake',taxonomy:[{rank:'Order',name:'Caudata'},{rank:'Family',name:'Salamandridae'},{rank:'Genus',name:'Lissotriton'},{rank:'Species',name:'L. helveticus'}],id:{colour:'Olive-brown above; pale yellow-orange below with small spots. <strong>Breeding male: webbed hind feet and filamentous tail tip.</strong>',sizeShape:'Body 7–9 cm — Britain\'s smallest newt.',keyFeatures:'Breeding male\'s webbed hind feet and thread-like tail tip unique. Female: plain underside with fewer spots than Smooth Newt.',habitat:'Heathland ponds, upland lakes, moorland pools. More tolerant of acid conditions than other newts.'},facts:['The breeding male\'s webbed hind feet are unique among UK newts — an unmistakeable identification feature.','The most acid-tolerant UK newt — found in heathland and upland ponds where Smooth and Great Crested Newts are absent.','Female Palmate and female Smooth Newt are almost identical — the male\'s webbed feet are essential for certain identification.','Found further north and west than other UK newts — common in upland Scotland and Wales.']},

{type:'reptiles',icon:'🐸',commonName:'Natterjack Toad',taxonomicName:'Epidalea calamita',habitat:'Coastal Dune & Lowland Heath',taxonomy:[{rank:'Order',name:'Anura'},{rank:'Family',name:'Bufonidae'},{rank:'Genus',name:'Epidalea'},{rank:'Species',name:'E. calamita'}],id:{colour:'Olive-green to grey-brown with dark blotches; <strong>distinctive bright yellow stripe down the back of the spine — diagnostic.</strong>',sizeShape:'Body 6–8 cm. Shorter-legged than Common Toad — runs rather than hops.',keyFeatures:'Yellow dorsal stripe unmistakeable. Short legs — runs rapidly. Confusion: Common Toad lacks yellow stripe.',habitat:'Coastal sand dunes, lowland heath, saltmarsh with shallow pools.'},facts:['The Natterjack Toad is the UK\'s rarest amphibian — fewer than 60 populations remain, mostly coastal.','The nocturnal chorus of breeding males is one of the loudest sounds in British wildlife — audible a mile away on still nights.','Natterjacks require very shallow, warm pools for breeding — deeper water allows fish which predate the tadpoles.','Fully protected — it is an offence to disturb, handle, or photograph Natterjack Toads without a licence.']},

{type:'reptiles',icon:'🐸',commonName:'Pool Frog',taxonomicName:'Pelophylax lessonae',habitat:'Ponds & Lake Margins in East Anglia',taxonomy:[{rank:'Order',name:'Anura'},{rank:'Family',name:'Ranidae'},{rank:'Genus',name:'Pelophylax'},{rank:'Species',name:'P. lessonae'}],id:{colour:'Green to brown with dark patches; <strong>distinct pale dorsal stripe; vocal sacs visible on sides of head in male.</strong>',sizeShape:'Body 5–8 cm. Similar size to Common Frog but more aquatic.',keyFeatures:'Dorsal stripe and vocal sacs. Confusion: Marsh Frog (P. ridibundus) is larger and darker; Common Frog lacks vocal sacs.',habitat:'Ponds and lake margins, mainly Norfolk and Suffolk in UK.'},facts:['The Pool Frog is native to Britain — a population survived at Thompson Common, Norfolk until the 1990s before becoming extinct.','Reintroduction from Swedish frogs (the most genetically similar to the extinct UK population) began in 2005.','Native Pool Frogs are protected and their reintroduction is one of the most carefully managed amphibian conservation projects in the UK.','The species was overlooked as an introduction for many years — genetic work proved the Norfolk frogs were truly native.']},

{type:'reptiles',icon:'🐸',commonName:'Alpine Newt',taxonomicName:'Ichthyosaura alpestris',habitat:'Garden Pond & Introduced Populations',taxonomy:[{rank:'Order',name:'Caudata'},{rank:'Family',name:'Salamandridae'},{rank:'Genus',name:'Ichthyosaura'},{rank:'Species',name:'I. alpestris'}],id:{colour:'<strong>Breeding male: blue-grey above with spotted flanks; brilliant unmarked orange-red below — stunning.</strong> Female and non-breeding male: brownish.',sizeShape:'Body 7–12 cm. Robust.',keyFeatures:'Orange-red unmarked belly (no spots) and blue flanks of breeding male unique. Confusion: Smooth and Palmate Newts have spotted bellies.',habitat:'Garden ponds and small water bodies — introduced, not native. Scattered across Britain.'},facts:['Alpine Newt is not native to Britain — populations are escaped or released pets, now established in many garden ponds.','The breeding male is arguably the most beautiful amphibian in Britain — the combination of blue flanks and solid orange belly is extraordinary.','Under the Wildlife & Countryside Act, it is illegal to release Alpine Newts into the wild in the UK.','Despite being non-native, they do not appear to be significantly damaging native amphibian populations.']},

{type:'fish',icon:'🐟',commonName:'Lesser Spotted Dogfish',taxonomicName:'Scyliorhinus canicula',habitat:'Sandy & Gravelly Seabed Inshore',taxonomy:[{rank:'Order',name:'Carcharhiniformes'},{rank:'Family',name:'Scyliorhinidae'},{rank:'Genus',name:'Scyliorhinus'},{rank:'Species',name:'S. canicula'}],id:{colour:'<strong>Sandy-brown with numerous small dark spots and blotches</strong> on back and sides. White below.',sizeShape:'Typically 60–80 cm. Small shark; slim, sinuous body.',keyFeatures:'Small spotted shark. Confusion: Nursehound (S. stellaris) is larger with larger spots.',habitat:'Sandy and gravelly seabed, inshore and shallow offshore. Common all around UK coasts.'},facts:['The Lesser Spotted Dogfish is the UK\'s most commonly encountered shark — a familiar catch for shore and boat anglers.','The egg cases (mermaid\'s purses) with curling tendrils are among the most frequently found on UK beaches.','Despite being a shark, it is entirely harmless to swimmers — it feeds on bottom-dwelling invertebrates and small fish.','Its skin is covered in dermal denticles (tiny teeth-like scales) so rough it was historically used as sandpaper.']},

{type:'fish',icon:'🐟',commonName:'Sea Bass',taxonomicName:'Dicentrarchus labrax',habitat:'Rocky Shore, Estuary & Offshore',taxonomy:[{rank:'Order',name:'Moroniformes'},{rank:'Family',name:'Moronidae'},{rank:'Genus',name:'Dicentrarchus'},{rank:'Species',name:'D. labrax'}],id:{colour:'Silver-grey above; silver-white below. <strong>Streamlined; spiny first dorsal fin; large scales.</strong>',sizeShape:'Typically 40–70 cm. Powerful; streamlined.',keyFeatures:'Silver, streamlined body with two dorsal fins. Confusion: Mullet is blunter-headed with smaller mouth.',habitat:'Rocky shores, estuaries, sandy beaches, offshore reefs.'},facts:['Sea Bass is one of the most highly prized UK sea fish — for both sport anglers and chefs.','Strict quotas were introduced in 2015 after population decline from commercial overfishing — recreational catches are now limited.','Bass can live to over 30 years — slow-growing, late-maturing fish are particularly vulnerable to overfishing.','Feeds aggressively in surf-churned water over sandy beaches — classic "bass weather" is rough with a good swell.']},

{type:'fish',icon:'🐟',commonName:'Pollock',taxonomicName:'Pollachius pollachius',habitat:'Rocky Reef, Kelp Bed & Offshore Wreck',taxonomy:[{rank:'Order',name:'Gadiformes'},{rank:'Family',name:'Gadidae'},{rank:'Genus',name:'Pollachius'},{rank:'Species',name:'P. pollachius'}],id:{colour:'Greenish-brown above; white-cream below. <strong>Strongly curved lateral line.</strong> Protruding lower jaw.',keyFeatures:'Curved lateral line and protruding lower jaw. Confusion: Coalfish (Saithe) has straight lateral line.',sizeShape:'Typically 40–70 cm. Similar in shape to Cod but more streamlined.',habitat:'Rocky reefs, kelp beds, offshore wrecks. Western coasts and Channel.'},facts:['Pollock is one of the best sea sport fish in the UK — popular among rock fishers for its fighting power on the surface.','A predatory gadoid that herds sand eels and small fish against kelp beds and wrecks.','The curved lateral line is the most reliable field identification character.','More sustainable than Cod — recommended as an alternative by several seafood sustainability organisations.']},

{type:'fish',icon:'🐟',commonName:'Flounder',taxonomicName:'Platichthys flesus',habitat:'Estuary, River & Sandy Inshore',taxonomy:[{rank:'Order',name:'Pleuronectiformes'},{rank:'Family',name:'Pleuronectidae'},{rank:'Genus',name:'Platichthys'},{rank:'Species',name:'P. flesus'}],id:{colour:'Brown-grey above with orange-red spots; white below. <strong>Rough, spiny tubercles along lateral line and base of fins — diagnostic.</strong>',sizeShape:'Typically 20–40 cm. Flat, oval body; right-eyed (usually).',keyFeatures:'Spiny tubercles along lateral line. Confusion: Plaice has smooth lateral line and brighter orange spots.',habitat:'Estuaries, river mouths, sandy shores. The most estuarine of UK flatfish — ascends rivers.'},facts:['The Flounder is unique among UK flatfish in regularly ascending freshwater rivers — found miles from the sea in major estuaries.','The rough spiny tubercles along the lateral line are the most reliable character distinguishing it from other UK flatfish.','Occasionally "reversed" — left-eyed individuals occur at higher frequency than in other flatfish.','An accessible species for shore anglers fishing estuaries — one of the first fish many UK children catch.']},

{type:'invertebrates',icon:'🦋',commonName:'Common Blue Butterfly',taxonomicName:'Polyommatus icarus',habitat:'Chalk Grassland, Dune & Meadow',taxonomy:[{rank:'Order',name:'Lepidoptera'},{rank:'Family',name:'Lycaenidae'},{rank:'Genus',name:'Polyommatus'},{rank:'Species',name:'P. icarus'}],id:{colour:'Male: <strong>vivid sky-blue above with thin black border and white fringe.</strong> Female: brown above with variable blue suffusion and orange lunules.',sizeShape:'Wingspan 29–36 mm. Small butterfly.',keyFeatures:'Male\'s blue is unmistakeable for its richness. Female brown with orange border. Underside: grey-white with orange and black spots.',habitat:'Chalk grassland, coastal dunes, roadside verges, woodland rides. Wherever Birdsfoot Trefoil grows.'},facts:['The most widespread blue butterfly in Britain — found from the Scilly Isles to Scotland.','The larval foodplant is almost exclusively Birdsfoot Trefoil — Common Blue distribution closely matches that plant.','Males are territorial and will investigate any blue object entering their territory.','Underside markings are the main identification character — studied with a hand lens they reveal a beautiful geometric pattern.']},

{type:'invertebrates',icon:'🦋',commonName:'Comma Butterfly',taxonomicName:'Polygonia c-album',habitat:'Woodland Edge, Garden & Hedgerow',taxonomy:[{rank:'Order',name:'Lepidoptera'},{rank:'Family',name:'Nymphalidae'},{rank:'Genus',name:'Polygonia'},{rank:'Species',name:'P. c-album'}],id:{colour:'Orange-brown with dark spots and blotches above; <strong>ragged, deeply indented wing outline — unlike any other UK butterfly.</strong>',sizeShape:'Wingspan 50–64 mm.',keyFeatures:'Ragged wing outline diagnostic. Underwing: perfectly camouflaged as dead leaf. White comma-mark on hindwing underside.',habitat:'Woodland edge, gardens, hedgerows. Hibernates as adult.'},facts:['The ragged wing outline provides superb dead-leaf camouflage when wings are closed — the white "comma" mark on the underwing is the best identification feature.','Comma has expanded its range dramatically northward since the 1980s — now found throughout England and into Scotland.','Overwinters as an adult, roosting in leaf litter and ivy — often disturbed during mild winter weather.','Two generations per year — spring adults (Hutchinsoni form) are paler and less jagged than summer individuals.']},

{type:'invertebrates',icon:'🦋',commonName:'Green-veined White',taxonomicName:'Pieris napi',habitat:'Damp Meadow, Woodland Ride & Garden',taxonomy:[{rank:'Order',name:'Lepidoptera'},{rank:'Family',name:'Pieridae'},{rank:'Genus',name:'Pieris'},{rank:'Species',name:'P. napi'}],id:{colour:'White with black wing tips; <strong>hindwing underside with distinctive green-veined pattern — diagnostic.</strong>',sizeShape:'Wingspan 40–52 mm.',keyFeatures:'Green veins on hindwing underside unmistakeable. Confusion: Large White and Small White lack green veins.',habitat:'Damp meadows, woodland rides, hedgerows, gardens. The most habitat-diverse white butterfly.'},facts:['Despite the name, the green veins are on the underside — not visible from above.','Unlike Large and Small White, Green-veined White does not breed on brassica crops — it uses wild Crucifers like Lady\'s Smock and Garlic Mustard.','The green colour of the veins is produced structurally from yellow and black scales together.','Locally common throughout the UK — less associated with gardens than Large and Small White.']},

{type:'invertebrates',icon:'🐛',commonName:'Elephant Hawk-moth',taxonomicName:'Deilephila elpenor',habitat:'Garden, Riverbank & Heathland',taxonomy:[{rank:'Order',name:'Lepidoptera'},{rank:'Family',name:'Sphingidae'},{rank:'Genus',name:'Deilephila'},{rank:'Species',name:'D. elpenor'}],id:{colour:'<strong>Vivid pink and olive-green patterning — one of the most dramatically coloured UK moths.</strong>',sizeShape:'Wingspan 45–60 mm. Large, fast-flying hawk-moth.',keyFeatures:'Pink and olive combination unmistakeable. Hovers over flowers at dusk. <strong>Caterpillar:</strong> large, brown-grey with false eye-spots.',habitat:'Gardens, riverbanks, heathland, woodland edge. Wherever Rosebay Willowherb or bedstraws grow.'},facts:['The Elephant Hawk-moth is among the most beautiful British moths — the vivid pink and green pattern is extraordinary.','Named after the caterpillar, which retracts its head, revealing false eye-spots that make it look like a small snake.','Hovers over honeysuckle, Red Valerian, and phlox at dusk — capable of detecting colour in near-darkness.','The caterpillar is often found in gardens in August on Rosebay Willowherb and fuchsia.']},

{type:'invertebrates',icon:'🐛',commonName:'White-tailed Bumblebee',taxonomicName:'Bombus lucorum',habitat:'Garden, Meadow & Heathland',taxonomy:[{rank:'Order',name:'Hymenoptera'},{rank:'Family',name:'Apidae'},{rank:'Genus',name:'Bombus'},{rank:'Species',name:'B. lucorum'}],id:{colour:'Yellow band on thorax front; yellow band on abdomen; <strong>pure white tail</strong>.',sizeShape:'Queen 19–22 mm. Very similar to Buff-tailed Bumblebee.',keyFeatures:'Pure white tail (Buff-tailed has buff/orange tail). Confusion: Buff-tailed Bumblebee queen has buff tail; White-tailed worker is very similar to buff-tailed worker.',habitat:'Gardens, farmland, heathland, meadows.'},facts:['White-tailed Bumblebee is actually three cryptic species (lucorum, magnus, and cryptarum) — barely distinguishable without genetic analysis.','One of the most abundant bumblebees in Britain — ubiquitous in gardens and wherever white clover grows.','Queens emerge early in spring and found new colonies in existing holes and old mammal burrows.','An important pollinator of white clover, bramble, and many garden flowers.']},

{type:'invertebrates',icon:'🦟',commonName:'Common Darter',taxonomicName:'Sympetrum striolatum',habitat:'Ponds, Lakes & Garden Water',taxonomy:[{rank:'Order',name:'Odonata'},{rank:'Family',name:'Libellulidae'},{rank:'Genus',name:'Sympetrum'},{rank:'Species',name:'S. striolatum'}],id:{colour:'Male: <strong>bright brick-red abdomen; yellow-brown thorax.</strong> Female: yellow-brown throughout.',sizeShape:'Body 36–45 mm; wingspan 55–60 mm. Medium-sized dragonfly.',keyFeatures:'Male\'s red abdomen over ponds in late summer. Confusion: Ruddy Darter is deeper red with waisted abdomen; Scarce Chaser is rarer.',habitat:'Almost any standing or slow-moving water. The UK\'s most abundant and widespread dragonfly.'},facts:['The Common Darter is the most frequently encountered dragonfly in Britain — found at almost every pond and lake.','One of the latest-flying dragonflies — adults can be seen until November in mild years.','Males regularly land on warm surfaces (paths, stone walls, human hands) to thermoregulate.','The red colour deepens with age — freshly emerged males are yellow-brown like females.']},

{type:'invertebrates',icon:'🐛',commonName:'Wood Ant',taxonomicName:'Formica rufa',habitat:'Ancient Woodland, Especially Pine & Oak',taxonomy:[{rank:'Order',name:'Hymenoptera'},{rank:'Family',name:'Formicidae'},{rank:'Genus',name:'Formica'},{rank:'Species',name:'F. rufa'}],id:{colour:'Red-brown thorax and head; black abdomen. Workers 4–9 mm.',sizeShape:'Large ant. Mound often 1–2 m in diameter and 50+ cm tall.',keyFeatures:'Large size and enormous mound of pine needles and plant debris. Squirts formic acid when disturbed. Confusion: Southern Wood Ant (F. pratensis) has less red on thorax.',habitat:'Ancient woodland, especially with Scots pine, oak, and birch. Mainly upland and northern Britain.'},facts:['A single Wood Ant nest can contain 100,000–400,000 workers and persist for over 50 years.','Wood Ant colonies are important ecosystem engineers — the mound absorbs heat, maintaining stable temperatures for brood.','They farm aphids on tree branches, protecting them from predators and harvesting their honeydew.','Wood Ants remove an estimated 100,000 invertebrates per day from the surrounding woodland — a major predator.']}

,

{type:'grasses',icon:'🌾',commonName:'Black Bog-rush',taxonomicName:'Schoenus nigricans',habitat:'Calcareous Fen, Dune Slack & Wet Heath',taxonomy:[{rank:'Family',name:'Cyperaceae'},{rank:'Genus',name:'Schoenus'},{rank:'Species',name:'S. nigricans'}],id:{bark:'N/A — tufted, rush-like perennial 15–70 cm.',leaves:'Very narrow, wiry; dark green to blackish. Basal sheaths distinctly black-brown.',branchLeaf:'Erect. <strong>Terminal cluster of dark brown-black spikelets — the blackish inflorescence gives the plant its name.</strong>',habitat:'Calcareous fens, dune slacks, wet heathland. Requires calcium-rich but nutrient-poor waterlogged soils.'},facts:['Black Bog-rush is a reliable indicator of calcareous fen — one of the rarest and most threatened habitats in Britain.','The larval foodplant of the Large Blue Butterfly was historically associated with Black Bog-rush fens in parts of its range.','The blackish lower sheaths and dark spikelets are diagnostic — unmistakeable among British sedges.','Declining through drainage and eutrophication of fens — a priority species for wetland conservation.']},

{type:'grasses',icon:'🌾',commonName:'Wood Millet',taxonomicName:'Milium effusum',habitat:'Damp Ancient Woodland & Shaded Rides',taxonomy:[{rank:'Family',name:'Poaceae'},{rank:'Genus',name:'Milium'},{rank:'Species',name:'M. effusum'}],id:{bark:'N/A — loosely tufted perennial 60–150 cm.',leaves:'Flat, broad, 6–15 mm wide; bright pale green; soft; ligule long and white.',branchLeaf:'Alternate. <strong>Large, lax, spreading panicle 15–30 cm — extremely graceful, with spikelets hanging from very long, delicate branches.</strong>',habitat:'Damp, shaded ancient woodland, woodland rides and edges on rich soils.'},facts:['Wood Millet creates the most elegant of all woodland grass inflorescences — a lax, trembling panicle that catches every breath of air.','A reliable indicator of ancient, undisturbed damp woodland.','The golden form (var. aureum) — "Bowles Golden Grass" — is widely grown in gardens for its vivid yellow foliage.','Provides valuable seed for finches and other seed-eating birds in shaded woodland.']},

{type:'ferns',icon:'🌿',commonName:'Water Fern',taxonomicName:'Azolla filiculoides',habitat:'Ponds, Canals & Still Water',taxonomy:[{rank:'Division',name:'Polypodiophyta'},{rank:'Family',name:'Salviniaceae'},{rank:'Genus',name:'Azolla'},{rank:'Species',name:'A. filiculoides'}],id:{bark:'N/A — tiny floating fern, 1–2 cm. Freely branching.',leaves:'<strong>Minute overlapping scale-like leaves; bright green turning vivid red-purple in autumn sunshine.</strong>',branchLeaf:'Free-floating on water surface. Roots hang below. Can cover entire pond surface.',habitat:'Still and slow-moving water — ponds, canals, ditches, lake margins.'},facts:['Water Fern is not native — introduced from the Americas, it has naturalised across much of Britain.','The vivid red-purple autumn colour is spectacular — a small pond can appear entirely crimson.','Azolla harbours nitrogen-fixing cyanobacteria (Anabaena azollae) in its leaf cavities — historically used as a rice paddy fertiliser in Asia.','Can double its surface area in 2–3 days — complete pond coverage may deplete oxygen and kill fish in warm weather.']},

{type:'fungi',icon:'🍄',commonName:'Birch Polypore',taxonomicName:'Fomitopsis betulina',habitat:'Dead & Dying Birch Trees',taxonomy:[{rank:'Division',name:'Basidiomycota'},{rank:'Family',name:'Fomitopsidaceae'},{rank:'Genus',name:'Fomitopsis'},{rank:'Species',name:'F. betulina'}],id:{bark:'N/A',leaves:'<strong>Kidney to hoof-shaped bracket; upper surface pale grey-brown, smooth; underside white with very small pores.</strong> 5–40 cm wide.',branchLeaf:'Attached to birch trunk by a thick stipe or directly. Soft when fresh; corky when old.',habitat:'Almost exclusively on dead or dying birch trees.'},facts:['Birch Polypore is exclusively found on birch — one of the most host-specific bracket fungi in Britain.','Ötzi the Iceman (5,300 years old) was carrying Birch Polypore — believed to have been used medicinally for intestinal parasites.','The flesh is antibiotic, antiseptic, and haemostatic — it can be used to stop minor bleeding and as a wound dressing.','Old brackets persist for years, providing important habitat for specialist invertebrates and fungi.']},

{type:'birds',icon:'🐦',commonName:'Teal',taxonomicName:'Anas crecca',habitat:'Shallow Marsh, Pond & Estuary',taxonomy:[{rank:'Order',name:'Anseriformes'},{rank:'Family',name:'Anatidae'},{rank:'Genus',name:'Anas'},{rank:'Species',name:'A. crecca'}],id:{colour:'Male: <strong>chestnut head with green eye-patch outlined in yellow; grey body; yellow patch under tail.</strong> Female: mottled brown.',sizeShape:'Body 34–38 cm — Britain\'s smallest dabbling duck.',keyFeatures:'Male unmistakeable. Green speculum visible in flight in both sexes. Very fast, twisting flight.',habitat:'Shallow marsh, flooded grassland, ponds, estuaries. Britain\'s most numerous wintering duck.'},facts:['Teal flocks twist and turn in perfect synchrony — one of the most dynamic spectacles of wildfowl flight.','Colour names: "teal blue-green" derives from this duck\'s striking eye-patch colour.','UK breeding numbers are small but millions of Teal winter here from Iceland and northern Europe.','Their dabbling feeding technique allows them to exploit very shallow water inaccessible to larger ducks.']},

{type:'birds',icon:'🦢',commonName:'Greylag Goose',taxonomicName:'Anser anser',habitat:'Grassland, Lake, Estuary & Park',taxonomy:[{rank:'Order',name:'Anseriformes'},{rank:'Family',name:'Anatidae'},{rank:'Genus',name:'Anser'},{rank:'Species',name:'A. anser'}],id:{colour:'Grey-brown; paler below; <strong>large orange bill; pink legs.</strong> White rump in flight.',sizeShape:'Body 74–84 cm. Large, heavy-bodied goose.',keyFeatures:'Orange bill and pink legs. Confusion: other grey geese have smaller bills; domesticated geese are descended from Greylag.',habitat:'Lakes, rivers, grassland, estuaries, parks. Both wild and feral populations.'},facts:['The Greylag is the ancestor of most domesticated geese — the familiar farmyard goose is a Greylag descendant.','The noisy clanging calls flying overhead in formation are among the most evocative sounds of the British countryside.','Native Greylags breed in Scotland; large feral populations (from released birds) now exist throughout England.','Konrad Lorenz used Greylag Geese in his pioneering studies of imprinting — they famously followed him as their mother.']},

{type:'birds',icon:'🦆',commonName:'Tufted Duck',taxonomicName:'Aythya fuligula',habitat:'Lake, Reservoir & Park Pond',taxonomy:[{rank:'Order',name:'Anseriformes'},{rank:'Family',name:'Anatidae'},{rank:'Genus',name:'Aythya'},{rank:'Species',name:'A. fuligula'}],id:{colour:'Male: <strong>black and white; drooping hind crest; yellow eye.</strong> Female: dark brown with smaller crest; sometimes pale around bill.',sizeShape:'Body 40–47 cm. Compact diving duck.',keyFeatures:'Male\'s black-and-white plumage and drooping crest diagnostic. Dives frequently. Confusion: Scaup has green head gloss and no crest.',habitat:'Lakes, reservoirs, park ponds. The most common diving duck on inland waters.'},facts:['The most familiar diving duck in Britain — found on most large lakes and reservoirs and many city park ponds.','Dives to approximately 4 metres to feed on molluscs, especially zebra mussels in reservoirs.','UK breeding population has increased dramatically — from fewer than 10 pairs in 1900 to over 7,000 today.','The drooping crest gives the male a distinctly rakish appearance — visible at distance.']},

{type:'birds',icon:'🐦',commonName:'Grey Wagtail',taxonomicName:'Motacilla cinerea',habitat:'Fast-flowing Stream, Weir & Mill',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Motacillidae'},{rank:'Genus',name:'Motacilla'},{rank:'Species',name:'M. cinerea'}],id:{colour:'Grey above; <strong>vivid lemon-yellow below, especially under tail; male has black throat in summer.</strong>',sizeShape:'Body 18–19 cm. Slim; very long tail, constantly wagged.',keyFeatures:'Yellow underparts and grey back. Confusion: Yellow Wagtail is yellow-green above; Grey Wagtail is the only wagtail with grey upperparts and vivid yellow undertail.',habitat:'Fast-flowing streams and rivers, weirs, mill-races, upland waterfalls.'},facts:['Despite the name "Grey" Wagtail, the vivid lemon-yellow underparts and rump make it one of the most colourful UK birds.','Strongly associated with fast-flowing water — almost always perches on boulders in mid-stream or beside weirs.','Nests in crevices in walls, bridges, and millwheels beside running water.','Moves downstream in winter — found on lowland rivers and sewage works when upland streams freeze.']},

{type:'birds',icon:'🐦',commonName:'Dipper',taxonomicName:'Cinclus cinclus',habitat:'Fast-flowing Upland Stream & River',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Cinclidae'},{rank:'Genus',name:'Cinclus'},{rank:'Species',name:'C. cinclus'}],id:{colour:'Dark chocolate-brown; <strong>pure white bib (breast and throat) — distinctive at any distance.</strong> Short, cocked tail.',sizeShape:'Body 18 cm. Plump, wren-like; bobs constantly on boulders.',keyFeatures:'White bib on brown body unmistakeable. Walks and swims underwater. Confusion: none.',habitat:'Fast-flowing rocky streams and rivers. Upland Britain, particularly Wales, northern England, Scotland.'},facts:['The Dipper is the only truly aquatic songbird in Britain — it walks along stream beds underwater against the current to catch invertebrates.','Can swim by using its wings and can walk into deeper water where the current pins it to the bottom.','Sings throughout winter, even during the coldest weather — one of the most persistent cold-weather singers.','Water quality indicator — Dippers require clean, invertebrate-rich rivers and are absent from polluted or over-acidified streams.']},

{type:'birds',icon:'🐦',commonName:'Treecreeper',taxonomicName:'Certhia familiaris',habitat:'Woodland, Park & Garden',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Certhiidae'},{rank:'Genus',name:'Certhia'},{rank:'Species',name:'C. familiaris'}],id:{colour:'Brown, heavily streaked above; <strong>pure white below; long, downcurved bill.</strong>',sizeShape:'Body 12.5 cm. Slim; stiff tail used as a prop against bark.',keyFeatures:'Spirals up tree trunks then flies to base of next tree. White below. Confusion: Nuthatch goes head-down; Treecreeper always spirals upward.',habitat:'Deciduous and mixed woodland, parks, gardens with large old trees.'},facts:['Treecreepers always spiral upwards on a tree trunk — they fly to the base of a new tree and repeat, never going down.','The long, downcurved bill is perfectly adapted to probe bark crevices for spiders, beetles, and insect eggs.','In hard winters, several Treecreepers roost together in small hollows, pressed together for warmth.','The high, thin song is often overlooked — it ends with a distinctive flourishing trill.']},

{type:'birds',icon:'🐦',commonName:'Redstart',taxonomicName:'Phoenicurus phoenicurus',habitat:'Ancient Oak Woodland, Parkland & Scrub',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Muscicapidae'},{rank:'Genus',name:'Phoenicurus'},{rank:'Species',name:'P. phoenicurus'}],id:{colour:'Male: <strong>slate-grey above; black face and throat; white forehead; vivid orange-red breast and tail — shimmering constantly.</strong> Female: brown with orange tail.',sizeShape:'Body 14 cm.',keyFeatures:'Constantly shivering orange-red tail ("start" = tail in Old English) unmistakeable.',habitat:'Ancient oak woodland, old parkland with large trees, scrubby hillside. Summer visitor.'},facts:['The name "redstart" comes from the Old English "steort" — tail — the shivering red tail is the most distinctive feature.','A summer visitor from sub-Saharan Africa — arriving in April and departing September.','Strongholds are the ancient oak woodlands of Wales, northern England, and Scotland.','Declined due to Sahel droughts in the 1960s–70s; now recovering in its western strongholds.']},

{type:'birds',icon:'🐦',commonName:'Spotted Flycatcher',taxonomicName:'Muscicapa striata',habitat:'Woodland Edge, Garden & Churchyard',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Muscicapidae'},{rank:'Genus',name:'Muscicapa'},{rank:'Species',name:'M. striata'}],id:{colour:'Grey-brown above; off-white below with faint streaking on breast and crown. No bold markings.',sizeShape:'Body 14 cm. Slim; upright posture; large eye.',keyFeatures:'<strong>Sallying flight from exposed perch to catch insects then returning to same perch</strong> — diagnostic behaviour. Plain face, streaked crown.',habitat:'Woodland edge, gardens, churchyards, old orchards, climber-covered walls.'},facts:['The Spotted Flycatcher is one of the last summer migrants to arrive — not usually seen until May.','UK populations have declined approximately 89% since 1967 — one of the most catastrophic declines of any British bird.','The behaviour is unmistakeable — it launches from a perch, catches a flying insect with an audible snap, and returns to the same perch.','Nests in open-fronted boxes on walls and in climbing plants — a species that responds well to garden nest box provision.']},

{type:'birds',icon:'🦜',commonName:'Green Woodpecker',taxonomicName:'Picus viridis',habitat:'Parkland, Woodland Edge & Grassland',taxonomy:[{rank:'Order',name:'Piciformes'},{rank:'Family',name:'Picidae'},{rank:'Genus',name:'Picus'},{rank:'Species',name:'P. viridis'}],id:{colour:'<strong>Bright green above; paler yellow-green below; vivid red crown; yellow-green rump obvious in flight.</strong> Male has red moustache stripe.',sizeShape:'Body 31–33 cm. Large woodpecker.',keyFeatures:'Green and yellow colouring unmistakeable. Loud laughing "yaffle" call. Does not drum. Yellow rump in flight.',habitat:'Open woodland, parkland, grassland with anthills, golf courses, large gardens.'},facts:['The Green Woodpecker rarely drums — it calls with a loud, laughing "yaffle" that is one of the most characterful sounds of British woodland.','Almost exclusively eats ants — the long sticky tongue (up to 10 cm) extracts ants from their nests underground.','The bright yellow-green rump is the most visible field character when the bird is in flight.','Highly sensitive to snow cover — in severe winters, inability to access ants causes significant mortality.']},

{type:'birds',icon:'🐦',commonName:'Mistle Thrush',taxonomicName:'Turdus viscivorus',habitat:'Woodland, Parkland & Garden',taxonomy:[{rank:'Order',name:'Passeriformes'},{rank:'Family',name:'Turdidae'},{rank:'Genus',name:'Turdus'},{rank:'Species',name:'T. viscivorus'}],id:{colour:'Grey-brown above; white below with <strong>large, rounded dark spots in untidy rows.</strong>',sizeShape:'Body 26–29 cm — the largest UK thrush. Upright, bold posture.',keyFeatures:'Large size and round spots. Confusion: Song Thrush is smaller with neat arrow-head spots.',habitat:'Woodland, parkland, large gardens, open farmland. Feeds on yew, holly, and mistletoe berries.'},facts:['The Mistle Thrush sings loudly in stormy weather, earning the name "stormcock" — one of the earliest singing birds, starting in January.','Fiercely defends berry-laden trees (holly, yew, mistletoe) in winter against all other birds.','The name comes from its fondness for mistletoe berries — it spreads the parasite by wiping berry pulp on branches.','UK Mistle Thrush has declined 45% since 1970 — loss of rough grassland for earthworm foraging is the likely cause.']},

{type:'mammals',icon:'🐾',commonName:'Stoat',taxonomicName:'Mustela erminea',habitat:'Woodland, Farmland, Moorland & Coast',taxonomy:[{rank:'Order',name:'Carnivora'},{rank:'Family',name:'Mustelidae'},{rank:'Genus',name:'Mustela'},{rank:'Species',name:'M. erminea'}],id:{colour:'Summer: rich chestnut-brown above; creamy-white below; <strong>black tip to tail at all times — diagnostic.</strong> Winter (especially upland): white with black tail tip (ermine).',sizeShape:'Body 24–31 cm (male); 16–24 cm (female). Slim, sinuous.',keyFeatures:'Black tail tip in all seasons. Confusion: Weasel is smaller and lacks the black tail tip.',habitat:'Almost all habitats from coast to mountain. Highly adaptable.'},facts:['The black tail tip is present year-round — the only reliable field difference from Weasel in all plumages.','Stoat "dancing" — leaping, twisting, and rolling near rabbits — is thought to mesmerise prey before the attack.','The white winter coat (ermine) was used in royal and judicial robes — the black tail tips decorating ermine robes are Stoat tails.','A Stoat can kill rabbits 10 times its own weight by seizing the base of the skull.']},

{type:'mammals',icon:'🐾',commonName:'Weasel',taxonomicName:'Mustela nivalis',habitat:'Woodland, Farmland, Hedgerow & Moorland',taxonomy:[{rank:'Order',name:'Carnivora'},{rank:'Family',name:'Mustelidae'},{rank:'Genus',name:'Mustela'},{rank:'Species',name:'M. nivalis'}],id:{colour:'Chestnut-brown above; white below. <strong>No black tail tip (unlike Stoat) — straight brown/white boundary.</strong>',sizeShape:'Body 17–23 cm (male); 13–18 cm (female). Very small; slim. World\'s smallest carnivore.',keyFeatures:'Lacks black tail tip. Smaller than Stoat. Confusion: Stoat has black tail tip; both have undulating "looping" gallop.',habitat:'Almost all habitats with prey — woodland, farmland, hedgerows, moorland, garden.'},facts:['The Weasel is the world\'s smallest carnivore — a female can weigh as little as 50 g.','Small enough to enter vole and mouse burrows — the female is often smaller than her prey tunnels require.','A Weasel must eat approximately a third of its body weight daily — constant hunger drives near-ceaseless hunting.','Population size tracks Field Vole numbers closely — in vole crash years, Weasel populations collapse within months.']},

{type:'mammals',icon:'🐾',commonName:'American Mink',taxonomicName:'Neovison vison',habitat:'River, Lake, Reedbed & Coast',taxonomy:[{rank:'Order',name:'Carnivora'},{rank:'Family',name:'Mustelidae'},{rank:'Genus',name:'Neovison'},{rank:'Species',name:'N. vison'}],id:{colour:'<strong>Uniform very dark brown, almost black. Small white chin patch.</strong>',sizeShape:'Body 30–45 cm; tail 13–19 cm. Slim mustelid.',keyFeatures:'All-dark fur and aquatic habitat. Confusion: Otter is much larger with pale throat; Polecat has facial mask.',habitat:'Rivers, lakes, reedbeds, coastline. Escaped from fur farms from 1950s onwards.'},facts:['American Mink is one of the most destructive invasive species in Britain — introduced via fur farm escapes from the 1950s.','Directly responsible for the 90%+ collapse of UK Water Vole populations — Mink can enter vole burrows and take entire colonies.','Mink removal programmes in the Waterlife Recovery Trust and others have allowed Water Vole recovery in some river systems.','Not native — all UK Mink descend from fur farm escapees. No management would allow extirpation.']},

{type:'mammals',icon:'🦊',commonName:'Grey Squirrel',taxonomicName:'Sciurus carolinensis',habitat:'Woodland, Garden & Park',taxonomy:[{rank:'Order',name:'Rodentia'},{rank:'Family',name:'Sciuridae'},{rank:'Genus',name:'Sciurus'},{rank:'Species',name:'S. carolinensis'}],id:{colour:'Grey-brown above; white-grey below; bushy grey tail. <strong>No ear tufts at any season.</strong>',sizeShape:'Body 23–30 cm; tail 19–24 cm. Larger and bulkier than Red Squirrel.',keyFeatures:'Grey colour and no ear tufts. Confusion: Red Squirrel is smaller, chestnut, and has winter ear tufts.',habitat:'Deciduous woodland, gardens, parks. Dominant squirrel across most of England and Wales.'},facts:['Introduced from North America in 1876 — one of the most consequential wildlife introductions in British history.','Carries squirrelpox virus asymptomatically — lethal to Red Squirrels, this has driven Red Squirrel extinction across most of England.','Strips bark from trees, causing significant damage to broadleaved woodland — a major forestry pest.','The most common and familiar wild mammal seen in British parks and gardens.']},

{type:'mammals',icon:'🐾',commonName:'Pine Marten',taxonomicName:'Martes martes',habitat:'Upland Woodland & Forest',taxonomy:[{rank:'Order',name:'Carnivora'},{rank:'Family',name:'Mustelidae'},{rank:'Genus',name:'Martes'},{rank:'Species',name:'M. martes'}],id:{colour:'Rich chocolate-brown with <strong>distinctive cream-yellow bib (throat patch) — diagnostic.</strong>',sizeShape:'Body 45–55 cm; tail 25–27 cm. Cat-sized mustelid; large paws.',keyFeatures:'Cream bib unmistakeable. Semi-arboreal — climbs trees readily. Confusion: none in UK.',habitat:'Upland woodland, conifer and mixed forest. Mainly Scotland, Wales, and Ireland.'},facts:['Pine Marten recovery in Scotland is providing a natural control of Grey Squirrels — Martens preferentially take the heavier Greys, indirectly benefiting Red Squirrels.','One of the rarest native UK carnivores — persecuted to near-extinction by the early 20th century, now recovering.','Semi-arboreal — can run along branches and leap between trees at speed.','Pine Marten scat (droppings) has a distinctive sweet, musky smell unlike any other UK carnivore.']},

{type:'mammals',icon:'🦌',commonName:'Chinese Water Deer',taxonomicName:'Hydropotes inermis',habitat:'Fen, Wet Grassland & Woodland',taxonomy:[{rank:'Order',name:'Artiodactyla'},{rank:'Family',name:'Cervidae'},{rank:'Genus',name:'Hydropotes'},{rank:'Species',name:'H. inermis'}],id:{colour:'Sandy-brown; paler below. <strong>Round ears; prominent canine tusks visible in both sexes.</strong>',sizeShape:'Shoulder height 45–55 cm; weight 11–18 kg. Small deer.',keyFeatures:'<strong>No antlers in either sex — unique among UK deer. Visible canine tusks.</strong> Confusion: Muntjac has antlers (buck) and is more hunched.',habitat:'Fen, river valleys, wet grassland, open woodland. Mainly East Anglia.'},facts:['Chinese Water Deer is the only UK deer without antlers in either sex — males use long canine tusks to fight instead.','Britain holds approximately 10% of the world population — making UK deer conservation globally significant.','Escaped from Whipsnade Zoo in Bedfordshire in the 1940s; now centred on the Norfolk Broads and Fens.','The prominent tusks give the buck a vampire-like appearance — unmistakeable among British deer.']},

{type:'mammals',icon:'🐾',commonName:'Wildcat',taxonomicName:'Felis silvestris',habitat:'Remote Highland Woodland & Moorland',taxonomy:[{rank:'Order',name:'Carnivora'},{rank:'Family',name:'Felidae'},{rank:'Genus',name:'Felis'},{rank:'Species',name:'F. silvestris'}],id:{colour:'Tabby-striped grey-brown; <strong>thick, blunt-tipped tail with bold black rings and a solid black tip — diagnostic.</strong>',sizeShape:'Body 47–65 cm; tail 26–37 cm. Larger and more robust than domestic cat.',keyFeatures:'Blunt-ended, boldly ringed tail — unlike domestic or feral cats. Cannot be tamed. Heavier build.',habitat:'Remote highland forest, moorland edge. Critically endangered — now almost exclusively in the Scottish Highlands.'},facts:['The Scottish Wildcat is Britain\'s only remaining native wild felid — and one of the rarest mammals in the world.','Fewer than 300 Wildcats remain in Scotland, most of which are hybrids with feral domestic cats.','Hybridisation with domestic cats is the primary extinction threat — a captive breeding and release programme is now underway.','Pure Wildcats cannot be tamed — even hand-reared kittens remain wild and dangerous.']},

{type:'mammals',icon:'🦭',commonName:'Common Seal',taxonomicName:'Phoca vitulina',habitat:'Estuaries, Sandbanks & Rocky Coast',taxonomy:[{rank:'Order',name:'Carnivora'},{rank:'Family',name:'Phocidae'},{rank:'Genus',name:'Phoca'},{rank:'Species',name:'P. vitulina'}],id:{colour:'Variable grey-brown with darker spots and blotches. <strong>Rounded dog-like head; concave forehead; V-shaped nostrils.</strong>',sizeShape:'Body 120–185 cm; weight 45–130 kg.',keyFeatures:'Dog-like face and V-nostrils. Confusion: Grey Seal has longer Roman-nose profile; parallel nostrils.',habitat:'Estuaries, mudflats, sandbanks, rocky coasts. Mainly eastern and northern coasts.'},facts:['The UK holds approximately 50% of the world\'s Common Seal population — an extraordinary international responsibility.','Common Seal pups can swim immediately at birth — unlike Grey Seal pups which are born helpless on land.','Haul-out sites on tidal sandbanks are used by hundreds of seals — monitoring these is the primary survey method.','Phocine Distemper Virus outbreaks in 1988 and 2002 killed over half the North Sea Common Seal population.']},

{type:'mammals',icon:'🦭',commonName:'Grey Seal',taxonomicName:'Halichoerus grypus',habitat:'Rocky Coast, Island & Offshore Reef',taxonomy:[{rank:'Order',name:'Carnivora'},{rank:'Family',name:'Phocidae'},{rank:'Genus',name:'Halichoerus'},{rank:'Species',name:'H. grypus'}],id:{colour:'Adults vary from grey-brown to almost white; dark spots and blotches. <strong>Long Roman-nose profile; parallel nostrils.</strong>',sizeShape:'Male body 195–230 cm; female 165–195 cm. Strong sexual dimorphism.',keyFeatures:'Roman-nose profile and parallel nostrils. Bull much larger than cow. Confusion: Common Seal has rounder head and V-shaped nostrils.',habitat:'Rocky coasts, offshore islands, haul-out rocks. Breeds on exposed beaches in autumn.'},facts:['Britain holds approximately 40% of the world\'s Grey Seal population — one of the highest concentrations of any large marine mammal.','Grey Seal bulls can weigh up to 300 kg — the largest native British carnivore.','The Farne Islands (Northumberland) and Donna Nook (Lincolnshire) hold large accessible breeding colonies — spectacular wildlife spectacles in October–November.','Pups are born with white fluffy coats (lanugo) and cannot swim — they must be fed for 3 weeks on shore before independence.']},

{type:'mammals',icon:'🐬',commonName:'Common Dolphin',taxonomicName:'Delphinus delphis',habitat:'Open Sea & Offshore Waters',taxonomy:[{rank:'Order',name:'Artiodactyla'},{rank:'Family',name:'Delphinidae'},{rank:'Genus',name:'Delphinus'},{rank:'Species',name:'D. delphis'}],id:{colour:'<strong>Distinctive hourglass pattern on flanks: yellowish-tan forward, grey aft, with white belly.</strong> Dark cape and back; pale stripe below dorsal fin.',sizeShape:'Body 150–240 cm. Slender; long beak.',keyFeatures:'Hourglass flank pattern unique among UK dolphins. Often in large schools. Very active bow-rider.',habitat:'Open sea, offshore and inshore. Commonest off south-west England and west coast of Scotland.'},facts:['Common Dolphin is the most numerous cetacean in British waters — schools of hundreds or thousands are seen off the south-west coast.','One of the most athletic cetaceans — bow-rides vessels at speed and leaps high out of the water.','The hourglass flank pattern is unique among dolphins in UK waters — the most reliably identified dolphin at sea.','Largely feeds on schooling fish and squid at depth — can dive to 280 m.']},

{type:'reptiles',icon:'🐍',commonName:'Barred Grass Snake',taxonomicName:'Natrix helvetica',habitat:'Wetland Edge, Meadow, Garden & Heathland',taxonomy:[{rank:'Order',name:'Squamata'},{rank:'Family',name:'Colubridae'},{rank:'Genus',name:'Natrix'},{rank:'Species',name:'N. helvetica'}],id:{colour:'Grey-green or olive-brown above with dark barring; <strong>distinctive yellow and black collar behind the head.</strong> Black and white chequered underside.',sizeShape:'Typically 70–120 cm; occasionally to 150 cm. Britain\'s longest snake.',keyFeatures:'Yellow collar diagnostic. Confusion: Adder has zigzag and no collar; Smooth Snake has no collar.',habitat:'Wetland edges, grassland, heathland, gardens. Often found near water.'},facts:['The Barred Grass Snake (recently split from the European Grass Snake, Natrix natrix) is Britain\'s only species in this genus.','Feigns death convincingly when threatened — rolling onto its back with mouth open.','Lays eggs in rotting vegetation and compost heaps — garden compost bins are important breeding sites.','Entirely harmless — feeds on frogs, newts, and fish.']},
